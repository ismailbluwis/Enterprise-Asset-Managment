/* ── HEALTH SCORE ENGINE ── */
function calcHealthScore(asset,tempOverride=null){
  const th=asset.thresholds;
  const lastTemp=tempOverride\!==null?tempOverride:asset.sensorHistory.temperature.slice(-1)[0];
  const lastVib=asset.sensorHistory.vibration.slice(-1)[0];
  const lastPres=asset.sensorHistory.pressure.slice(-1)[0];
  let ss=100;
  if(lastTemp>=th.temperature.crit)ss-=40;
  else if(lastTemp>=th.temperature.warn[0])ss-=20*(lastTemp-th.temperature.warn[0])/(th.temperature.crit-th.temperature.warn[0]);
  if(lastVib>=th.vibration.crit)ss-=35;
  else if(lastVib>=th.vibration.warn[0])ss-=18*(lastVib-th.vibration.warn[0])/(th.vibration.crit-th.vibration.warn[0]);
  if(lastPres>=th.pressure.crit)ss-=25;
  else if(lastPres>=th.pressure.warn[0])ss-=12*(lastPres-th.pressure.warn[0])/(th.pressure.crit-th.pressure.warn[0]);
  ss=Math.max(0,ss);
  const ms=Math.max(0,100-((asset.daysSinceLastPM/asset.pmFreqDays)*100));
  const totalDowntime=asset.failures.reduce((a,f)=>a+f.downtime,0);
  const fs=Math.max(0,100-asset.failures.length*15-Math.min(35,totalDowntime/8));
  const as=Math.max(0,((asset.designLifeYears-asset.ageYears)/asset.designLifeYears)*100);
  return Math.round(Math.min(100,Math.max(0,ss*.40+ms*.25+fs*.20+as*.15)));
}

function scoreStatus(s){
  if(s>=80)return{label:'Healthy',color:C.ok,bg:C.okBg};
  if(s>=60)return{label:'Monitored',color:C.info,bg:C.infoBg};
  if(s>=40)return{label:'At Risk',color:C.warn,bg:C.warnBg};
  return{label:'Critical',color:C.crit,bg:C.critBg};
}

function calcRUL(asset,score){
  return Math.max(0,Math.round((asset.designLifeYears-asset.ageYears)*365*(score/100)));
}

function probLevel(score){
  if(score>=80)return 1;if(score>=65)return 2;
  if(score>=50)return 3;if(score>=35)return 4;return 5;
}

function calcKPIs(asset){
  const totalHrs=asset.ageYears*8760;
  const totalDown=asset.failures.reduce((a,f)=>a+f.downtime,0);
  const avail=((totalHrs-totalDown)/totalHrs*100).toFixed(1);
  const mtbf=asset.failures.length>0?Math.round((totalHrs-totalDown)/asset.failures.length):totalHrs;
  const mttr=asset.failures.length>0?Math.round(totalDown/asset.failures.length):0;
  const oee=(avail/100*.95*.98*100).toFixed(1);
  const pmDone=asset.workOrders.filter(w=>w.type==='PM'&&w.status==='Completed').length;
  const pmTotal=asset.workOrders.filter(w=>w.type==='PM').length;
  const pmComp=pmTotal>0?Math.round(pmDone/pmTotal*100):100;
  return{avail:parseFloat(avail),mtbf,mttr,oee:parseFloat(oee),pmComp};
}

/* ── RECOMMENDATIONS ENGINE ── */
function getRecommendations(asset,score){
  const recs=[];
  const th=asset.thresholds;
  const lastTemp=asset.sensorHistory.temperature.slice(-1)[0];
  const lastVib=asset.sensorHistory.vibration.slice(-1)[0];
  const lastPres=asset.sensorHistory.pressure.slice(-1)[0];
  const isCrit=score<40;

  if(lastTemp>=th.temperature.crit){
    recs.push({priority:'Critical',icon:'🌡️',issue:`Temperature ${lastTemp}${th.temperature.unit} - exceeds critical threshold (${th.temperature.crit}${th.temperature.unit})`,action:'Immediate shutdown inspection. Check cooling system, lubrication quality and heat exchanger fouling. Replace thermal sensors.',woType:'EM',assignTechId:asset.category==='rotating'?'T-001':'T-003'});
  } else if(lastTemp>=th.temperature.warn[0]){
    recs.push({priority:'High',icon:'🌡️',issue:`Temperature ${lastTemp}${th.temperature.unit} - in warning band (${th.temperature.warn[0]}-${th.temperature.crit}${th.temperature.unit})`,action:'Inspect cooling circuit, clean heat exchanger surfaces, verify lubricant level and viscosity.',woType:'CM',assignTechId:'T-002'});
  }

  if(lastVib>=th.vibration.crit){
    recs.push({priority:'Critical',icon:'⚡',issue:`Vibration ${lastVib}${th.vibration.unit} - exceeds critical threshold (${th.vibration.crit}${th.vibration.unit})`,action:'Emergency stop recommended. Inspect bearings, shaft alignment, and coupling. Check for imbalance or looseness.',woType:'EM',assignTechId:'T-001'});
  } else if(lastVib>=th.vibration.warn[0]){
    recs.push({priority:'High',icon:'⚡',issue:`Vibration ${lastVib}${th.vibration.unit} - elevated beyond warning (${th.vibration.warn[0]}${th.vibration.unit})`,action:'Schedule bearing inspection and re-alignment check. Monitor at 1-hour intervals.',woType:'CM',assignTechId:asset.category==='pipeline'?'T-006':'T-001'});
  }

  if(lastPres>=th.pressure.crit){
    recs.push({priority:'Critical',icon:'🔵',issue:`Pressure ${lastPres}${th.pressure.unit} - at or above critical limit (${th.pressure.crit}${th.pressure.unit})`,action:'Activate pressure relief protocol immediately. Inspect PRV, check downstream blockages and seal integrity.',woType:'EM',assignTechId:asset.category==='pipeline'?'T-006':'T-003'});
  } else if(lastPres>=th.pressure.warn[0]){
    recs.push({priority:'Medium',icon:'🔵',issue:`Pressure ${lastPres}${th.pressure.unit} - approaching warning limit (${th.pressure.warn[0]}${th.pressure.unit})`,action:'Verify pressure gauges, check for partial blockages or valve restrictions. Log trend for engineering review.',woType:'CM',assignTechId:'T-005'});
  }

  if(asset.daysSinceLastPM>asset.pmFreqDays){
    const overdueDays=asset.daysSinceLastPM-asset.pmFreqDays;
    recs.push({priority:overdueDays>30?'High':'Medium',icon:'📅',issue:`Preventive Maintenance overdue by ${overdueDays} days (interval: ${asset.pmFreqDays} days)`,action:`Schedule and execute ${asset.pmFreqDays}-day PM cycle immediately. Include lubrication, filter change, and calibration checks.`,woType:'PM',assignTechId:asset.category==='pipeline'?'T-006':asset.category==='vessel'?'T-003':'T-001'});
  }

  if(asset.failures.length>=2){
    recs.push({priority:'Medium',icon:'📊',issue:`Recurring failure pattern detected - ${asset.failures.length} failures on record`,action:'Conduct Root Cause Analysis (RCA). Review failure modes, update maintenance strategy. Consider condition-based monitoring upgrade.',woType:'CM',assignTechId:'T-005'});
  }

  if((asset.ageYears/asset.designLifeYears)>=0.75){
    recs.push({priority:'Medium',icon:'⏳',issue:`Asset at ${Math.round(asset.ageYears/asset.designLifeYears*100)}% of design life (${asset.ageYears}/${asset.designLifeYears} years)`,action:'Initiate end-of-life planning. Commission structural integrity assessment and develop replacement procurement strategy.',woType:'PM',assignTechId:'T-005'});
  }

  if(recs.length===0){
    recs.push({priority:'Low',icon:'✅',issue:'Asset within operational parameters - enhanced monitoring recommended',action:'Continue routine PM schedule. Increase sensor sampling frequency for early anomaly detection.',woType:'PM',assignTechId:'T-005'});
  }

  return recs;
}

const randId=(p,l=8)=>`${p}-${Math.floor(10**(l-1)+Math.random()*9*10**(l-1))}`;

const sapApi={
  async createPMNotification(assetId,priority,desc){
    await pause(900);
    const id=randId('NOT');
    return{id,message:`SAP Notification ${id} created (Priority: ${priority})`,assetId,desc,priority,createdAt:new Date().toLocaleString()};
  },
  async createWorkOrder(assetId,type,priority,desc){
    await pause(1200);
    const id=randId('WO');
    return{id,message:`SAP Work Order ${id} created (${type}, Priority: ${priority})`,assetId,type,priority,desc,status:'Open',createdAt:new Date().toLocaleString()};

  async triggerScoreRecalc(assetId){
    await pause(600);
    return{message:`Health score recalculated for ${assetId}`,timestamp:new Date().toLocaleString()};

};

function CircularGauge({score,size=130}){
  const cx=size/2,cy=size/2,r=size*.40;
  const circ=2*Math.PI*r,arc=circ*.75;
  const offset=arc*(1-score/100);
  const st=scoreStatus(score);
  return(
    <svg width={size} height={size}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#EBEBEB" strokeWidth={size*.08}
        strokeDasharray={`${arc} ${circ}`} strokeLinecap="round" transform={`rotate(135,${cx},${cy})`}/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={st.color} strokeWidth={size*.08}
        strokeDasharray={`${Math.max(0,arc-offset)} ${circ}`} strokeLinecap="round"
        transform={`rotate(135,${cx},${cy})`} style={{transition:'stroke-dasharray .9s ease'}}/>
      <text x={cx} y={cy-4} textAnchor="middle" dominantBaseline="middle"
        fontSize={size*.22} fontWeight={800} fill={st.color}>{score}</text>
      <text x={cx} y={cy+size*.16} textAnchor="middle" fontSize={size*.09} fill={C.mid}>{st.label}</text>
    </svg>
  );
}

function RULBar({asset,score}){
  const rul=calcRUL(asset,score);
  const totalDays=asset.designLifeYears*365;
  const pct=Math.min(100,(rul/totalDays)*100);
  const color=pct>60?C.ok:pct>30?C.warn:C.crit;
  const endDate=new Date(Date.now()+rul*86400000).toLocaleDateString('en-GB',{month:'short',year:'numeric'});
  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:4}}>
        <span style={{color:C.lt}}>Remaining Useful Life</span>
        <span style={{fontWeight:700,color}}>{rul.toLocaleString()} days</span>
      </div>
      <div style={{height:10,background:'#EBEBEB',borderRadius:5,overflow:'hidden',position:'relative'}}>
        <div style={{height:'100%',width:`${pct}%`,background:color,borderRadius:5,transition:'width .8s ease'}}/>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:C.lt,marginTop:3}}>
        <span>Est. EOL: <strong>{endDate}</strong></span>
        <span style={{color}}>{pct.toFixed(0)}% remaining</span>
      </div>
    </div>
  );
}

function Spark({data,color,width=80,height=28}){
  if(\!data||data.length<2)return null;
  const min=Math.min(...data),max=Math.max(...data),range=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*width},${height-(((v-min)/range)*height*.85+height*.075)}`).join(' ');
  return(
    <svg width={width} height={height} style={{display:'block'}}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth={1.5} strokeLinejoin="round"/>
      <circle cx={(data.length-1)/(data.length-1)*width} cy={height-(((data[data.length-1]-min)/range)*height*.85+height*.075)} r={2.5} fill={color}/>
    </svg>
  );
}

function TrendChart({series,labels,width=420,height=140,thresholds=[]}){
  const allVals=series.flatMap(s=>s.values);
  const minV=Math.min(...allVals),maxV=Math.max(...allVals);
  const range=maxV-minV||1;
  const px=32,py=12,cw=width-px-10,ch=height-py-24;
  const gx=i=>px+(i/(labels.length-1))*cw;
  const gy=v=>py+ch-(((v-minV)/range)*ch);
  return(
    <svg width={width} height={height} style={{overflow:'visible'}}>
      {[0,.25,.5,.75,1].map(f=>(
        <line key={f} x1={px} x2={px+cw} y1={py+ch*(1-f)} y2={py+ch*(1-f)} stroke="#F0F0F0" strokeWidth={1}/>
      ))}
      {thresholds.map(t=>(
        <line key={t.value} x1={px} x2={px+cw} y1={gy(Math.min(t.value,maxV))} y2={gy(Math.min(t.value,maxV))}
          stroke={t.color} strokeWidth={1} strokeDasharray="4,3" opacity={.7}/>
      ))}
      {series.map(s=>{
        const pts=s.values.map((v,i)=>`${gx(i)},${gy(v)}`).join(' ');
        return <polyline key={s.name} points={pts} fill="none" stroke={s.color} strokeWidth={2} strokeLinejoin="round"/>;
      })}
      {series.map(s=>{
        const v=s.values[s.values.length-1];
        return <circle key={s.name} cx={gx(s.values.length-1)} cy={gy(v)} r={3} fill={s.color}/>;
      })}
      {labels.map((l,i)=>(i%2===0||i===labels.length-1)&&(
        <text key={i} x={gx(i)} y={py+ch+14} textAnchor="middle" fontSize={9} fill={C.lt}>{l}</text>
      ))}
      <text x={px-4} y={py+2} textAnchor="end" fontSize={9} fill={C.lt}>{(maxV).toFixed(0)}</text>
      <text x={px-4} y={py+ch} textAnchor="end" fontSize={9} fill={C.lt}>{(minV).toFixed(0)}</text>
    </svg>
  );
}

function RiskMatrix({assets,scores,onDotClick,focusId=null}){
  const W=340,H=280,ox=50,oy=8,cols=5,rows=5;
  const cw=(W-ox-10)/cols,ch=(H-oy-30)/rows;
  const RISK=[
    ['#B7D7A8','#B7D7A8','#B7D7A8','#FFE082','#FF8F00'],
    ['#B7D7A8','#B7D7A8','#FFE082','#FF8F00','#FF8F00'],
    ['#B7D7A8','#FFE082','#FFE082','#FF8F00','#E53935'],
    ['#B7D7A8','#FFE082','#FF8F00','#E53935','#E53935'],
    ['#FFE082','#FF8F00','#FF8F00','#E53935','#E53935'],
  ];
  const PROB=['Rare','Unlikely','Possible','Likely','Almost Certain'];
  const CONS=['Insig.','Minor','Moderate','Major','Catastrophic'];
  return(
    <svg width={W} height={H}>
      {RISK.map((row,ri)=>row.map((color,ci)=>(
        <rect key={`${ri}-${ci}`} x={ox+ci*cw} y={oy+(rows-1-ri)*ch} width={cw-1} height={ch-1} fill={color} opacity={.65} rx={2}/>
      )))}
      {PROB.map((l,i)=>(
        <text key={l} x={ox-4} y={oy+(rows-1-i)*ch+ch/2} textAnchor="end" fontSize={8} fill={C.mid} dominantBaseline="middle">{l}</text>
      ))}
      {CONS.map((l,i)=>(
        <text key={l} x={ox+i*cw+cw/2} y={oy+rows*ch+14} textAnchor="middle" fontSize={8} fill={C.mid}>{l}</text>
      ))}
      <text x={6} y={H/2} fontSize={9} fill={C.mid} transform={`rotate(-90,6,${H/2})`} textAnchor="middle">Probability</text>
      <text x={ox+(W-ox)/2} y={H-2} fontSize={9} fill={C.mid} textAnchor="middle">Consequence</text>
      {assets.map(a=>{
        const sc=scores[a.id]||50;
        const prob=Math.min(5,probLevel(sc));
        const cons=a.consequence;
        const dx=ox+(cons-.5)*cw,dy=oy+(rows-prob)*ch+ch/2;
        const st=scoreStatus(sc);
        const isFocus=focusId===a.id;
        return(
          <g key={a.id} onClick={()=>onDotClick(a)} style={{cursor:'pointer'}}>
            <circle cx={dx} cy={dy} r={isFocus?14:11} fill={st.color} opacity={isFocus?.95:.75}
              stroke={isFocus?'#FFF':'none'} strokeWidth={2} style={{transition:'r .3s'}}/>
            <text x={dx} y={dy} textAnchor="middle" dominantBaseline="middle" fontSize={7} fill="#FFF" fontWeight={700} style={{pointerEvents:'none'}}>
              {a.id.replace('A-0','')}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

function LifecycleStepper({stage}){
  return(
    <div style={{display:'flex',alignItems:'center',gap:0}}>
      {LIFECYCLE.map((s,i)=>{
        const active=i===stage,past=i<stage;
        const color=active?C.info:past?C.ok:C.lt;
        return(
          <React.Fragment key={s}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
              <div style={{width:24,height:24,borderRadius:'50%',background:active?C.info:past?C.ok:'#E0E0E0',
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:active||past?'#FFF':C.lt,fontWeight:700}}>
                {past?'✓':i+1}
              </div>
              <span style={{fontSize:9,color,fontWeight:active?700:400,whiteSpace:'nowrap'}}>{s}</span>

        );
      })}

}

function ToastStack({toasts,onDismiss}){
  const cm={success:C.ok,error:C.crit,info:C.info,warning:C.warn};
  const bm={success:C.okBg,error:C.critBg,info:C.infoBg,warning:C.warnBg};
  const im={success:'✅',error:'❌',info:'i️',warning:'⚠️'};
  return(
    <div style={{position:'fixed',bottom:24,right:24,display:'flex',flexDirection:'column',gap:10,zIndex:9999,maxWidth:360}}>
      {toasts.map(t=>(
        <div key={t.id} className="fadein" style={{background:bm[t.type]||bm.info,
          border:`1px solid ${cm[t.type]||cm.info}44`,borderLeft:`4px solid ${cm[t.type]||cm.info}`,
          borderRadius:8,padding:'12px 14px',boxShadow:'0 4px 16px rgba(0,0,0,.14)',
          display:'flex',gap:10,alignItems:'flex-start'}}>
          <span style={{fontSize:17,flexShrink:0}}>{im[t.type]}</span>
          <div style={{flex:1}}>
            {t.title&&<div style={{fontWeight:700,fontSize:12,color:cm[t.type],marginBottom:2}}>{t.title}</div>}
            <div style={{fontSize:12,color:C.dark}}>{t.message}</div>
          </div>
          <button onClick={()=>onDismiss(t.id)} style={{background:'none',border:'none',color:C.lt,fontSize:15,padding:0,flexShrink:0}}>✕</button>
        </div>
      ))}
    </div>
  );
}

        ].map(m=>(
          <div key={m.label} style={{background:C.card,border:`1px solid ${C.bdr}`,borderTop:`3px solid ${m.color}`,borderRadius:8,padding:'10px 16px',flex:'1 1 120px'}}>
            <div style={{fontSize:24,fontWeight:800,color:m.color}}>{m.count}</div>
            <div style={{fontSize:11,color:C.mid,marginTop:2}}>{m.label}</div>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:16}}>
        {assets.map(a=>{
          const sc=scores[a.id]||50;
          const st=scoreStatus(sc);
          const lastTemp=a.sensorHistory.temperature.slice(-1)[0];
          const lastVib=a.sensorHistory.vibration.slice(-1)[0];
          const lastPres=a.sensorHistory.pressure.slice(-1)[0];
          const needsAction=sc<60;
          const existingWO=activeWOs.find(w=>w.assetId===a.id&&w.status\!=='Completed');
          const completedWO=activeWOs.filter(w=>w.assetId===a.id&&w.status==='Completed').length;

          return(
            <div key={a.id}
              style={{background:C.card,border:`2px solid ${needsAction?st.color:C.bdr}`,borderRadius:10,
                borderLeft:`5px solid ${st.color}`,cursor:'pointer',
                boxShadow:needsAction?`0 2px 12px ${st.color}25`:'0 1px 4px rgba(0,0,0,.07)',
                transition:'box-shadow .2s'}}
              onMouseEnter={e=>e.currentTarget.style.boxShadow=`0 6px 20px ${st.color}30`}
              onMouseLeave={e=>e.currentTarget.style.boxShadow=needsAction?`0 2px 12px ${st.color}25`:'0 1px 4px rgba(0,0,0,.07)'}>

              {/* Card header */}
              <div onClick={()=>onSelect(a)} style={{padding:'14px 16px',borderBottom:`1px solid ${C.bdr}`,display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div>
                  <div style={{fontSize:10,color:C.lt,marginBottom:2}}>{a.id}   |   {a.type}</div>
                  <div style={{fontWeight:700,fontSize:14}}>{a.icon} {a.shortName}</div>
                  <div style={{fontSize:11,color:C.mid}}>{a.location}</div>
                </div>
                <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
                  <ScoreBadge score={sc}/>
                  {completedWO>0&&<span style={{fontSize:10,color:C.ok,fontWeight:700}}>✅ {completedWO} WO completed</span>}
                </div>
              </div>

              {/* Gauges & sensors */}
              <div onClick={()=>onSelect(a)} style={{padding:'14px 16px',display:'flex',gap:16,alignItems:'center'}}>
                <CircularGauge score={sc} size={100}/>
                <div style={{flex:1}}>
                  <RULBar asset={a} score={sc}/>
                  <div style={{marginTop:12,display:'flex',flexDirection:'column',gap:4}}>
                    {[
                      {label:'Temp',val:lastTemp,unit:a.thresholds.temperature.unit,warn:a.thresholds.temperature.warn[0],crit:a.thresholds.temperature.crit},
                      {label:'Vib', val:lastVib, unit:a.thresholds.vibration.unit,  warn:a.thresholds.vibration.warn[0],  crit:a.thresholds.vibration.crit},
                      {label:'Pres',val:lastPres,unit:a.thresholds.pressure.unit,   warn:a.thresholds.pressure.warn[0],   crit:a.thresholds.pressure.crit},
                    ].map(s=>{
                      const sc2=s.val>=s.crit?C.crit:s.val>=s.warn?C.warn:C.ok;
                      return(
                        <div key={s.label} style={{display:'flex',justifyContent:'space-between',fontSize:11}}>
                          <span style={{color:C.lt}}>{s.label}</span>
                          <span style={{fontWeight:700,color:sc2}}>{s.val} {s.unit}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>

              {/* Active WO status strip */}
              {existingWO&&(
                <div style={{margin:'0 16px',marginBottom:8,padding:'8px 12px',
                  background:existingWO.status==='In Progress'?C.infoBg:C.warnBg,
                  border:`1px solid ${existingWO.status==='In Progress'?C.info:C.warn}33`,
                  borderRadius:8,display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:13}}>{existingWO.status==='In Progress'?'🔧':'📋'}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:11,fontWeight:700,color:existingWO.status==='In Progress'?C.info:C.warn}}>
                      {existingWO.id} - {existingWO.status}
                    </div>
                    <div style={{fontSize:10,color:C.mid}}>{existingWO.technician.avatar} {existingWO.technician.name}   |   {existingWO.technician.role}</div>
                  </div>
                  <span style={{background:existingWO.status==='In Progress'?C.info:C.warn,color:'#FFF',borderRadius:10,padding:'2px 8px',fontSize:10,fontWeight:700}}>
                    {existingWO.status}
                  </span>
                </div>
              )}

              {/* Footer: action button for critical/at-risk */}
              <div style={{padding:'10px 16px',borderTop:`1px solid ${C.bdr}`,display:'flex',justifyContent:'space-between',alignItems:'center',background:needsAction?`${st.color}08`:'#FAFAFA',borderRadius:'0 0 8px 8px'}}>
                <div>
                  <span style={{fontSize:11,color:C.lt}}>Age: {a.ageYears} yr / {a.designLifeYears} yr</span>
                  <span style={{fontSize:11,color:C.lt,marginLeft:8}}>  |   {a.manufacturer}</span>
                </div>
                {needsAction&&\!existingWO&&(
                  <button onClick={e=>{e.stopPropagation();onInitiateAction(a);}}
                    style={{padding:'6px 16px',borderRadius:6,border:'none',
                      background:sc<40?C.crit:C.warn,color:'#FFF',
                      fontWeight:700,fontSize:12,display:'flex',alignItems:'center',gap:6,
                      boxShadow:`0 2px 8px ${st.color}50`}}>
                    {sc<40?'🚨':'⚠️'} Initiate Action
                  </button>
                )}
                {needsAction&&existingWO&&existingWO.status==='Open'&&(
                  <span style={{fontSize:11,color:C.info,fontWeight:700}}>📋 WO Open - awaiting start</span>
                )}
                {needsAction&&existingWO&&existingWO.status==='In Progress'&&(
                  <span style={{fontSize:11,color:C.info,fontWeight:700}} className="pulse">🔧 Work in Progress...</span>
                )}
                {\!needsAction&&<span style={{fontSize:11,color:C.ok}}>✅ Healthy / Monitored</span>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

  const runForecast=async()=>{
    setFRunning(true);setFStep(0);setFScore(score);setFRul(calcRUL(asset,score));
    for(let i=0;i<FORECAST_STEPS.length;i++){
      await pause(1400);
      const newScore=Math.max(0,score+FORECAST_STEPS[i].scoreDelta);
      setFScore(newScore);setFRul(calcRUL(asset,newScore));setFStep(i);
      if(i===1){const n=await sapApi.createPMNotification(asset.id,'Medium',`Oil temp ${FORECAST_STEPS[i].temp}°C`);addLog({type:'EAM',action:'PM Notification Created',detail:n.message,doc:n.id,assetId:asset.id});addToast({type:'warning',title:'⚠️ SAP Notification',message:n.message});}
      if(i===2){const w=await sapApi.createWorkOrder(asset.id,'CM','High',`Oil temp ${FORECAST_STEPS[i].temp}°C`);addLog({type:'EAM',action:'Work Order Created',detail:w.message,doc:w.id,assetId:asset.id});addToast({type:'error',title:'🔧 SAP Work Order',message:w.message});}

/* ── TAB 3 - RISK & COMPLIANCE ── */
function RiskCompliance({assets,scores,addLog,addToast}){
  const [focusId,setFocusId]=useState(null);
  const [tooltip,setTooltip]=useState(null);
  const handleDotClick=a=>{setFocusId(a.id===focusId?null:a.id);setTooltip(a.id===focusId?null:a);};
  const RISK_ZONE=['Low Risk','Low-Medium','Medium','High','Intolerable'];
  const riskLabel=a=>{const sc=scores[a.id]||50;const prob=probLevel(sc);const idx=Math.round((prob+a.consequence)/2)-1;return RISK_ZONE[Math.min(4,Math.max(0,idx))];};
  return(
    <div style={{padding:20,display:'flex',flexDirection:'column',gap:16}}>
      <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:16}}>
        <SectionCard title="Risk Matrix - Probability vs Consequence" icon="⚠️" style={{minWidth:380}}>
          <div style={{padding:'16px 20px'}}>
            <RiskMatrix assets={assets} scores={scores} onDotClick={handleDotClick} focusId={focusId}/>
            <div style={{marginTop:12,display:'flex',gap:12,flexWrap:'wrap'}}>
              {[{c:'#B7D7A8',l:'Low'},{c:'#FFE082',l:'Medium'},{c:'#FF8F00',l:'High'},{c:'#E53935',l:'Very High/Intolerable'}].map(m=>(
                <div key={m.l} style={{display:'flex',alignItems:'center',gap:4,fontSize:11}}>
                  <div style={{width:12,height:12,background:m.c,borderRadius:2}}/><span style={{color:C.mid}}>{m.l}</span>
                </div>
              ))}
            </div>
            {tooltip&&(
              <div className="fadein" style={{marginTop:12,background:C.infoBg,border:`1px solid ${C.info}33`,borderRadius:8,padding:12}}>
                <div style={{fontWeight:700,fontSize:13,color:C.info}}>{tooltip.icon} {tooltip.name}</div>
                <div style={{fontSize:11,color:C.mid,marginTop:4}}>
                  Health Score: <strong style={{color:scoreStatus(scores[tooltip.id]).color}}>{scores[tooltip.id]}</strong> &nbsp;|&nbsp;
                  Consequence: <strong>Level {tooltip.consequence}/5</strong> &nbsp;|&nbsp;
                  Risk Zone: <strong>{riskLabel(tooltip)}</strong>
                </div>
              </div>
            )}
          </div>
        </SectionCard>
        <SectionCard title="Regulatory Compliance Tracker" icon="📜">
          <div style={{padding:'0 14px 14px'}}>
            {assets.map(a=>{
              const cEntries=Object.entries(a.compliance);
              if(\!cEntries.length)return null;
              return(
                <div key={a.id} style={{marginTop:14,borderBottom:`1px solid ${C.bdr}`,paddingBottom:14}}>
                  <div style={{fontWeight:700,fontSize:13,marginBottom:8,color:C.dark}}>{a.icon} {a.shortName} - {a.location}</div>
                  {cEntries.map(([std,info])=>{
                    const sc={Compliant:{c:C.ok,bg:C.okBg,ic:'✅'},'Due Soon':{c:C.warn,bg:C.warnBg,ic:'⚠️'},Overdue:{c:C.crit,bg:C.critBg,ic:'❌'}}[info.status]||{c:C.lt,bg:'#F5F5F5',ic:'○'};
                    const daysToDue=Math.round((new Date(info.nextDue)-Date.now())/86400000);
                    return(
                      <div key={std} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 10px',background:sc.bg,border:`1px solid ${sc.c}22`,borderRadius:6,marginBottom:6}}>
                        <span style={{fontSize:14,flexShrink:0}}>{sc.ic}</span>
                        <div style={{flex:1}}>
                          <span style={{fontWeight:700,fontSize:12,color:sc.c}}>{std}</span>
                          <span style={{fontSize:11,color:C.mid,marginLeft:8}}>{COMPLIANCE_DEFS.find(d=>d.id===std)?.desc||''}</span>
                        </div>
                        <div style={{fontSize:11,color:C.mid,textAlign:'right',minWidth:140}}>
                          <div>Last: {info.lastAudit}</div>
                          <div style={{color:daysToDue<0?C.crit:daysToDue<30?C.warn:C.mid}}>Due: {info.nextDue} ({daysToDue<0?`${Math.abs(daysToDue)}d overdue`:`${daysToDue}d`})</div>
                        </div>
                        <button onClick={async()=>{const r=await sapApi.scheduleAudit(a.id,std);addLog({type:'AUDIT',action:'Audit Scheduled',detail:r.message,doc:r.id,assetId:a.id});addToast({type:'info',title:'Audit Scheduled',message:r.message});}}
                          style={{padding:'4px 10px',borderRadius:5,border:`1px solid ${C.info}`,background:C.infoBg,color:C.info,fontSize:11,fontWeight:700,whiteSpace:'nowrap'}}>
                          Schedule Audit
                        </button>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        </SectionCard>
      </div>
    </div>
  );
}

/* ── TAB 4 - FINANCIAL IMPACT ── */
function FinancialImpact({assets,scores}){
  const [pmMultipliers,setPmMult]=useState(()=>Object.fromEntries(assets.map(a=>[a.id,1])));
  const calcCostAtRisk=(asset,score,pmMult)=>{const failProb=Math.max(0,(100-score)/100*0.9/pmMult);return Math.round(asset.replacementCost*.25*failProb+asset.downtimeCostPerDay*3*failProb);};
  const calcProjectedDowntime=(asset,score,pmMult)=>{const kpi=calcKPIs(asset);return Math.max(0,Math.round(kpi.mttr/24*(100-score)/100/pmMult));};
  const calcROI=(asset,pmMult)=>{const pmCostPerYear=asset.workOrders.filter(w=>w.type==='PM').reduce((s,w)=>s+w.cost,0);const avoided=asset.downtimeCostPerDay*calcKPIs(asset).mttr/24*pmMult;return avoided>0?Math.round((avoided-pmCostPerYear)/pmCostPerYear*100):0;};
  const totalExposure=assets.reduce((s,a)=>s+calcCostAtRisk(a,scores[a.id]||50,pmMultipliers[a.id]),0);
  const pmLabels=['Monthly','Bi-weekly','Weekly','Daily'];
  return(
    <div style={{padding:20}}>
      <div style={{background:C.critBg,border:`1px solid ${C.crit}33`,borderRadius:10,padding:'14px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div>
          <div style={{fontSize:11,color:C.crit,fontWeight:700,marginBottom:2}}>TOTAL FINANCIAL EXPOSURE (90-day horizon)</div>
          <div style={{fontSize:32,fontWeight:800,color:C.crit}}>${totalExposure.toLocaleString()}</div>
        </div>
        <div style={{fontSize:12,color:C.mid,maxWidth:300}}>Aggregate cost at risk across all monitored assets. Adjust PM frequency below to model financial impact.</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:16}}>
        {assets.map(a=>{
          const sc=scores[a.id]||50;const pm=pmMultipliers[a.id];
          const car=calcCostAtRisk(a,sc,pm);const pd=calcProjectedDowntime(a,sc,pm);const roi=calcROI(a,pm);
          const failPct=Math.max(0,Math.round((100-sc)*.9/pm));
          return(
            <div key={a.id} style={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:10,padding:'16px',borderTop:`3px solid ${scoreStatus(sc).color}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                <div><div style={{fontWeight:700,fontSize:13}}>{a.icon} {a.shortName}</div><div style={{fontSize:11,color:C.lt}}>{a.type}</div></div>
                <ScoreBadge score={sc}/>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
                {[
                  {label:'Cost at Risk',val:`$${car.toLocaleString()}`,color:C.crit},
                  {label:'Downtime Cost/Day',val:`$${a.downtimeCostPerDay.toLocaleString()}`,color:C.warn},
                  {label:'Projected Downtime',val:`${pd} days`,color:C.mid},
                  {label:'Maintenance ROI',val:`${roi}%`,color:roi>100?C.ok:C.mid},
                  {label:'Failure Probability',val:`${failPct}%`,color:failPct>40?C.crit:failPct>20?C.warn:C.ok},
                  {label:'Replacement Cost',val:`$${(a.replacementCost/1e6).toFixed(1)}M`,color:C.mid},
                ].map(m=>(
                  <div key={m.label} style={{background:'#F8F8F8',borderRadius:6,padding:'8px 10px'}}>
                    <div style={{fontSize:10,color:C.lt}}>{m.label}</div>
                    <div style={{fontSize:14,fontWeight:700,color:m.color,marginTop:2}}>{m.val}</div>
                  </div>
                ))}
              </div>
              <div style={{borderTop:`1px solid ${C.bdr}`,paddingTop:12}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:6}}>
                  <span style={{fontWeight:700,color:C.dark}}>What-If: PM Frequency</span>
                  <span style={{color:C.info,fontWeight:700}}>{pmLabels[pm-1]}</span>
                </div>
                <input type="range" min={1} max={4} value={pm} onChange={e=>setPmMult(prev=>({...prev,[a.id]:parseInt(e.target.value)}))}/>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:C.lt,marginTop:2}}>
                  <span>Monthly</span><span>Bi-weekly</span><span>Weekly</span><span>Daily</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── ROOT APPLICATION ── */
function App(){
  const initScores=()=>Object.fromEntries(ASSETS.map(a=>[a.id,calcHealthScore(a)]));
  const [tab,setTab]=useState(0);
  const [scores,setScores]=useState(initScores);
  const [selectedAsset,setSelectedAsset]=useState(null);
  const [activityLog,setActivityLog]=useState([]);
  const [toasts,setToasts]=useState([]);
  const [recalcLoading,setRecalcLoading]=useState(false);
  const [activeWOs,setActiveWOs]=useState([]);
  const [actionModal,setActionModal]=useState(null); // {asset,score}

  useEffect(()=>{if(\!toasts.length)return;const t=setTimeout(()=>setToasts(p=>p.slice(1)),5500);return()=>clearTimeout(t);},[toasts]);
  const addToast=useCallback(t=>setToasts(p=>[...p,{...t,id:Date.now()+Math.random()}]),[]);
  const dismissToast=useCallback(id=>setToasts(p=>p.filter(t=>t.id\!==id)),[]);
  const addLog=useCallback(e=>setActivityLog(p=>[{...e,time:new Date().toLocaleTimeString(),id:Date.now()+Math.random()},...p]),[]);

  const handleRecalc=async()=>{
    setRecalcLoading(true);await pause(800);
    setScores(prev=>{
      const next={...prev};
      ASSETS.forEach(a=>{const noise=(Math.random()-.5)*8;next[a.id]=Math.round(Math.max(0,Math.min(100,calcHealthScore(a)+noise)));});
      return next;
    });
    const r=await sapApi.triggerScoreRecalc('ALL');
    addLog({type:'EAM',action:'Health Score Recalculation',detail:r.message,doc:'BATCH',assetId:'ALL'});
    addToast({type:'info',title:'Recalculation Complete',message:'All asset health scores updated'});
    setRecalcLoading(false);
  };

  const handleSelectAsset=a=>{setSelectedAsset(a);setTab(1);};
  const handleInitiateAction=a=>{setActionModal({asset:a,score:scores[a.id]||50});};

  const handleCreateWO=async(wo)=>{
    setActiveWOs(prev=>[wo,...prev]);
    setActionModal(null);
    addLog({type:'EAM',action:'Work Order Created',detail:`${wo.type} WO for ${wo.assetName} - assigned to ${wo.technician.name}`,doc:wo.id,assetId:wo.assetId});
    addToast({type:'warning',title:`📋 Work Order Created - ${wo.id}`,message:`Assigned to ${wo.technician.avatar} ${wo.technician.name} (${wo.technician.role})`});
    // Switch to Action Centre
    setTimeout(()=>setTab(5),600);
  };

  const handleUpdateWOStatus=useCallback((woId,newStatus)=>{
    setActiveWOs(prev=>prev.map(wo=>{
      if(wo.id\!==woId)return wo;
      const updated={...wo,status:newStatus};
      if(newStatus==='In Progress')updated.startedAt=new Date().toLocaleString();
      if(newStatus==='Completed'){
        updated.completedAt=new Date().toLocaleString();
        const boost=15+Math.floor(Math.random()*11); // +15 to +25
        updated.scoreBoost=boost;
        // Boost asset score
        setScores(prev=>{
          const next={...prev};
          next[wo.assetId]=Math.min(100,(prev[wo.assetId]||50)+boost);
          return next;
        });
        addLog({type:'EAM',action:'Work Order Completed',detail:`${wo.id} completed by ${wo.technician.name} - health score +${boost} pts`,doc:wo.id,assetId:wo.assetId});
        addToast({type:'success',title:`✅ WO Completed - ${wo.id}`,message:`${wo.technician.avatar} ${wo.technician.name} completed the work. Health score boosted +${boost} pts.`});
      } else {
        addLog({type:'EAM',action:'Work Order Started',detail:`${wo.id} started by ${wo.technician.name} (${wo.technician.role})`,doc:wo.id,assetId:wo.assetId});
        addToast({type:'info',title:`🔧 Work Started - ${wo.id}`,message:`${wo.technician.avatar} ${wo.technician.name} has begun work on ${wo.assetName}`});
      }
      return updated;
    }));
  },[addLog,addToast]);

  const TABS=[
    {label:'Fleet Overview',icon:'🏭'},
    {label:'Asset Detail',icon:'🔍'},
    {label:'Risk & Compliance',icon:'⚠️'},
    {label:'Financial Impact',icon:'💰'},
    {label:'KPI Dashboard',icon:'📊'},
    {label:'Action Centre',icon:'⚡'},
  ];

  const critCount=ASSETS.filter(a=>scores[a.id]<40).length;
  const riskCount=ASSETS.filter(a=>scores[a.id]>=40&&scores[a.id]<60).length;
  const openWOs=activeWOs.filter(w=>w.status==='Open').length+activeWOs.filter(w=>w.status==='In Progress').length;

  return(
    <div style={{minHeight:'100vh',background:C.pg}}>
      {/* Top header */}
      <div style={{background:C.hdr,color:'#FFF',height:54,display:'flex',alignItems:'center',
        padding:'0 20px',gap:16,boxShadow:'0 2px 10px rgba(0,0,0,.3)',position:'sticky',top:0,zIndex:100}}>
        <div style={{fontSize:20,fontWeight:800,letterSpacing:1}}>
          <span style={{color:'#64B5F6'}}>SAP</span>
          <span style={{color:'#FF8F00',marginLeft:4}}>⛽</span>
          <span style={{marginLeft:4}}>Asset Health Intelligence</span>
        </div>
        <div style={{flex:1,fontSize:11,opacity:.55,paddingLeft:14,borderLeft:'1px solid rgba(255,255,255,.2)'}}>
          Oil & Gas   |   Predictive Maintenance Platform   |   S/4HANA EAM Integration
        </div>
        <div style={{display:'flex',gap:10,fontSize:12,alignItems:'center'}}>
          {critCount>0&&<span style={{background:C.crit,color:'#FFF',borderRadius:12,padding:'3px 10px',fontWeight:700,fontSize:11}}>🚨 {critCount} Critical</span>}
          {riskCount>0&&<span style={{background:C.warn,color:'#FFF',borderRadius:12,padding:'3px 10px',fontWeight:700,fontSize:11}}>⚠️ {riskCount} At Risk</span>}
          {openWOs>0&&<span style={{background:C.info,color:'#FFF',borderRadius:12,padding:'3px 10px',fontWeight:700,fontSize:11}}>🔧 {openWOs} WO Active</span>}
          <span style={{opacity:.7}}>System: PRD   |   Client: 100</span>
          <span style={{background:'rgba(255,255,255,.15)',padding:'4px 12px',borderRadius:14}}>👤 Asset Engineer</span>
        </div>
      </div>

      {/* Tab nav */}
      <div style={{background:C.hdr2,display:'flex',gap:0,padding:'0 20px',overflowX:'auto'}}>
        {TABS.map((t,i)=>{
          const hasBadge=i===5&&openWOs>0;
          return(
            <button key={i} onClick={()=>setTab(i)}
              style={{padding:'12px 18px',border:'none',background:'none',position:'relative',
                color:tab===i?'#FFF':'rgba(255,255,255,.55)',
                fontWeight:tab===i?700:400,fontSize:13,borderBottom:tab===i?'3px solid #64B5F6':'3px solid transparent',
                whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:6}}>
              <span>{t.icon}</span>{t.label}
              {hasBadge&&<span style={{background:C.crit,color:'#FFF',borderRadius:'50%',width:18,height:18,fontSize:10,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center'}}>{openWOs}</span>}
            </button>
          );
        })}
      </div>

      {/* Breadcrumb */}
      <div style={{background:'#EEF1F4',borderBottom:`1px solid ${C.bdr}`,padding:'5px 20px',fontSize:11,color:C.lt}}>
        Home > Asset Management > {TABS[tab].label}
        {tab===1&&selectedAsset?` > ${selectedAsset.name}`:''}
      </div>

      {/* Content */}
      <div style={{maxWidth:1440,margin:'0 auto'}}>
        {tab===0&&<FleetOverview assets={ASSETS} scores={scores} onSelect={handleSelectAsset}
          onRecalc={handleRecalc} recalcLoading={recalcLoading}
          activeWOs={activeWOs} onInitiateAction={handleInitiateAction}/>}
        {tab===1&&(selectedAsset?(
          <AssetDetail asset={selectedAsset} score={scores[selectedAsset.id]||50} addLog={addLog} addToast={addToast}/>
        ):(
          <div style={{padding:60,textAlign:'center',color:C.lt}}>
            <div style={{fontSize:48,marginBottom:16}}>🔍</div>
            <div style={{fontSize:16,fontWeight:600,marginBottom:8}}>No asset selected</div>
            <div style={{fontSize:13}}>Click any asset card in Fleet Overview to view detailed analysis.</div>
          </div>
        ))}
        {tab===2&&<RiskCompliance assets={ASSETS} scores={scores} addLog={addLog} addToast={addToast}/>}
        {tab===3&&<FinancialImpact assets={ASSETS} scores={scores}/>}
        {tab===4&&<KPIDashboard assets={ASSETS} scores={scores}/>}
        {tab===5&&<ActionCentre log={activityLog} activeWOs={activeWOs} onUpdateWOStatus={handleUpdateWOStatus}/>}
      </div>

      <div style={{textAlign:'center',fontSize:11,color:C.lt,padding:'16px 0',borderTop:`1px solid ${C.bdr}`,marginTop:20}}>
        SAP Asset Health Intelligence   |   Oil & Gas Prototype   |   ISO 55000   |   API 580   |   OSHA PSM   |   IEC 61511   |   {new Date().toLocaleDateString()}
      </div>

      <ToastStack toasts={toasts} onDismiss={dismissToast}/>

      {/* Action Modal overlay */}
      {actionModal&&(
        <ActionModal
          asset={actionModal.asset}
          score={actionModal.score}
          onClose={()=>setActionModal(null)}
          onSubmit={handleCreateWO}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
