const SIM_TAGS={
  'Centrifugal Pump':        ['VIBRATION','DISCHARGE_PRESSURE','FLOW_RATE','SUCTION_PRESSURE'],
  'Reciprocating Compressor':['VIBRATION','DISCHARGE_TEMP','DISCHARGE_PRESSURE','RPM'],
  'Shell & Tube Heat Exch.': ['DIFFERENTIAL_PRES','INLET_TEMP','OUTLET_TEMP','FLOW_RATE'],
  '3-Phase Separator':       ['LEVEL','PRESSURE','TEMPERATURE','GAS_FLOW'],
  'Control Valve':           ['POSITION','UPSTREAM_PRESSURE','DOWNSTREAM_PRESSURE'],
};
const REASON_RELEVANT=['True Early Warning','Confirmed Precursor','Coincident with Failure','Pre-Maintenance Signal'];
const REASON_NOT_RELEVANT=['Normal Process Variation','Known Operational Change','Sensor Noise','Startup/Shutdown','Test/Calibration'];
const REASON_UNCERTAIN=['Insufficient Data','Needs Expert Review'];

function AnomalyChart({timeseries,alerts,woMarkers,failMarkers,scoreThreshold,outageWindows}){
  if(!timeseries||timeseries.length===0)return null;
  const W=560,H=110,PAD={t:10,r:10,b:22,l:36};
  const iW=W-PAD.l-PAD.r, iH=H-PAD.t-PAD.b;
  const n=timeseries.length;
  const xScale=i=>PAD.l+i/Math.max(1,n-1)*iW;
  const yScale=s=>PAD.t+iH-(s/100)*iH;
  // Area path
  const pts=timeseries.map((r,i)=>`${xScale(i).toFixed(1)},${yScale(r.score).toFixed(1)}`).join(' ');
  const areaPath=`M${PAD.l},${PAD.t+iH} L${timeseries.map((r,i)=>`${xScale(i).toFixed(1)},${yScale(r.score).toFixed(1)}`).join(' L')} L${xScale(n-1).toFixed(1)},${PAD.t+iH} Z`;
  // Threshold line Y
  const thY=yScale(scoreThreshold||50);
  // Map ts string to x by finding nearest index
  const tsToX=(ts)=>{
    if(!ts)return null;
    const idx=timeseries.findIndex(r=>r.ts>=ts.substring(0,16));
    return idx>=0?xScale(idx):null;
  };
  // Alert bands
  const alertBands=alerts.map(a=>{
    const x1=tsToX(a.alertStartFmt);
    const x2=tsToX(a.alertEndFmt)||x1;
    return x1!=null?{x1,x2:Math.max(x1+2,x2),color:a.severity==='CRIT'?'#E9453033':'#E9730C33'}:null;
  }).filter(Boolean);
  // Y axis labels
  const yTicks=[0,25,50,75,100];
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:H,display:'block'}}>
      {/* Y grid + labels */}
      {yTicks.map(v=>(
        <g key={v}>
          <line x1={PAD.l} x2={W-PAD.r} y1={yScale(v)} y2={yScale(v)} stroke='#E8EAED' strokeWidth={0.5}/>
          <text x={PAD.l-4} y={yScale(v)+3} textAnchor='end' fontSize={8} fill='#9AA0A6'>{v}</text>
        </g>
      ))}
      {/* Outage bands (grey) */}
      {(outageWindows||[]).map((ow,i)=>{
        const x1=tsToX(ow.startFmt);
        const x2=tsToX(ow.endFmt)||x1;
        return x1!=null?(
          <g key={i}>
            <rect x={x1} y={PAD.t} width={Math.max(3,x2-x1)} height={iH} fill='#9E9E9E22'/>
            <line x1={x1} x2={x1} y1={PAD.t} y2={PAD.t+iH} stroke='#9E9E9E' strokeWidth={1.5} strokeDasharray='3,2'/>
            <line x1={Math.max(x1+3,x2)} x2={Math.max(x1+3,x2)} y1={PAD.t} y2={PAD.t+iH} stroke='#9E9E9E' strokeWidth={1} strokeDasharray='3,2'/>
          </g>
        ):null;
      })}
      {/* Alert bands */}
      {alertBands.map((b,i)=><rect key={i} x={b.x1} y={PAD.t} width={Math.max(2,b.x2-b.x1)} height={iH} fill={b.color}/>)}
      {/* Anomaly score area */}
      <path d={areaPath} fill='#0070F218' stroke='none'/>
      <polyline points={pts} fill='none' stroke='#0070F2' strokeWidth={1.2}/>
      {/* Threshold line */}
      <line x1={PAD.l} x2={W-PAD.r} y1={thY} y2={thY} stroke='#E9730C' strokeWidth={1} strokeDasharray='4,3'/>
      <text x={W-PAD.r+2} y={thY+3} fontSize={8} fill='#E9730C'>thr</text>
      {/* WO markers */}
      {(woMarkers||[]).map((m,i)=>{const x=tsToX(m.ts);return x!=null?<line key={i} x1={x} x2={x} y1={PAD.t} y2={PAD.t+iH} stroke='#107E3E' strokeWidth={1} strokeDasharray='2,2' opacity={0.7}/>:null;})}
      {/* Failure markers */}
      {(failMarkers||[]).map((m,i)=>{const x=tsToX(m.ts);return x!=null?<line key={i} x1={x} x2={x} y1={PAD.t} y2={PAD.t+iH} stroke='#E94530' strokeWidth={1.5} opacity={0.8}/>:null;})}
      {/* X axis label */}
      <text x={PAD.l} y={H-2} fontSize={8} fill='#9AA0A6'>Start</text>
      <text x={W-PAD.r} y={H-2} fontSize={8} fill='#9AA0A6' textAnchor='end'>End</text>
      <text x={W/2} y={H-2} fontSize={8} fill='#9AA0A6' textAnchor='middle'>Anomaly Score (0–100) · — score  ╍ threshold  │ WO  | Failure  ▌ Alert</text>
    </svg>
  );
}

function SimulationTab({assets}){
  const [assetId,setAssetId]=useState('');
  const [simMode,setSimMode]=useState('single');   // 'single'|'composite'
  const [tagName,setTagName]=useState('');
  const [selectedTags,setSelectedTags]=useState([]);   // composite mode
  const [params,setParams]=useState({scoreThreshold:50,consecutiveMin:3,rollingWindow:24});
  const [running,setRunning]=useState(false);
  const [result,setResult]=useState(null);
  const [runId,setRunId]=useState(null);
  const [feedback,setFeedback]=useState({});   // alertId->{relevance,reasonCode,saved}
  const [versions,setVersions]=useState([]);
  const [verLoading,setVerLoading]=useState(false);
  const [recommend,setRecommend]=useState(null);
  const [recLoading,setRecLoading]=useState(false);
  const [saveModal,setSaveModal]=useState(false);
  const [versionName,setVersionName]=useState('');
  const [panel,setPanel]=useState('config');   // 'config'|'results'|'versions'

  const asset=assets.find(a=>a.id===assetId);
  const [availTags,setAvailTags]=useState([]);

  // Load tags that actually have sensor readings in HANA for this asset
  React.useEffect(()=>{
    if(!assetId){setAvailTags([]);return;}
    fetch(`${BACKEND}/api/simulation/available-tags?assetId=${assetId}`)
      .then(r=>r.json())
      .then(d=>setAvailTags(d.tags||SIM_TAGS[asset?.type]||['VIBRATION']))
      .catch(()=>setAvailTags(SIM_TAGS[asset?.type]||['VIBRATION']));
  },[assetId]);

  const toggleSimTag=(tag)=>setSelectedTags(prev=>prev.includes(tag)?prev.filter(t=>t!==tag):[...prev,tag]);

  const setP=(k,v)=>setParams(p=>({...p,[k]:v}));

  const runSim=async()=>{
    if(!assetId){alert('Select an asset first.');return;}
    if(simMode==='single'&&!tagName){alert('Select a tag first.');return;}
    if(simMode==='composite'&&selectedTags.length<2){alert('Select at least 2 tags for composite simulation.');return;}
    setRunning(true);setResult(null);
    try{
      const body=simMode==='composite'
        ?{assetId,assetType:asset?.type,tags:selectedTags,...params}
        :{assetId,tagName,...params};
      const r=await fetch(`${BACKEND}/api/simulation/run`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify(body)
      });
      const data=await r.json();
      if(data.error)throw new Error(data.error);
      setResult(data);setRunId(data.runId);setFeedback({});setPanel('results');
    }catch(e){alert('Simulation failed: '+e.message);}
    setRunning(false);
  };

  const loadVersions=async()=>{
    if(!assetId||!tagName)return;
    setVerLoading(true);
    try{
      const r=await fetch(`${BACKEND}/api/simulation/versions?assetId=${assetId}&tagName=${tagName}`);
      const d=await r.json();setVersions(d.value||[]);
    }catch(e){}
    setVerLoading(false);
  };

  const saveVersion=async()=>{
    if(!result)return;
    try{
      await fetch(`${BACKEND}/api/simulation/versions`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({assetId,tagName,versionName:versionName||undefined,...params,
          alertCount:result.alertCount,precision:result.precision,recall:result.recall,f1:result.f1})
      });
      setSaveModal(false);setVersionName('');loadVersions();
    }catch(e){alert('Save failed: '+e.message);}
  };

  const promoteVersion=async(verId)=>{
    await fetch(`${BACKEND}/api/simulation/versions`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'promote',assetId,tagName,versionId:verId})
    });
    loadVersions();
  };

  const submitFeedback=async(alert,relevance,reasonCode)=>{
    setFeedback(p=>({...p,[alert.alertId]:{relevance,reasonCode,saved:false}}));
    try{
      await fetch(`${BACKEND}/api/simulation/feedback`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({alertId:alert.alertId,runId,assetId,tagName,relevance,reasonCode,submittedBy:'User'})
      });
      setFeedback(p=>({...p,[alert.alertId]:{relevance,reasonCode,saved:true}}));
    }catch(e){}
  };

  const getRecommend=async()=>{
    setRecLoading(true);
    try{
      const r=await fetch(`${BACKEND}/api/simulation/recommend?assetId=${assetId}&tagName=${tagName}`);
      const d=await r.json();setRecommend(d);
    }catch(e){}
    setRecLoading(false);
  };

  const applyRecommend=()=>{
    if(!recommend?.hasData)return;
    setP('scoreThreshold',recommend.recommendedScore);
    setP('consecutiveMin',recommend.recommendedConsecutive);
    setPanel('config');
  };

  const metricCard=(label,value,color,tip)=>(
    <div style={{background:'#F8F9FB',borderRadius:8,padding:'10px 14px',flex:'1 1 100px',textAlign:'center',borderTop:`3px solid ${color}`}}>
      <div style={{fontSize:20,fontWeight:800,color}}>{value}</div>
      <div style={{fontSize:10,color:C.mid,marginTop:2}}>{label}</div>
      {tip&&<div style={{fontSize:9,color:C.lt,marginTop:2}}>{tip}</div>}
    </div>
  );

  const tabBtn=(id,label)=>(
    <button onClick={()=>{setPanel(id);if(id==='versions')loadVersions();}}
      style={{padding:'6px 16px',borderRadius:5,border:'none',cursor:'pointer',fontSize:12,fontWeight:panel===id?700:400,
        background:panel===id?C.info:'transparent',color:panel===id?'#FFF':C.mid}}>
      {label}
    </button>
  );

  return(
    <div style={{padding:20,display:'flex',flexDirection:'column',gap:14}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg,#1A237E 0%,#283593 100%)`,color:'#FFF',borderRadius:10,padding:'16px 20px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:12}}>
          <div>
            <div style={{fontWeight:700,fontSize:18}}>🧪 Simulation Mode</div>
            <div style={{fontSize:12,opacity:.75,marginTop:3}}>Threshold Validation · Z-Score Simulation · TimeGPT Forecasting</div>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            {/* Asset selector */}
            <select value={assetId} onChange={e=>{setAssetId(e.target.value);setTagName('');setSelectedTags([]);setResult(null);}}
              style={{padding:'6px 10px',borderRadius:5,border:'none',fontSize:12,minWidth:160}}>
              <option value=''>— Select Asset —</option>
              {assets.map(a=><option key={a.id} value={a.id}>{a.id} · {a.type}</option>)}
            </select>
            {/* Mode toggle */}
            {assetId&&(
              <div style={{display:'flex',gap:0,borderRadius:5,overflow:'hidden',border:'1px solid rgba(255,255,255,.3)'}}>
                {['single','composite'].map(m=>(
                  <button key={m} onClick={()=>{setSimMode(m);setTagName('');setSelectedTags([]);setResult(null);}}
                    style={{padding:'6px 12px',border:'none',fontSize:11,fontWeight:simMode===m?700:400,
                      background:simMode===m?'rgba(255,255,255,.25)':'transparent',
                      color:'#FFF',cursor:'pointer'}}>
                    {m==='single'?'Single':'Multi'}
                  </button>
                ))}
              </div>
            )}
            {/* Single-tag dropdown */}
            {assetId&&simMode==='single'&&(
              <select value={tagName} onChange={e=>{setTagName(e.target.value);setResult(null);}}
                style={{padding:'6px 10px',borderRadius:5,border:'none',fontSize:12,minWidth:160}}>
                <option value=''>— Select Tag —</option>
                {availTags.map(t=><option key={t} value={t}>{t}</option>)}
              </select>
            )}
            {/* Composite tag checkboxes */}
            {assetId&&simMode==='composite'&&(
              <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
                {availTags.map(t=>(
                  <label key={t} style={{display:'flex',alignItems:'center',gap:4,cursor:'pointer',
                    background:selectedTags.includes(t)?'rgba(255,255,255,.25)':'rgba(255,255,255,.08)',
                    borderRadius:4,padding:'4px 8px',fontSize:11,color:'#FFF',fontWeight:selectedTags.includes(t)?700:400}}>
                    <input type='checkbox' checked={selectedTags.includes(t)} onChange={()=>toggleSimTag(t)}
                      style={{width:12,height:12,accentColor:'#FFF'}}/>
                    {t}
                  </label>
                ))}
                {selectedTags.length>0&&(
                  <span style={{fontSize:10,opacity:.7}}>{selectedTags.length} tag{selectedTags.length>1?'s':''} selected</span>
                )}
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Sub-tabs */}
      <div style={{display:'flex',gap:4,borderBottom:`1px solid ${C.bdr}`,paddingBottom:4}}>
        {tabBtn('config','⚙️ Configure')}
        {tabBtn('results','📈 Results'+(result?` (${result.alertCount} alerts)`:' '))}
        {tabBtn('versions','📦 Versions')}
      </div>

      {/* ── CONFIGURE PANEL ── */}
      {panel==='config'&&(
        <div style={{display:'flex',gap:14,flexWrap:'wrap'}}>
          <Card title="Threshold Parameters" icon="🎚️" style={{flex:'1 1 320px'}}>
            <div style={{padding:'14px 18px',display:'flex',flexDirection:'column',gap:16}}>
              {[
                {k:'scoreThreshold',label:'Anomaly Score Threshold',min:10,max:95,step:5,
                  tip:'Alert fires when anomaly score exceeds this value. Lower = more sensitive.'},
                {k:'consecutiveMin', label:'Min Consecutive Anomalies',min:1,max:12,step:1,
                  tip:'Number of consecutive above-threshold readings required to raise an alert. Higher = fewer false positives.'},
                {k:'rollingWindow',  label:'Rolling Baseline Window (hrs)',min:6,max:72,step:6,
                  tip:'Hours of history used to compute the rolling mean and std for Z-score. Longer = smoother baseline.'},
              ].map(({k,label,min,max,step,tip})=>(
                <div key={k}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                    <span style={{fontSize:12,fontWeight:600,color:C.dark}}>{label}</span>
                    <span style={{fontSize:14,fontWeight:800,color:C.info}}>{params[k]}{k==='scoreThreshold'?'':k==='rollingWindow'?'h':''}</span>
                  </div>
                  <input type='range' min={min} max={max} step={step} value={params[k]}
                    onChange={e=>setP(k,parseInt(e.target.value))}
                    style={{width:'100%',accentColor:C.info}}/>
                  <div style={{display:'flex',justifyContent:'space-between'}}>
                    <span style={{fontSize:9,color:C.lt}}>{min}</span>
                    <span style={{fontSize:9,color:C.lt,textAlign:'center',maxWidth:'70%'}}>{tip}</span>
                    <span style={{fontSize:9,color:C.lt}}>{max}</span>
                  </div>
                </div>
              ))}
              <button onClick={runSim}
                disabled={running||!assetId||(simMode==='single'&&!tagName)||(simMode==='composite'&&selectedTags.length<2)}
                style={{padding:'10px 0',borderRadius:6,border:'none',
                  background:(running||!assetId||(simMode==='single'&&!tagName)||(simMode==='composite'&&selectedTags.length<2))?'#E0E0E0':C.info,
                  color:'#FFF',fontWeight:700,fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
                {running?<><Spinner size={13} color='#FFF'/>Running simulation…</>:simMode==='composite'?`▶ Run Composite (${selectedTags.length} tags)`:<>▶ Run Simulation</>}
              </button>
            </div>
          </Card>

          <Card title="AI Recommendation" icon="💡" style={{flex:'1 1 280px'}}>
            <div style={{padding:'14px 18px',display:'flex',flexDirection:'column',gap:10}}>
              <div style={{fontSize:11,color:C.mid,lineHeight:1.5}}>
                After rating alerts as relevant or not relevant, the system analyses your feedback and recommends the optimal threshold combination.
              </div>
              {!tagName&&<div style={{fontSize:11,color:C.warn,fontWeight:600}}>⚠ Select a tag from the dropdown above to enable recommendations.</div>}
              <button onClick={getRecommend} disabled={recLoading||!assetId||!tagName}
                style={{padding:'8px 0',borderRadius:6,border:`1px solid ${recLoading||!assetId||!tagName?C.lt:C.info}`,
                  background:recLoading||!assetId||!tagName?'#f5f5f5':C.infoBg,
                  color:recLoading||!assetId||!tagName?C.lt:C.info,
                  fontWeight:700,fontSize:12,cursor:recLoading||!assetId||!tagName?'not-allowed':'pointer',
                  opacity:recLoading||!assetId||!tagName?0.6:1}}>
                {recLoading?'Analysing…':'Get Recommendations'}
              </button>
              {recommend&&recommend.hasData&&(
                <div style={{background:'#F0F8FF',border:`1px solid ${C.info}33`,borderRadius:8,padding:'10px 12px'}}>
                  <div style={{fontSize:11,fontWeight:700,color:C.info,marginBottom:6}}>Recommended Thresholds</div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:8}}>
                    {[
                      {l:'Score Threshold',v:recommend.recommendedScore},
                      {l:'Consecutive Min',v:recommend.recommendedConsecutive},
                    ].map(m=>(
                      <div key={m.l} style={{background:'#FFF',borderRadius:6,padding:'6px 10px',textAlign:'center'}}>
                        <div style={{fontSize:16,fontWeight:800,color:C.info}}>{m.v}</div>
                        <div style={{fontSize:9,color:C.lt}}>{m.l}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{fontSize:10,color:C.mid,lineHeight:1.4,marginBottom:8}}>{recommend.rationale}</div>
                  <button onClick={applyRecommend}
                    style={{padding:'6px 0',width:'100%',borderRadius:5,border:'none',
                      background:C.info,color:'#FFF',fontWeight:700,fontSize:11,cursor:'pointer'}}>
                    Apply & Re-run
                  </button>
                </div>
              )}
              {recommend&&!recommend.hasData&&(
                <div style={{fontSize:11,color:C.lt,fontStyle:'italic'}}>{recommend.message}</div>
              )}
            </div>
          </Card>
        </div>
      )}

      {/* ── RESULTS PANEL ── */}
      {panel==='results'&&result&&(
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {/* Summary metrics */}
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            {metricCard('Total Readings',result.totalReadings.toLocaleString(),C.info)}
            {metricCard('Anomalous Readings',result.anomalyCount,result.anomalyCount>0?C.warn:C.ok)}
            {metricCard('Alerts Fired',result.alertCount,result.alertCount>0?C.crit:C.ok)}
            {(result.maskedCount||0)>0&&metricCard('Masked Readings',result.maskedCount,'#795548',
              `${result.outageMaskedCount||0} outage · ${result.autoMaskedCount||0} auto-detected`)}
            {metricCard('Precision vs WOs',(result.precision*100).toFixed(0)+'%',result.precision>=0.7?C.ok:result.precision>=0.4?C.warn:C.crit,'Alerts near a WO ÷ total alerts')}
            {metricCard('Recall vs WOs',(result.recall*100).toFixed(0)+'%',result.recall>=0.7?C.ok:result.recall>=0.4?C.warn:C.crit,'WOs with nearby alert ÷ total WOs')}
            {metricCard('F1 Score',(result.f1*100).toFixed(0)+'%',result.f1>=0.6?C.ok:result.f1>=0.35?C.warn:C.crit,'Harmonic mean of precision & recall')}
          </div>

          {/* Composite weight breakdown banner */}
          {result.isComposite&&result.tagWeights&&(
            <div style={{background:'#EEF2FF',border:`1px solid ${C.info}33`,borderRadius:8,padding:'10px 16px',
              display:'flex',gap:16,alignItems:'center',flexWrap:'wrap'}}>
              <span style={{fontSize:11,fontWeight:700,color:C.info}}>Composite Weights Applied</span>
              {Object.entries(result.tagWeights).map(([tag,w])=>(
                <span key={tag} style={{fontSize:11,color:C.dark}}>
                  <span style={{fontWeight:700}}>{tag}</span>
                  <span style={{color:C.info,marginLeft:4}}>{Math.round(w*100)}%</span>
                </span>
              ))}
              <span style={{fontSize:10,color:C.lt,marginLeft:'auto'}}>Alert fires only when weighted composite score ≥ threshold</span>
            </div>
          )}

          {/* Outage masking summary strip */}
          {(result.maskedCount>0||(result.outageWindows&&result.outageWindows.length>0))&&(
            <div style={{background:'#FFF8E1',border:`1px solid #F9A82533`,borderRadius:8,
              padding:'8px 16px',display:'flex',gap:16,alignItems:'center',flexWrap:'wrap'}}>
              <span style={{fontSize:11,fontWeight:700,color:'#E65100'}}>🔧 Shutdown Masking Active</span>
              {result.outageWindows?.length>0&&(
                <span style={{fontSize:11,color:C.dark}}>
                  <span style={{fontWeight:600}}>{result.outageWindows.length}</span> planned outage{result.outageWindows.length>1?'s':''} registered
                </span>
              )}
              {result.outageMaskedCount>0&&(
                <span style={{fontSize:10,color:C.mid}}>
                  <span style={{fontWeight:600}}>{result.outageMaskedCount}</span> readings suppressed (outage windows)
                </span>
              )}
              {result.autoMaskedCount>0&&(
                <span style={{fontSize:10,color:C.mid}}>
                  <span style={{fontWeight:600}}>{result.autoMaskedCount}</span> readings suppressed (auto-detected low-flow)
                </span>
              )}
              {result.maskedCount===0&&(
                <span style={{fontSize:10,color:C.ok}}>✓ No sensor data falls within registered outage windows</span>
              )}
              <span style={{fontSize:9,color:C.lt,marginLeft:'auto',fontStyle:'italic'}}>
                Grey bands on chart = masked periods
              </span>
            </div>
          )}

          {/* Equipment baseline profile strip */}
          {result.profileApplied&&(
            <div style={{background:result.profileApplied.source==='ASSET_TYPE_CONFIG'?'#F0FFF4':'#FFFDE7',
              border:`1px solid ${result.profileApplied.source==='ASSET_TYPE_CONFIG'?C.ok:C.warn}33`,
              borderRadius:8,padding:'8px 16px',display:'flex',gap:20,alignItems:'center',flexWrap:'wrap'}}>
              <span style={{fontSize:10,fontWeight:700,
                color:result.profileApplied.source==='ASSET_TYPE_CONFIG'?C.ok:C.warn}}>
                {result.profileApplied.source==='ASSET_TYPE_CONFIG'?'✓ Equipment Profile Active':'⚠ Default Profile'}
              </span>
              {result.profileApplied.assetType&&(
                <span style={{fontSize:11,color:C.dark,fontWeight:600}}>{result.profileApplied.assetType}</span>
              )}
              {[
                {label:'Baseline Window', value:`${result.profileApplied.baselineWindow}h${result.profileApplied.baselineWindow!==result.profileApplied.profileWindow?' (user override)':''}`},
                {label:'Sigma Divisor',   value:`${result.profileApplied.sigmaDivisor} (${result.profileApplied.sensitivityMult}×)`},
                {label:'Weight Source',   value:result.profileApplied.weightSource||'default'},
              ].map(({label,value})=>(
                <span key={label} style={{fontSize:10,color:C.mid}}>
                  <span style={{fontWeight:600}}>{label}:</span> {value}
                </span>
              ))}
              <span style={{fontSize:9,color:C.lt,marginLeft:'auto',fontStyle:'italic'}}>
                Score = min(100, Z / {result.profileApplied.sigmaDivisor} × 100)
              </span>
            </div>
          )}

          {/* Anomaly timeline chart */}
          <Card title={`Anomaly Score Timeline · ${assetId} · ${simMode==='composite'?'COMPOSITE ['+selectedTags.join('+')+']':tagName}`} icon="📈"
            right={<span style={{fontSize:10,color:C.lt}}>Threshold: {params.scoreThreshold} · Window: {params.rollingWindow}h · Consec: {params.consecutiveMin}</span>}>
            <div style={{padding:'12px 16px'}}>
              <AnomalyChart timeseries={result.timeseries} alerts={result.alerts}
                woMarkers={result.woMarkers} failMarkers={result.failMarkers}
                scoreThreshold={params.scoreThreshold} outageWindows={result.outageWindows}/>
              <div style={{display:'flex',gap:16,marginTop:6,flexWrap:'wrap'}}>
                {[['#0070F2','─','Anomaly Score'],['#E9730C','╍','Alert Threshold'],
                  ['#E9730C33','▌','Alert Event'],['#107E3E','╎','Work Order'],['#E94530','|','Failure'],
                  ['#9E9E9E','▒','Outage / Masked'],
                ].map(([c,sym,lbl])=>(
                  <span key={lbl} style={{fontSize:10,color:C.mid,display:'flex',alignItems:'center',gap:4}}>
                    <span style={{color:c,fontWeight:700}}>{sym}</span>{lbl}
                  </span>
                ))}
              </div>
            </div>
          </Card>

          {/* Alert list */}
          <Card title={`Simulated Alerts (${result.alerts.length})`} icon="🚨"
            right={result.alerts.length>0&&(
              <button onClick={()=>setSaveModal(true)}
                style={{padding:'5px 12px',borderRadius:5,border:`1px solid ${C.info}`,
                  background:C.infoBg,color:C.info,fontSize:11,fontWeight:700,cursor:'pointer'}}>
                💾 Save as Version
              </button>
            )}>
            {result.alerts.length===0?(
              <div style={{padding:24,textAlign:'center',fontSize:12}}>
                {result.totalReadings===0
                  ?<><div style={{color:C.crit,fontWeight:700,marginBottom:6}}>⚠ No sensor data found for this tag.</div>
                    <div style={{color:C.lt}}>This tag has no readings in HANA. Select a different tag from the dropdown — available tags are loaded from actual sensor data.</div></>
                  :<div style={{color:C.lt}}>No alerts fired with these parameters. Try lowering the Score Threshold or Consecutive Min. ({result.totalReadings} readings analysed)</div>
                }
              </div>
            ):(
              <div style={{overflowX:'auto'}}>
                <table style={{width:'100%'}}>
                  <thead><tr style={{background:'#F5F7FA',borderBottom:`1px solid ${C.bdr}`}}>
                    {['Start','End','Peak Score','Consec.',result.isComposite?'Lead Tag':'Peak Value','Nearest WO','Nearest Failure','Severity','Feedback'].map(h=>(
                      <th key={h} style={{padding:'7px 10px',fontWeight:600,color:C.mid,fontSize:10,textAlign:'left',whiteSpace:'nowrap'}}>{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>
                    {result.alerts.map((a,i)=>{
                      const fb=feedback[a.alertId];
                      const fbColor=fb?.relevance==='Relevant'?C.ok:fb?.relevance==='Not Relevant'?C.crit:fb?.relevance==='Uncertain'?C.warn:null;
                      const sColor=a.severity==='CRIT'?C.crit:C.warn;
                      return(
                        <tr key={a.alertId} style={{borderBottom:`1px solid ${C.bdr}`,background:fb?`${fbColor}08`:i%2?'#FAFAFA':'#FFF'}}>
                          <td style={{padding:'7px 10px',fontSize:10,color:C.lt,whiteSpace:'nowrap'}}>{a.alertStartFmt}</td>
                          <td style={{padding:'7px 10px',fontSize:10,color:C.lt,whiteSpace:'nowrap'}}>{a.alertEndFmt}</td>
                          <td style={{padding:'7px 10px',fontWeight:800,color:sColor}}>{a.peakScore}</td>
                          <td style={{padding:'7px 10px',fontWeight:600,color:C.mid}}>{a.consecutiveCount}</td>
                          <td style={{padding:'7px 10px',fontSize:11}}>
                            {result.isComposite?(
                              a.leadTag?(
                                <span>
                                  <span style={{fontWeight:700,color:sColor}}>{a.leadTag}</span>
                                  <span style={{fontSize:9,color:C.lt,marginLeft:4}}>{a.leadScore}</span>
                                </span>
                              ):'—'
                            ):a.peakValue?.toFixed(3)}
                          </td>
                          <td style={{padding:'7px 10px',fontSize:10}}>
                            {a.nearestWoId?<span style={{color:a.nearWo?C.ok:C.lt}}>{a.nearestWoId}<br/><span style={{fontSize:9}}>{a.nearestWoDays>0?'+':''}{a.nearestWoDays}d</span></span>:'—'}
                          </td>
                          <td style={{padding:'7px 10px',fontSize:10}}>
                            {a.nearestFailId?<span style={{color:Math.abs(a.nearestFailDays||999)<=7?C.crit:C.lt}}>{a.nearestFailId}<br/><span style={{fontSize:9}}>{a.nearestFailDays>0?'+':''}{a.nearestFailDays}d</span></span>:'—'}
                          </td>
                          <td style={{padding:'7px 10px'}}>
                            <span style={{background:`${sColor}18`,color:sColor,borderRadius:4,padding:'2px 7px',fontSize:10,fontWeight:700}}>{a.severity}</span>
                          </td>
                          <td style={{padding:'7px 10px'}}>
                            {result.isComposite?(
                              /* Composite alerts: show per-tag score breakdown instead of feedback (feedback is per single-tag) */
                              a.tagScores?(
                                <span style={{fontSize:9,color:C.mid}}>
                                  {Object.entries(a.tagScores).sort((x,y)=>y[1]-x[1]).map(([t,s])=>(
                                    <span key={t} style={{display:'block'}}>{t}: <strong style={{color:parseFloat(s)>=50?C.warn:C.lt}}>{parseFloat(s).toFixed(0)}</strong></span>
                                  ))}
                                </span>
                              ):'—'
                            ):fb?(
                              <span style={{color:fbColor,fontSize:10,fontWeight:700}}>
                                {fb.relevance==='Relevant'?'✓':fb.relevance==='Not Relevant'?'✗':'?'} {fb.relevance}
                                {fb.saved&&<span style={{fontSize:9,color:C.lt}}> ✓saved</span>}
                              </span>
                            ):(
                              <FeedbackInline alert={a} onSubmit={submitFeedback}/>
                            )}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>

function FeedbackInline({alert,onSubmit}){
  const [open,setOpen]=useState(false);
  const [rel,setRel]=useState('');
  const [reason,setReason]=useState('');
  const reasons=rel==='Relevant'?REASON_RELEVANT:rel==='Not Relevant'?REASON_NOT_RELEVANT:rel==='Uncertain'?REASON_UNCERTAIN:[];
  const submit=()=>{if(!rel)return;onSubmit(alert,rel,reason||undefined);setOpen(false);};
  if(!open)return(
    <button onClick={()=>setOpen(true)}
      style={{padding:'3px 8px',borderRadius:4,border:`1px solid ${C.bdr}`,background:'#F5F5F5',
        color:C.mid,fontSize:10,cursor:'pointer'}}>Rate</button>
  );
  return(
    <div style={{background:'#FAFAFA',border:`1px solid ${C.bdr}`,borderRadius:6,padding:'8px 10px',minWidth:200}}>
      <div style={{fontSize:10,fontWeight:600,marginBottom:6}}>Is this alert relevant?</div>
      <div style={{display:'flex',gap:4,marginBottom:6}}>
        {['Relevant','Not Relevant','Uncertain'].map(r=>(
          <button key={r} onClick={()=>{setRel(r);setReason('');}}
            style={{padding:'3px 7px',borderRadius:4,border:`1px solid ${r==='Relevant'?C.ok:r==='Not Relevant'?C.crit:C.warn}`,
              background:rel===r?(r==='Relevant'?'#E8F5E9':r==='Not Relevant'?C.critBg:C.warnBg):'#FFF',
              color:r==='Relevant'?C.ok:r==='Not Relevant'?C.crit:C.warn,fontSize:9,fontWeight:700,cursor:'pointer'}}>
            {r==='Relevant'?'✓ Relevant':r==='Not Relevant'?'✗ Not Relevant':'? Uncertain'}
          </button>
        ))}
      </div>
      {rel&&reasons.length>0&&(
        <select value={reason} onChange={e=>setReason(e.target.value)}
          style={{width:'100%',padding:'4px 6px',borderRadius:4,border:`1px solid ${C.bdr}`,fontSize:10,marginBottom:6}}>
          <option value=''>— Reason (optional) —</option>
          {reasons.map(r=><option key={r} value={r}>{r}</option>)}
        </select>
      )}
      <div style={{display:'flex',gap:4,justifyContent:'flex-end'}}>
        <button onClick={()=>setOpen(false)} style={{padding:'3px 8px',borderRadius:4,border:`1px solid ${C.bdr}`,background:'#FFF',color:C.mid,fontSize:9,cursor:'pointer'}}>Cancel</button>
        <button onClick={submit} disabled={!rel}
          style={{padding:'3px 8px',borderRadius:4,border:'none',background:rel?C.info:'#E0E0E0',color:'#FFF',fontSize:9,fontWeight:700,cursor:'pointer'}}>Submit</button>
      </div>
    </div>
  );
}

/* ── TAB 3: RISK & COMPLIANCE ───────────────────────────────── */
function RiskCompliance({assets,scores,addLog,addToast}){
  const [focusId,setFocusId]=useState(null);
  const [auditLoading,setAuditLoading]=useState({});

  const allCompliance=assets.flatMap(a=>
    Object.entries(a.compliance).map(([k,v])=>({assetId:a.id,assetName:a.shortName,standard:k,icon:a.icon,...v}))
  );
  const overdue=allCompliance.filter(c=>c.status==='Overdue');
  const dueSoon=allCompliance.filter(c=>c.status==='Due Soon');
  const compliant=allCompliance.filter(c=>c.status==='Compliant');

  const schedAudit=async(assetId,standard,k)=>{
    setAuditLoading(p=>({...p,[k]:true}));
    const r=await sapApi.scheduleAudit(assetId,standard);
    addLog({type:'AUDIT',action:'Audit Scheduled',detail:r.message,doc:r.id,assetId});
    addToast({type:'info',title:'Audit Scheduled',message:r.message});
    setAuditLoading(p=>({...p,[k]:false}));
  };

  const complianceRow=(c,i)=>{
    const stColor=c.status==='Compliant'?C.ok:c.status==='Due Soon'?C.warn:C.crit;
    const def=COMPLIANCE_DEFS.find(d=>d.id===c.standard)||{name:c.standard,desc:'Standard'};
    const k=`${c.assetId}-${c.standard}`;
    return(
      <tr key={k} style={{borderBottom:`1px solid ${C.bdr}`,background:i%2===0?'#FFF':'#FAFAFA'}}>
        <td style={{fontSize:11}}>{c.icon} {c.assetName}</td>
        <td><span style={{fontWeight:600,fontSize:11}}>{def.name}</span><br/><span style={{fontSize:10,color:C.lt}}>{def.desc}</span></td>
        <td style={{fontSize:11,color:C.lt,whiteSpace:'nowrap'}}>{c.lastAudit}</td>
        <td style={{fontSize:11,color:stColor,fontWeight:600,whiteSpace:'nowrap'}}>{c.nextDue}</td>
        <td><span style={{background:`${stColor}18`,color:stColor,borderRadius:4,padding:'2px 8px',fontSize:10,fontWeight:700}}>{c.status}</span></td>
        <td>
          {(c.status==='Overdue'||c.status==='Due Soon')&&(
            <button onClick={()=>schedAudit(c.assetId,def.name,k)} disabled={auditLoading[k]}
              style={{padding:'3px 10px',borderRadius:4,border:`1px solid ${C.info}`,background:C.infoBg,color:C.info,fontSize:10,fontWeight:700,display:'flex',alignItems:'center',gap:4}}>
              {auditLoading[k]?<Spinner size={10}/>:null}Schedule Audit
            </button>
          )}
        </td>
      </tr>
    );
  };

  return(
    <div style={{padding:20,display:'flex',flexDirection:'column',gap:14}}>
      {/* Summary */}
      <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
        {[
          {l:'Overdue',c:overdue.length,color:C.crit},
          {l:'Due Soon',c:dueSoon.length,color:C.warn},
          {l:'Compliant',c:compliant.length,color:C.ok},
          {l:'Total records',c:allCompliance.length,color:C.info},
        ].map(m=>(
          <div key={m.l} style={{background:C.card,border:`1px solid ${C.bdr}`,borderTop:`3px solid ${m.color}`,
            borderRadius:8,padding:'10px 16px',flex:'1 1 90px',minWidth:90}}>
            <div style={{fontSize:26,fontWeight:800,color:m.color}}>{m.c}</div>
            <div style={{fontSize:11,color:C.mid,marginTop:2}}>{m.l}</div>
          </div>
        ))}
      </div>

      {/* Risk Matrix + Legend */}
      <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:14}}>
        <Card title="5×5 Risk Matrix" icon="⚠️">
          <div style={{padding:'10px 14px'}}>
            <div style={{fontSize:11,color:C.mid,marginBottom:10}}>Click an asset dot to view details</div>
            <RiskMatrix assets={assets} scores={scores} onDotClick={a=>{setFocusId(a.id);}} focusId={focusId}/>
            <div style={{display:'flex',gap:14,marginTop:10,fontSize:10,flexWrap:'wrap'}}>
              {[{c:'#C8E6C9',l:'Tolerable'},{c:'#FFF9C4',l:'ALARP'},{c:'#FFB74D',l:'Undesirable'},{c:'#EF5350',l:'Intolerable'}].map(m=>(
                <span key={m.l} style={{display:'flex',alignItems:'center',gap:4}}>
                  <span style={{width:10,height:10,borderRadius:2,background:m.c,display:'inline-block',border:'0.5px solid #CCC'}}/>
                  {m.l}
                </span>
              ))}
            </div>
          </div>
        </Card>

        <Card title="Asset Risk Summary" icon="📋">
          <div style={{padding:'10px 14px',overflowX:'auto'}}>
            <table>
              <thead><tr style={{background:'#F8F9FB',borderBottom:`1px solid ${C.bdr}`}}>
                {['Asset','Score','Prob.','Consequence','Risk Zone','NBA'].map(h=>(
                  <th key={h} style={{fontWeight:600,color:C.mid,fontSize:11}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {assets.sort((a,b)=>scores[a.id]-scores[b.id]).map((a,i)=>{
                  const sc=scores[a.id];
                  const st=scoreStatus(sc);
                  const nba=getNextBestAction(a,sc);
                  const prob=Math.round(calcFailureProbability(a,sc)*100);
                  const consLabels=['','Insig.','Minor','Moderate','Major','Catastrophic'];
                  const zone=sc<40?'Intolerable':sc<55?'Undesirable':sc<70?'ALARP':'Tolerable';
                  const zoneColor=sc<40?C.crit:sc<55?C.warn:sc<70?C.gold:C.ok;
                  return(
                    <tr key={a.id} style={{borderBottom:`1px solid ${C.bdr}`,background:focusId===a.id?'#EEF4FF':i%2===0?'#FFF':'#FAFAFA'}}>
                      <td style={{fontSize:11}}>{a.icon} {a.shortName}</td>
                      <td><span style={{fontWeight:700,color:st.color}}>{sc}</span></td>
                      <td style={{fontWeight:600,color:prob>=40?C.crit:prob>=20?C.warn:C.ok,fontSize:11}}>{prob}%</td>
                      <td style={{fontSize:11,color:C.mid}}>{consLabels[a.consequence]}</td>
                      <td><span style={{background:`${zoneColor}18`,color:zoneColor,borderRadius:4,padding:'2px 7px',fontSize:10,fontWeight:700}}>{zone}</span></td>
                      <td><span style={{fontSize:11,color:nba.color,fontWeight:600}}>{nba.icon} {nba.action}</span></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </Card>
      </div>

      {/* Compliance Tracker */}
      {overdue.length>0&&(
        <Card title={`Overdue Compliance Items (${overdue.length})`} icon="🔴"
          style={{border:`1px solid ${C.crit}33`}}>
          <div style={{overflowX:'auto',padding:12}}>
            <table>
              <thead><tr style={{background:'#FFF0F0',borderBottom:`1px solid ${C.crit}22`}}>
                {['Asset','Standard','Last Audit','Next Due','Status','Action'].map(h=>(
                  <th key={h} style={{fontWeight:600,color:C.mid,fontSize:11}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>{overdue.map((c,i)=>complianceRow(c,i))}</tbody>
            </table>
          </div>
        </Card>
      )}

      {dueSoon.length>0&&(
        <Card title={`Due Soon (${dueSoon.length})`} icon="🟡">
          <div style={{overflowX:'auto',padding:12}}>
            <table>
              <thead><tr style={{background:'#FFF8E1',borderBottom:`1px solid ${C.warn}22`}}>
                {['Asset','Standard','Last Audit','Next Due','Status','Action'].map(h=>(
                  <th key={h} style={{fontWeight:600,color:C.mid,fontSize:11}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>{dueSoon.map((c,i)=>complianceRow(c,i))}</tbody>
            </table>
          </div>
        </Card>
      )}

      <Card title={`Compliant Items (${compliant.length})`} icon="✅">
        <div style={{overflowX:'auto',padding:12}}>
          <table>
            <thead><tr style={{background:'#F1FFF4',borderBottom:`1px solid ${C.ok}22`}}>
              {['Asset','Standard','Last Audit','Next Due','Status','Action'].map(h=>(
                <th key={h} style={{fontWeight:600,color:C.mid,fontSize:11}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>{compliant.map((c,i)=>complianceRow(c,i))}</tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

/* ── TAB 4: FINANCIAL IMPACT ────────────────────────────────── */
function FinancialImpact({assets,scores}){
  const [horizon,setHorizon]=useState('1yr');
  const totals=useMemo(()=>{
    const fin=assets.map(a=>({...calcFinancials(a,scores[a.id]),asset:a,score:scores[a.id]}));
    const totalRisk=fin.reduce((a,f)=>a+f.costAtRisk,0);
    const totalDTRisk=fin.reduce((a,f)=>a+f.annualDowntimeRisk,0);
    const totalReplacement=fin.reduce((a,f)=>a+f.asset.replacementCost,0);
    const totalPM=fin.reduce((a,f)=>a+f.asset.annualPMCost,0);
    const projKey={['1yr']:'projectedLoss1yr',['3yr']:'projectedLoss3yr',['5yr']:'projectedLoss5yr'}[horizon];
    const totalProj=fin.reduce((a,f)=>a+f[projKey],0);
    return{fin,totalRisk,totalDTRisk,totalReplacement,totalPM,totalProj};
  },[assets,scores,horizon]);

  return(
    <div style={{padding:20,display:'flex',flexDirection:'column',gap:14}}>
      {/* Top KPIs */}
      <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
        {[
          {l:'Total Cost at Risk',v:`$${(totals.totalRisk/1000000).toFixed(1)}M`,color:C.crit,sub:'Based on failure probability'},
          {l:'Annual Downtime Risk',v:`$${(totals.totalDTRisk/1000).toFixed(0)}k`,color:C.warn,sub:'Probability × downtime cost'},
          {l:'Total PM Investment',v:`$${(totals.totalPM/1000).toFixed(0)}k/yr`,color:C.info,sub:'Annual maintenance budget'},
          {l:'Fleet Replacement Value',v:`$${(totals.totalReplacement/1000000).toFixed(1)}M`,color:C.gold,sub:'Total asset replacement cost'},
        ].map(k=>(
          <div key={k.l} style={{background:C.card,border:`1px solid ${C.bdr}`,borderTop:`3px solid ${k.color}`,
            borderRadius:8,padding:'12px 16px',flex:'1 1 150px',minWidth:150}}>
            <div style={{fontSize:22,fontWeight:800,color:k.color}}>{k.v}</div>
            <div style={{fontSize:11,fontWeight:600,color:C.dark,marginTop:3}}>{k.l}</div>
            <div style={{fontSize:10,color:C.lt,marginTop:2}}>{k.sub}</div>
          </div>
        ))}
      </div>

      {/* Projected Losses */}
      <Card title="Projected Losses Without Intervention" icon="📉"
        right={(
          <div style={{display:'flex',gap:0,border:`1px solid ${C.bdr}`,borderRadius:6,overflow:'hidden'}}>
            {['1yr','3yr','5yr'].map(h=>(
              <button key={h} onClick={()=>setHorizon(h)}
                style={{padding:'4px 12px',border:'none',background:horizon===h?C.info:'transparent',
                  color:horizon===h?'#FFF':C.mid,fontSize:11,fontWeight:horizon===h?700:400}}>
                {h}
              </button>
            ))}
          </div>
        )}>
        <div style={{padding:14,overflowX:'auto'}}>
          <table>
            <thead><tr style={{background:'#F8F9FB',borderBottom:`1px solid ${C.bdr}`}}>
              {['Asset','Score','Fail Prob.','Cost at Risk','Downtime Risk','PM Investment','Maint. ROI','Proj. Loss'].map(h=>(
                <th key={h} style={{fontWeight:600,color:C.mid,fontSize:11}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {totals.fin.sort((a,b)=>b.costAtRisk-a.costAtRisk).map((f,i)=>{
                const projKey={['1yr']:'projectedLoss1yr',['3yr']:'projectedLoss3yr',['5yr']:'projectedLoss5yr'}[horizon];
                const st=scoreStatus(f.score);
                return(
                  <tr key={f.asset.id} style={{borderBottom:`1px solid ${C.bdr}`,background:i%2===0?'#FFF':'#FAFAFA'}}>

/* ── ROOT APPLICATION ───────────────────────────────────────── */
function App(){
  const [appLoading,setAppLoading]=useState(true);
  const [assets,setAssets]=useState([]);
  const [scores,setScores]=useState({});
  const [liveData,setLiveData]=useState({});

  useEffect(()=>{
    loadAssetsFromHANA()
      .then(async loaded=>{
        setAssets(loaded.map(a=>({...a,sensorHistory:{...a.sensorHistory}})));
        // Use HANA pre-computed score as source of truth; fall back to UI formula only if unavailable
        setScores(Object.fromEntries(loaded.map(a=>[a.id,a.hanaScore!=null?a.hanaScore:calcHealthScore(a)])));
        setLiveData(Object.fromEntries(loaded.map(a=>[a.id,{}])));
        // Seed activity log: first from HANA AUDIT_LOG (persistent), then WO history
        let combinedLog=[];
        try{
          const auditRes=await fetch(`${BACKEND}/asset/AuditLog`);
          if(auditRes.ok){
            const auditData=await auditRes.json();
            combinedLog=(auditData.value||[]).map(r=>({
              type:r.ACTION_TYPE||'EAM',action:r.ACTION||'',detail:r.DETAIL||'',
              doc:r.DOC_ID||'—',assetId:r.ASSET_ID||'',
              time:r.CREATED_AT?String(r.CREATED_AT).substring(0,16):'',
              id:r.LOG_ID,_persistent:true
            }));
          }
        }catch(e){console.warn('Audit log fetch failed:',e.message);}
        if(combinedLog.length===0){
          const allWOs=loaded.flatMap(a=>a.workOrders.map(w=>({
            type:'EAM',action:`${w.type} Work Order`,detail:`${w.id} — ${w.desc}`,doc:w.id,assetId:a.id,
            time:w.date||'',id:w.id,_ts:w.date||'0'
          }))).sort((a,b)=>b._ts>a._ts?1:-1).slice(0,20);
          combinedLog=allWOs;
        }
        setActivityLog(combinedLog);
      })
      .catch(err=>{
        console.warn('HANA fetch failed, using demo data:',err);
        const fb=ASSETS_INIT.map(a=>({...a,sensorHistory:{...a.sensorHistory}}));
        setAssets(fb);
        setScores(Object.fromEntries(fb.map(a=>[a.id,calcHealthScore(a)])));
        setLiveData(Object.fromEntries(fb.map(a=>[a.id,{}])));
      })
      .finally(()=>setAppLoading(false));
  },[]);
  const [liveOn,setLiveOn]=useState(false);
  const [tab,setTab]=useState(0);
  const [selectedAsset,setSelectedAsset]=useState(null);
  const [activityLog,setActivityLog]=useState([]);
  const [toasts,setToasts]=useState([]);
  const [recalcLoading,setRecalcLoading]=useState(false);
  const liveRef=useRef(false);
  const autoTriggered=useRef({});

  useEffect(()=>{if(!toasts.length)return;const t=setTimeout(()=>setToasts(p=>p.slice(1)),5500);return()=>clearTimeout(t);},[toasts]);

  const addToast=useCallback(t=>setToasts(p=>[...p,{...t,id:Date.now()+Math.random()}]),[]);
  const dismissToast=useCallback(id=>setToasts(p=>p.filter(t=>t.id!==id)),[]);
  const addLog=useCallback(e=>{
    const entry={...e,time:new Date().toLocaleTimeString(),id:Date.now()+Math.random()};
    setActivityLog(p=>[entry,...p]);
    // Persist to HANA AUDIT_LOG (fire-and-forget — don't block UI)
    fetch(`${BACKEND}/asset/AuditLog`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ASSET_ID:e.assetId||null,ACTION_TYPE:e.type||'EAM',
        ACTION:e.action||'',DETAIL:e.detail||'',DOC_ID:e.doc||null,CREATED_BY:'System'})
    }).catch(()=>{});
  },[]);

  // Live simulation ticker
  useEffect(()=>{
    liveRef.current=liveOn;
    if(!liveOn){setLiveData(p=>Object.fromEntries(Object.keys(p).map(k=>[k,{}])));autoTriggered.current={};return;}
    const tick=setInterval(()=>{
      if(!liveRef.current)return;
      setAssets(prevAssets=>{
        const updated=prevAssets.map(a=>{
          const th=a.thresholds;
          const lastTemp=a.sensorHistory.temperature.slice(-1)[0];
          const lastVib=a.sensorHistory.vibration.slice(-1)[0];
          const lastPres=a.sensorHistory.pressure.slice(-1)[0];
          // Walk sensors randomly, with slight upward drift for degrading assets
          const drift=a.lifecycleStage>=4?0.15:a.lifecycleStage>=3?0.05:0;
          const newTemp=Math.max(th.temperature.safe[0],Math.min(th.temperature.crit*1.05,lastTemp+(Math.random()-.45+drift)*1.8));
          const newVib=Math.max(th.vibration.safe[0],Math.min(th.vibration.crit*1.05,lastVib+(Math.random()-.45+drift)*0.12));
          const newPres=Math.max(th.pressure.safe[0],Math.min(th.pressure.crit*1.05,lastPres+(Math.random()-.45+drift)*1.1));
          const newHistory={
            temperature:[...a.sensorHistory.temperature.slice(1),parseFloat(newTemp.toFixed(1))],
            vibration:  [...a.sensorHistory.vibration.slice(1),  parseFloat(newVib.toFixed(2))],
            pressure:   [...a.sensorHistory.pressure.slice(1),    parseFloat(newPres.toFixed(1))],
          };
          return{...a,sensorHistory:newHistory};
        });
        // Recalculate scores for updated assets
        setScores(()=>Object.fromEntries(updated.map(a=>[a.id,calcHealthScore(a)])));
        // Auto-trigger SAP actions for breaches
        updated.forEach(a=>{
          const sc=calcHealthScore(a);
          const key=`${a.id}-${sc<35?'crit':sc<50?'risk':''}`;
          if(!key.endsWith('')&&!autoTriggered.current[key]){
            if(sc<35&&!autoTriggered.current[a.id+'-crit']){
              autoTriggered.current[a.id+'-crit']=true;
              sapApi.createWorkOrder(a.id,'EM','Very High','Auto: live score critical — '+sc).then(w=>{
                addLog({type:'EAM',action:'Auto Emergency WO',detail:w.message,doc:w.id,assetId:a.id});
                addToast({type:'error',title:'🚨 Auto Emergency WO',message:`${a.shortName}: score dropped to ${sc}`});
              });
            } else if(sc<50&&!autoTriggered.current[a.id+'-risk']&&!autoTriggered.current[a.id+'-crit']){
              autoTriggered.current[a.id+'-risk']=true;
              sapApi.createPMNotification(a.id,'High','Auto: live score at risk — '+sc).then(n=>{
                addLog({type:'EAM',action:'Auto Notification',detail:n.message,doc:n.id,assetId:a.id});
                addToast({type:'warning',title:'⚠️ Auto Notification',message:`${a.shortName}: score at risk (${sc})`});
              });
            }
          }
        });
        return updated;
      });
    },2800);
    return()=>clearInterval(tick);
  },[liveOn,addLog,addToast]);

  const handleToggleLive=()=>{
    setLiveOn(p=>!p);
    if(!liveOn)addToast({type:'info',title:'Live Simulation Started',message:'Sensors updating every 3s — SAP auto-triggers active'});
    else addToast({type:'info',title:'Simulation Stopped',message:'Sensor data reset to baseline'});
  };

  const handleRecalc=async()=>{
    setRecalcLoading(true);
    await pause(800);
    setScores(()=>Object.fromEntries(assets.map(a=>[a.id,calcHealthScore(a)])));
    await sapApi.triggerScoreRecalc();
    addLog({type:'EAM',action:'Health Score Recalculation',detail:`All ${assets.length} assets recalculated`,doc:'BATCH',assetId:'ALL'});
    addToast({type:'success',title:'Recalculation Complete',message:`All ${assets.length} asset health scores updated`});
    setRecalcLoading(false);
  };

  const handleSelectAsset=a=>{
    const current=assets.find(x=>x.id===a.id)||a;
    setSelectedAsset(current);setTab(1);
  };

  const TABS=[
    {label:'Fleet Overview',icon:'🏭'},
    {label:'Asset Detail',  icon:'🔍'},
    {label:'Risk & Compliance',icon:'⚠️'},
    {label:'Financial Impact',icon:'💰'},
    {label:'KPI Dashboard',icon:'📊'},

            alt="BluWis — Ideate Innovate Impact"
            style={{
              height:44,
              width:'auto',
              mixBlendMode:'screen',
              imageRendering:'crisp-edges',
              userSelect:'none',
              pointerEvents:'none'
            }}
          />
        </div>

        {/* Divider */}
        <div style={{width:1,height:30,background:'rgba(255,255,255,.15)',flexShrink:0}}/>

        {/* Platform label */}
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:600,fontSize:13,color:'#FFF',letterSpacing:.2}}>
            Asset Health Intelligence Platform
          </div>
          <div style={{fontSize:10.5,color:'#FFFFFF',marginTop:1}}>
            Oil &amp; Gas · Predictive Maintenance · S/4HANA EAM Integration · {assets.length} assets monitored
          </div>
        </div>

        {/* Right-side badges */}
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',flexShrink:0}}>
          {liveOn&&(
            <span style={{background:'#107E3E',color:'#FFF',borderRadius:12,padding:'3px 10px',
              fontWeight:700,fontSize:11,display:'flex',alignItems:'center',gap:5}}>
              <span className="live-dot" style={{width:6,height:6,borderRadius:'50%',background:'#90EE90',display:'inline-block'}}/>
              LIVE
            </span>
          )}
          {critCount>0&&(
            <span style={{background:C.crit,color:'#FFF',borderRadius:12,padding:'3px 10px',fontWeight:700,fontSize:11}}>
              🚨 {critCount} Critical
            </span>
          )}
          {riskCount>0&&(
            <span style={{background:C.warn,color:'#FFF',borderRadius:12,padding:'3px 10px',fontWeight:700,fontSize:11}}>
              ⚠️ {riskCount} At Risk
            </span>
          )}
          <div style={{display:'flex',alignItems:'center',gap:6,background:'rgba(255,255,255,.10)',
            padding:'4px 12px',borderRadius:14,border:'1px solid rgba(255,255,255,.12)'}}>
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
              <circle cx="6.5" cy="4.5" r="2.5" fill="rgba(255,255,255,0.7)"/>
              <path d="M1 12c0-3 2.5-5 5.5-5s5.5 2 5.5 5" stroke="rgba(255,255,255,0.7)" strokeWidth="1.2" strokeLinecap="round" fill="none"/>
            </svg>
            <span style={{fontSize:12,color:'#FFFFFF'}}>Asset Engineer</span>
          </div>
        </div>
      </div>

      {/* Tab nav */}
      <div style={{background:C.hdr2,display:'flex',gap:0,padding:'0 20px',overflowX:'auto',boxShadow:'0 1px 4px rgba(0,0,0,.15)'}}>
        {TABS.map((t,i)=>(
          <button key={i} onClick={()=>setTab(i)}
            style={{padding:'11px 18px',border:'none',background:'none',
              color:'#FFFFFF',fontWeight:tab===i?700:400,
              fontSize:12,borderBottom:tab===i?'3px solid #64B5F6':'3px solid transparent',
              whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:6}}>
            <span>{t.icon}</span>{t.label}
          </button>
        ))}
      </div>

      {/* Breadcrumb */}
      <div style={{background:'#EAEEf2',borderBottom:`1px solid ${C.bdr}`,padding:'5px 20px',fontSize:11,color:C.lt}}>
        Home › Asset Management › {TABS[tab].label}{tab===1&&effectiveSelected?` › ${effectiveSelected.name}`:''}
      </div>

      {/* Content */}
      <div style={{maxWidth:1480,margin:'0 auto'}}>
        {tab===0&&<FleetOverview assets={assets} scores={scores} liveAssets={liveData} liveOn={liveOn}
          onToggleLive={handleToggleLive} onSelect={handleSelectAsset} onRecalc={handleRecalc} recalcLoading={recalcLoading}/>}
        {tab===1&&(effectiveSelected?(
          <AssetDetail asset={effectiveSelected} score={scores[effectiveSelected.id]||50}
            liveData={liveData[effectiveSelected.id]} liveOn={liveOn} addLog={addLog} addToast={addToast}/>
        ):(
          <div style={{padding:64,textAlign:'center',color:C.lt}}>
            <div style={{fontSize:48,marginBottom:16}}>🔍</div>
            <div style={{fontSize:16,fontWeight:600,marginBottom:8}}>No asset selected</div>
            <div style={{fontSize:13}}>Click any asset card in Fleet Overview to view detailed analysis.</div>
          </div>
        ))}
        {tab===2&&<RiskCompliance assets={assets} scores={scores} addLog={addLog} addToast={addToast}/>}
        {tab===3&&<FinancialImpact assets={assets} scores={scores}/>}
        {tab===4&&<KPIDashboard assets={assets} scores={scores}/>}
        {tab===5&&<ActionCentre log={activityLog} assets={assets} scores={scores} addLog={addLog} addToast={addToast}/>}
        {tab===6&&<MonitoringTab assets={assets}/>}
        {tab===7&&<SimulationTab assets={assets}/>}
      </div>

      <div style={{textAlign:'center',fontSize:11,color:C.lt,padding:'14px 0',borderTop:`1px solid ${C.bdr}`,marginTop:20}}>
        © {new Date().getFullYear()} BluWis · Asset Health Intelligence Platform · Oil &amp; Gas · ISO 55000 · API 580 · OSHA PSM · IEC 61511 · ASME VIII
      </div>

      <ToastStack toasts={toasts} onDismiss={dismissToast}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
