          style={{padding:'5px 14px',borderRadius:5,border:'none',
            background:diagLoading?'#E0E0E0':C.info,color:'#FFF',
            fontWeight:700,fontSize:11,cursor:diagLoading?'not-allowed':'pointer',
            display:'flex',alignItems:'center',gap:6}}>
          {diagLoading?<><Spinner size={11} color='#FFF'/>Analysing…</>:<>▶ Analyse Asset</>}
        </button>}>
        {!diagResult&&!diagLoading&&(
          <div style={{padding:'20px 18px',fontSize:12,color:C.mid,lineHeight:1.6}}>
            Click <strong>Analyse Asset</strong> to run AI-powered root cause analysis using
            <strong> Llama 3.1 8B (Groq)</strong> with live HANA context — sensor readings,
            failure history, damage mechanisms, and compliance documents.
          </div>
        )}
        {diagLoading&&(
          <div style={{padding:'24px',textAlign:'center',color:C.info,fontSize:12}}>
            <Spinner size={20} color={C.info}/><div style={{marginTop:10}}>
            Fetching HANA context + running LLM analysis…</div>
          </div>
        )}
        {diagResult&&(()=>{
          const d=diagResult.diagnosis||{};
          const urgencyColor={Immediate:C.crit,'Within 24h':C.warn,'Within 1 week':C.info,Scheduled:C.ok};
          const uc=urgencyColor[d.urgency]||C.mid;
          return(
            <div style={{padding:'14px 18px',display:'flex',flexDirection:'column',gap:12}}>
              {/* Score bar */}
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                {[
                  {l:'Confidence',v:`${d.confidence||0}%`,c:d.confidence>=70?C.ok:d.confidence>=40?C.warn:C.crit},
                  {l:'Urgency',v:d.urgency||'Unknown',c:uc},
                  {l:'Est. Downtime',v:d.estimatedDowntime||'N/A',c:C.mid},
                  {l:'Model',v:diagResult.model,c:C.info},
                ].map(b=>(
                  <div key={b.l} style={{background:'#F5F7FA',borderRadius:6,padding:'6px 12px',textAlign:'center',minWidth:100}}>
                    <div style={{fontSize:12,fontWeight:700,color:b.c}}>{b.v}</div>
                    <div style={{fontSize:9,color:C.lt,marginTop:2}}>{b.l}</div>
                  </div>
                ))}
              </div>
              {/* Root Cause */}
              <div style={{background:`${C.crit}0f`,border:`1px solid ${C.crit}33`,borderRadius:7,padding:'10px 12px'}}>
                <div style={{fontSize:11,fontWeight:700,color:C.crit,marginBottom:5}}>🔍 ROOT CAUSE</div>
                <div style={{fontSize:12,color:C.dk,lineHeight:1.6}}>{d.rootCause||'—'}</div>
                {d.affectedTags?.length>0&&(
                  <div style={{marginTop:6,display:'flex',gap:4,flexWrap:'wrap'}}>
                    {d.affectedTags.map(t=>(
                      <span key={t} style={{background:`${C.crit}18`,color:C.crit,borderRadius:3,
                        padding:'2px 6px',fontSize:9,fontWeight:700}}>{t}</span>
                    ))}
                  </div>
                )}
              </div>
              {/* Corrective */}
              <div style={{background:`${C.warn}0f`,border:`1px solid ${C.warn}33`,borderRadius:7,padding:'10px 12px'}}>
                <div style={{fontSize:11,fontWeight:700,color:C.warn,marginBottom:5}}>🔧 CORRECTIVE ACTION</div>
                <div style={{fontSize:12,color:C.dk,lineHeight:1.6,whiteSpace:'pre-wrap'}}>{d.correctiveAction||'—'}</div>
              </div>
              {/* Preventive */}
              <div style={{background:`${C.ok}0f`,border:`1px solid ${C.ok}33`,borderRadius:7,padding:'10px 12px'}}>
                <div style={{fontSize:11,fontWeight:700,color:C.ok,marginBottom:5}}>🛡 PREVENTIVE ACTION</div>
                <div style={{fontSize:12,color:C.dk,lineHeight:1.6,whiteSpace:'pre-wrap'}}>{d.preventiveAction||'—'}</div>
              </div>
              {/* References */}
              {d.references?.length>0&&(
                <div style={{fontSize:10,color:C.mid}}>
                  📋 References: {d.references.join(' · ')}
                </div>
              )}
              {/* Actions */}
              <div style={{display:'flex',gap:8,marginTop:4}}>
                <button onClick={()=>doSapAction('wo',
                  ()=>sapApi.createWorkOrder(asset.id,`AI Diagnosis: ${d.rootCause?.substring(0,80)}`,
                    d.urgency==='Immediate'?1:d.urgency==='Within 24h'?2:3),
                  {action:'Create WO from AI Diagnosis',assetId:asset.id},
                  {type:'success',title:'Work Order Created',message:'AI-recommended WO raised'})}
                  style={{padding:'7px 14px',borderRadius:5,border:'none',
                    background:C.info,color:'#FFF',fontWeight:700,fontSize:11,cursor:'pointer'}}>
                  + Create Work Order
                </button>
                <button onClick={runDiagnostics}
                  style={{padding:'7px 14px',borderRadius:5,border:`1px solid ${C.bdr}`,
                    background:'#F5F5F5',color:C.mid,fontWeight:700,fontSize:11,cursor:'pointer'}}>
                  ↺ Re-analyse
                </button>
              </div>
              <div style={{fontSize:9,color:C.lt}}>
                Analysed at {new Date(diagResult.analyzedAt).toLocaleString()} · RAG sources: HANA sensor data, failure history, compliance docs
              </div>
            </div>
          );
        })()}
      </Card>

      {/* Autoencoder Multivariate Anomaly Detection */}
      <Card title="🔬 Autoencoder Anomaly Detection" icon=""
        right={<button onClick={runAutoencoder} disabled={aeLoading}
          style={{padding:'5px 14px',borderRadius:5,border:'none',
            background:aeLoading?'#E0E0E0':'#7B1FA2',color:'#FFF',
            fontWeight:700,fontSize:11,cursor:aeLoading?'not-allowed':'pointer'}}>
          {aeLoading?<><Spinner size={11} color='#FFF'/>&nbsp;Scanning…</>:<>▶ Run Scan</>}
        </button>}>
        {!aeResult&&!aeLoading&&(
          <div style={{padding:'20px 18px',fontSize:12,color:C.mid,lineHeight:1.6}}>
            <div style={{fontWeight:600,marginBottom:6}}>MLP Autoencoder — Multivariate Sensor Analysis</div>
            Click <strong>Run Scan</strong> to detect anomalous sensor correlations using an autoencoder
            trained on {asset.type||'this asset'} normal operating data.
            Unlike single-tag Z-score, this model catches subtle multi-sensor pattern deviations.
          </div>
        )}
        {aeResult&&(()=>{
          const scoreColor=s=>s>=70?C.crit:s>=40?C.warn:C.ok;
          const tags=Object.entries(aeResult.tagScores||{}).sort((a,b)=>b[1]-a[1]);
          return(
            <div style={{padding:'14px 18px'}}>
              {/* Summary badges */}
              <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:14}}>
                {[
                  {l:'Anomaly Score',v:`${aeResult.overallAnomalyScore}%`,c:scoreColor(aeResult.overallAnomalyScore)},
                  {l:'Status',v:aeResult.isAnomaly?'Anomaly Detected':'Normal',c:aeResult.isAnomaly?C.crit:C.ok},
                  {l:'Lead Tag',v:aeResult.mostAnomalousTag||'—',c:scoreColor((aeResult.tagScores||{})[aeResult.mostAnomalousTag]||0)},
                  {l:'Model',v:aeResult.model,c:'#7B1FA2'},
                ].map(b=>(
                  <div key={b.l} style={{background:'#F5F7FA',borderRadius:6,padding:'6px 12px',textAlign:'center',minWidth:100}}>
                    <div style={{fontSize:9,color:C.mid,textTransform:'uppercase',letterSpacing:.5}}>{b.l}</div>
                    <div style={{fontSize:12,fontWeight:700,color:b.c,marginTop:2}}>{b.v}</div>
                  </div>
                ))}
              </div>

              {/* Per-tag bar chart */}
              <div style={{fontSize:11,fontWeight:600,color:C.mid,marginBottom:8,textTransform:'uppercase',letterSpacing:.5}}>
                Reconstruction Error by Sensor Tag
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {tags.map(([tag,score])=>(
                  <div key={tag} style={{display:'flex',alignItems:'center',gap:8}}>
                    <div style={{width:120,fontSize:11,color:C.dk,fontWeight:tag===aeResult.mostAnomalousTag?700:400,
                      fontFamily:'monospace',textOverflow:'ellipsis',overflow:'hidden',whiteSpace:'nowrap'}}>
                      {tag}
                    </div>
                    <div style={{flex:1,background:'#F0F0F0',borderRadius:4,height:14,position:'relative'}}>
                      <div style={{
                        width:`${Math.min(100,score)}%`,height:'100%',borderRadius:4,
                        background:scoreColor(score),
                        transition:'width .4s ease',
                      }}/>
                    </div>
                    <div style={{width:42,fontSize:11,fontWeight:700,color:scoreColor(score),textAlign:'right'}}>
                      {score.toFixed(1)}
                    </div>
                  </div>
                ))}
              </div>

              {/* Anomalous tags alert */}
              {aeResult.isAnomaly&&aeResult.anomalousTags&&aeResult.anomalousTags.length>0&&(
                <div style={{marginTop:12,padding:'8px 12px',background:C.critBg,
                  border:`1px solid ${C.crit}33`,borderRadius:6,fontSize:11,color:C.crit}}>
                  <strong>Anomalous tags:</strong> {aeResult.anomalousTags.join(', ')} —
                  multi-sensor correlation deviates from trained baseline.
                  Consider cross-referencing with the Intelligent Diagnostics panel.
                </div>
              )}

              {/* Actions */}
              <div style={{display:'flex',gap:8,marginTop:14,flexWrap:'wrap'}}>
                {aeResult.isAnomaly&&(
                  <button onClick={()=>{
                    const detail=`Autoencoder anomaly: score ${aeResult.overallAnomalyScore}%, lead tag ${aeResult.mostAnomalousTag}`;
                    doSapAction('ae-wo',
                      ()=>sapApi.createWorkOrder(asset.id,'Autoencoder anomaly — multi-sensor deviation',2),
                      {type:'PM',action:'Autoencoder WO'},
                      {type:'success',title:'Work Order Created',message:`WO raised for ${asset.shortName} — ${detail}`});
                  }} disabled={sapLoading['ae-wo']}
                  style={{padding:'7px 14px',borderRadius:5,border:'none',
                    background:C.crit,color:'#FFF',fontWeight:700,fontSize:11,cursor:'pointer'}}>
                    + Create Work Order
                  </button>
                )}
                <button onClick={runAutoencoder}
                  style={{padding:'7px 14px',borderRadius:5,border:`1px solid ${C.bdr}`,
                    background:'#F5F5F5',color:C.mid,fontWeight:700,fontSize:11,cursor:'pointer'}}>
                  ↺ Re-scan
                </button>
              </div>
              <div style={{fontSize:9,color:C.lt,marginTop:8}}>
                Trained on {aeResult.trainRows||'—'} hourly readings ·
                MSE threshold {aeResult.threshold} · {aeResult.tagsMonitored?.length||0} tags monitored
              </div>
            </div>
          );
        })()}
      </Card>

      {/* Health Score Breakdown */}
      <HealthScoreBreakdown asset={asset} healthScore={effScore}/>
      <ProcessParametersPanel asset={asset}/>

      {/* Lifecycle */}
      <Card title="Asset Lifecycle Stage" icon="📍">
        <div style={{padding:'14px 18px'}}>
          <LifecycleStepper stage={asset.lifecycleStage}/>
          {asset.lifecycleStage>=4&&(
            <div style={{marginTop:12,padding:'10px 14px',background:asset.lifecycleStage===5?C.critBg:C.warnBg,
              border:`1px solid ${asset.lifecycleStage===5?C.crit:C.warn}33`,borderRadius:6,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
              <span style={{fontSize:12,color:asset.lifecycleStage===5?C.crit:C.warn,fontWeight:600}}>
                {asset.lifecycleStage===5?'🚨 End-of-Life — capital replacement required':'⚠️ Degrading stage — begin replacement planning'}
              </span>
              <button onClick={()=>doSapAction('repl',
                ()=>sapApi.initiateReplacement(asset.id,asset.replacementCost),
                {type:'MM',action:'Replacement PR'},
                {type:'warning',title:'Replacement PR',message:`PR initiated for ${asset.shortName}`})}
                disabled={sapLoading.repl}
                style={{padding:'5px 14px',borderRadius:5,border:`1px solid ${C.warn}`,background:C.warnBg,color:C.warn,fontSize:11,fontWeight:700}}>
                Initiate Replacement Planning
              </button>
            </div>
          )}
        </div>
      </Card>

      {/* Sensor Trend Charts */}
      <Card title={`Sensor Trend Analysis${liveOn?' — LIVE':'  — Last 10 Readings'}`} icon="📈"
        right={liveOn&&<span style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:C.ok,fontWeight:700}}><span className="live-dot" style={{width:8,height:8,borderRadius:'50%',background:C.ok,display:'inline-block'}}/>Live stream active</span>}>
        <div style={{padding:'14px 18px',display:'flex',flexDirection:'column',gap:16}}>
          <div>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,flexWrap:'wrap',gap:6}}>
              <span style={{fontSize:12,fontWeight:700}}>🌡️ Temperature ({th.temperature.unit})</span>
              <div style={{display:'flex',gap:12,fontSize:10}}>
                <span style={{color:C.warn}}>─ Warning ({th.temperature.warn[0]}{th.temperature.unit})</span>
                <span style={{color:C.crit}}>─ Critical ({th.temperature.crit}{th.temperature.unit})</span>
              </div>
            </div>
            <TrendChart series={[{name:'Temp',color:C.crit,values:tempHistory}]} labels={labels} width={580} height={115}
              thresholds={[{value:th.temperature.warn[0],color:C.warn,label:'WARN'},{value:th.temperature.crit,color:C.crit,label:'CRIT'}]}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            <div>
              <div style={{fontSize:12,fontWeight:700,marginBottom:6}}>⚡ Vibration ({th.vibration.unit})</div>
              <TrendChart series={[{name:'Vib',color:C.warn,values:vibHistory}]} labels={labels} width={270} height={95}
                thresholds={[{value:th.vibration.warn[0],color:C.warn,label:'W'},{value:th.vibration.crit,color:C.crit,label:'C'}]}/>
            </div>
            <div>
              <div style={{fontSize:12,fontWeight:700,marginBottom:6}}>🔵 Pressure ({th.pressure.unit})</div>
              <TrendChart series={[{name:'Pres',color:C.info,values:presHistory}]} labels={labels} width={270} height={95}
                thresholds={[{value:th.pressure.warn[0],color:C.warn,label:'W'},{value:th.pressure.crit,color:C.crit,label:'C'}]}/>
            </div>
          </div>
        </div>
      </Card>

      {/* Trend-to-Failure Forecast */}
      <Card title="Trend-to-Failure Simulation — Oil Temperature Escalation" icon="🔮">
        <div style={{padding:'14px 18px'}}>
          <div style={{display:'flex',gap:14,marginBottom:16,alignItems:'center',flexWrap:'wrap'}}>
            <div style={{flex:1,fontSize:12,color:C.mid,lineHeight:1.5}}>
              Simulates rising oil temperature impact on health score, RUL, and SAP EAM workflow auto-triggers.
            </div>
            {fStep===-1?(
              <button onClick={runForecast} disabled={fRunning}
                style={{padding:'8px 22px',borderRadius:6,border:'none',background:C.crit,color:'#FFF',fontWeight:700,fontSize:13}}>
                ▶ Run Simulation
              </button>
            ):(
              <button onClick={resetForecast} disabled={fRunning}
                style={{padding:'8px 22px',borderRadius:6,border:`1px solid ${C.bdr}`,background:'#F5F5F5',color:C.mid,fontWeight:700,fontSize:13}}>
                ↺ Reset
              </button>
            )}
          </div>

          <div style={{display:'flex',gap:0,marginBottom:18,position:'relative'}}>
            <div style={{position:'absolute',top:14,left:20,right:20,height:2,background:'#E0E0E0',zIndex:0}}/>
            {FORECAST_STEPS.map((s,i)=>{
              const active=fStep===i,past=fStep>i,color=sevColor[s.sev]||C.lt;
              return(
                <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',position:'relative',zIndex:1}}>
                  <div style={{width:30,height:30,borderRadius:'50%',
                    background:active||past?color:'#E0E0E0',border:active?`3px solid ${color}`:'none',
                    display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,
                    color:active||past?'#FFF':C.lt,boxShadow:active?`0 0 0 4px ${color}33`:''}}
                    className={active?'pulse':''}>
                    {past?'✓':`${s.temp}°`}
                  </div>
                  <div style={{fontSize:10,fontWeight:active?700:400,color:active?color:C.lt,marginTop:5,textAlign:'center'}}>{s.label}</div>
                </div>
              );
            })}
          </div>

          {fStep>=0&&(
            <div className="fadein" style={{background:'#F8F9FB',border:`1px solid ${C.bdr}`,borderRadius:8,padding:14,display:'flex',gap:16,flexWrap:'wrap'}}>
              <div style={{minWidth:120}}>
                <div style={{fontSize:11,color:C.lt,marginBottom:4}}>Simulated Score</div>
                <div style={{fontSize:30,fontWeight:800,color:scoreStatus(fScore).color}}>{fScore}</div>
                <div style={{marginTop:8,fontSize:11,color:C.lt}}>RUL</div>
                <div style={{fontWeight:700,color:C.mid,fontSize:14}}>{fRul.toLocaleString()}d</div>
              </div>
              <div style={{flex:1,borderLeft:`1px solid ${C.bdr}`,paddingLeft:14,minWidth:200}}>
                <div style={{fontSize:12,fontWeight:700,color:sevColor[FORECAST_STEPS[fStep].sev],marginBottom:6,display:'flex',alignItems:'center',gap:6}}>
                  {fRunning&&<Spinner size={12} color={sevColor[FORECAST_STEPS[fStep].sev]}/>}
                  {FORECAST_STEPS[fStep].label} @ {FORECAST_STEPS[fStep].temp}°C
                </div>
                <div style={{fontSize:12,color:C.mid,lineHeight:1.6}}>{FORECAST_STEPS[fStep].action}</div>
                {FORECAST_STEPS[fStep].scoreΔ<0&&(
                  <div style={{marginTop:8,fontSize:11,color:C.crit,fontWeight:600}}>
                    Health impact: {FORECAST_STEPS[fStep].scoreΔ} pts &nbsp;|&nbsp; RUL reduction: ~{Math.abs(FORECAST_STEPS[fStep].scoreΔ*2)}%
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      </Card>

      {/* Work Order Update Modal */}
      {editingWO&&<WOUpdateModal wo={editingWO} assetId={asset.id}
        onClose={()=>setEditingWO(null)}
        onSaved={(updated)=>{
          setLocalWOs(prev=>prev.map(w=>w.id===updated.id?updated:w));
          addLog&&addLog({type:'EAM',action:'Work Order Updated',detail:`${updated.id} → ${updated.status}`,doc:updated.id,assetId:asset.id});
          addToast&&addToast({type:'success',title:'Work Order Updated',message:`${updated.id} status: ${updated.status}`});
          setEditingWO(null);
        }}
        onError={(msg)=>addToast&&addToast({type:'error',title:'Update Failed',message:msg})}
      />}

      {/* Work Orders */}
      <Card title="SAP Work Order History" icon="📋">
        <div style={{padding:12}}>
          <div style={{overflowX:'auto'}}>
            <table>
              <thead><tr style={{background:'#F8F9FB',borderBottom:`1px solid ${C.bdr}`}}>
                {['WO ID','Type','Description','Date','Hours','Cost (USD)','Status','Actions'].map(h=>(
                  <th key={h} style={{fontWeight:600,color:C.mid,fontSize:11}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {localWOs.map((wo,i)=>{
                  const tc=WO_TYPE_COLOR[wo.type]||C.lt;
                  const stc=wo.status==='Completed'?C.ok:wo.status==='In Progress'?C.info:C.warn;
                  return(
                    <tr key={wo.id} style={{borderBottom:`1px solid ${C.bdr}`,background:i%2===0?'#FFF':'#FAFAFA'}}>
                      <td style={{color:C.info,fontWeight:600,fontSize:11}}>{wo.id}</td>
                      <td><span style={{background:`${tc}18`,color:tc,borderRadius:4,padding:'2px 7px',fontSize:10,fontWeight:700}}>{wo.type}</span></td>
                      <td style={{maxWidth:200,fontSize:11}}>{wo.desc}</td>
                      <td style={{color:C.lt,fontSize:11,whiteSpace:'nowrap'}}>{wo.date}</td>
                      <td style={{color:C.mid,fontSize:11}}>{wo.hrs}h</td>
                      <td style={{fontWeight:600,fontSize:11}}>${(wo.cost||0).toLocaleString()}</td>
                      <td><span style={{background:`${stc}18`,color:stc,borderRadius:4,padding:'2px 7px',fontSize:10,fontWeight:700}}>{wo.status}</span></td>
                      <td style={{display:'flex',gap:6,alignItems:'center'}}>
                        {wo.status!=='Completed'&&(
                          <button onClick={()=>setEditingWO(wo)}
                            style={{padding:'3px 10px',borderRadius:4,border:`1px solid ${C.info}`,background:`${C.info}12`,color:C.info,fontSize:10,fontWeight:700,cursor:'pointer'}}>
                            Update
                          </button>
                        )}
                        {wo.status==='Completed'&&(
                          <button onClick={()=>genInvoice(wo)}
                            style={{padding:'3px 10px',borderRadius:4,border:`1px solid ${C.gold}`,background:C.goldBg,color:C.gold,fontSize:10,fontWeight:700,cursor:'pointer'}}>
                            Invoice
                          </button>
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </Card>

      {/* Failure History */}
      {asset.failures.length>0&&(
        <Card title="Failure History" icon="🔴">
          <div style={{padding:12}}>
            <div style={{overflowX:'auto'}}>
              <table>
                <thead><tr style={{background:'#F8F9FB',borderBottom:`1px solid ${C.bdr}`}}>
                  {['Date','Root Cause','Downtime (hrs)','Cost (USD)'].map(h=>(
                    <th key={h} style={{fontWeight:600,color:C.mid,fontSize:11}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {asset.failures.map((f,i)=>(
                    <tr key={i} style={{borderBottom:`1px solid ${C.bdr}`,background:i%2===0?'#FFF':'#FAFAFA'}}>
                      <td style={{color:C.lt,fontSize:11,whiteSpace:'nowrap'}}>{f.date}</td>
                      <td style={{fontSize:11}}>{f.cause}</td>
                      <td style={{fontWeight:600,color:C.crit,fontSize:11}}>{f.downtime}h</td>
                      <td style={{fontWeight:600,color:C.crit,fontSize:11}}>${f.cost.toLocaleString()}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{padding:'8px 12px',background:C.critBg,borderRadius:6,marginTop:10,fontSize:11,
              display:'flex',justifyContent:'space-between'}}>
              <span style={{color:C.crit,fontWeight:600}}>Total downtime: {asset.failures.reduce((a,f)=>a+f.downtime,0)}h</span>
              <span style={{color:C.crit,fontWeight:600}}>Total cost: ${asset.failures.reduce((a,f)=>a+f.cost,0).toLocaleString()}</span>
            </div>
          </div>
        </Card>
      )}

      {/* Corrosion & Integrity */}
      <CorrosionIntegrityPanel assetId={asset.id}/>

      {/* Damage Mechanisms */}
      <DamageMechanismsPanel assetId={asset.id}/>

      {/* Compliance Status */}
      <ComplianceStatusPanel asset={asset} addLog={addLog} addToast={addToast}/>

      {/* Permits */}
      <PermitsPanel assetId={asset.id}/>

      {/* Safety Events */}
      <SafetyEventsPanel assetId={asset.id}/>

      {/* Spare Parts */}
      <SparePartsPanel assetId={asset.id}/>

      {/* Invoices */}
      <InvoicesPanel assetId={asset.id}/>

      {invoice&&<InvoiceModal inv={invoice} onClose={()=>setInvoice(null)}/>}
    </div>
  );
}

/* ── TAB 7: MONITORING ──────────────────────────────────────── */
const MON_STATUS_COLOR={'Alert':C=>C.crit,'Elevated':C=>C.warn,'Nominal':C=>C.ok,'Error':C=>C.lt};
const MON_TAGS={
  'Centrifugal Pump':        ['VIBRATION','DISCHARGE_PRESSURE','FLOW_RATE','SUCTION_PRESSURE'],
  'Reciprocating Compressor':['VIBRATION','DISCHARGE_TEMP','DISCHARGE_PRESSURE','RPM'],
  'Shell & Tube Heat Exch.': ['DIFFERENTIAL_PRES','INLET_TEMP','OUTLET_TEMP','FLOW_RATE'],
  '3-Phase Separator':       ['LEVEL','PRESSURE','TEMPERATURE','GAS_FLOW'],
  'Control Valve':           ['POSITION','UPSTREAM_PRESSURE','DOWNSTREAM_PRESSURE'],
};

function MonitoringTab({assets}){
  const [configs,setConfigs]=useState([]);
  const [alerts,setAlerts]=useState([]);
  const [versions,setVersions]=useState([]);
  const [scanning,setScanning]=useState(false);
  const [scanResult,setScanResult]=useState(null);
  const [loading,setLoading]=useState(true);
  // Setup form state
  const [setupAssetId,setSetupAssetId]=useState('');
  const [setupMode,setSetupMode]=useState('single');   // 'single'|'composite'
  const [setupTag,setSetupTag]=useState('');
  const [setupTags,setSetupTags]=useState([]);          // composite: selected tags
  const [setupWeights,setSetupWeights]=useState({});    // composite: {tag: weight 0-100}
  const [setupScore,setSetupScore]=useState(50);
  const [setupConsec,setSetupConsec]=useState(3);
  const [setupWindow,setSetupWindow]=useState(0);
  const [setupLookback,setSetupLookback]=useState(48);
  const [setupAutoWo,setSetupAutoWo]=useState(false);
  const [setupVersion,setSetupVersion]=useState('');
  const [saving,setSaving]=useState(false);
  // Ack modal
  const [ackAlert,setAckAlert]=useState(null);
  const [ackNote,setAckNote]=useState('');
  const [ackCreateWo,setAckCreateWo]=useState(false);
  // TimeGPT forecast per alert: { [ALERT_ID]: {loading, data, error} }
  const [forecasts,setForecasts]=useState({});
  // Planned outages
  const [outages,setOutages]=useState([]);
  const [outageAsset,setOutageAsset]=useState('');
  const [outageType,setOutageType]=useState('PM');
  const [outageStart,setOutageStart]=useState('');
  const [outageEnd,setOutageEnd]=useState('');
  const [outageDesc,setOutageDesc]=useState('');
  const [outageSaving,setOutageSaving]=useState(false);

  const setupAsset=assets.find(a=>a.id===setupAssetId);
  const availTags=setupAsset?MON_TAGS[setupAsset.type]||['VIBRATION']:[];

  // When asset changes reset tag selections and load equipment-default weights
  const EQUIP_WEIGHTS={
    'Centrifugal Pump':         {VIBRATION:50,SUCTION_PRESSURE:20,DISCHARGE_PRESSURE:15,FLOW_RATE:15},
    'Reciprocating Compressor': {VIBRATION:45,DISCHARGE_TEMP:35,DISCHARGE_PRESSURE:15,RPM:5},
    '3-Phase Separator':        {PRESSURE:35,LEVEL:30,TEMPERATURE:20,GAS_FLOW:15},
    'Shell & Tube Heat Exch.':  {DIFFERENTIAL_PRES:35,OUTLET_TEMP:30,INLET_TEMP:20,FLOW_RATE:15},
    'Control Valve':            {POSITION:40,DOWNSTREAM_PRESSURE:30,UPSTREAM_PRESSURE:30},
  };
  const defaultWeightsForAsset=setupAsset?EQUIP_WEIGHTS[setupAsset.type]||{}:{};

  const toggleSetupTag=(tag)=>{
    setSetupTags(prev=>{
      const next=prev.includes(tag)?prev.filter(t=>t!==tag):[...prev,tag];
      // Initialise weight from equipment default or 50
      if(!prev.includes(tag)){
        setSetupWeights(w=>({...w,[tag]:defaultWeightsForAsset[tag]||50}));
      }
      return next;
    });
  };

  const totalWeightPct=setupTags.reduce((s,t)=>s+(setupWeights[t]||0),0);

  const load=async()=>{
    setLoading(true);
    try{
      const [cfgR,alR,outR]=await Promise.all([
        fetch(`${BACKEND}/api/monitoring/config`).then(r=>r.json()),
        fetch(`${BACKEND}/api/monitoring/alerts`).then(r=>r.json()),
        fetch(`${BACKEND}/api/outages`).then(r=>r.json()),
      ]);
      setConfigs(cfgR.value||[]);
      setAlerts(alR.value||[]);
      setOutages(outR.value||[]);
    }catch(e){}
    setLoading(false);
  };

  const loadVersions=async(aid,tag)=>{
    if(!aid||!tag)return;
    try{
      const r=await fetch(`${BACKEND}/api/simulation/versions?assetId=${aid}&tagName=${tag}`);
      const d=await r.json();setVersions(d.value||[]);
    }catch(e){}
  };

  useEffect(()=>{load();},[]);
  useEffect(()=>{loadVersions(setupAssetId,setupTag);},[setupAssetId,setupTag]);

  const saveOutage=async()=>{
    if(!outageAsset||!outageStart||!outageEnd){alert('Asset, start and end are required.');return;}
    if(new Date(outageStart)>=new Date(outageEnd)){alert('End must be after start.');return;}
    setOutageSaving(true);
    try{
      await fetch(`${BACKEND}/api/outages`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({assetId:outageAsset,outageType,startTs:outageStart+':00',endTs:outageEnd+':00',
          description:outageDesc||undefined,createdBy:'User'})
      });
      setOutageAsset('');setOutageStart('');setOutageEnd('');setOutageDesc('');setOutageType('PM');
      load();
    }catch(e){alert('Save failed: '+e.message);}
    setOutageSaving(false);
  };

  const deleteOutage=async(id)=>{
    await fetch(`${BACKEND}/api/outages/${id}`,{method:'DELETE'});
    load();
  };

  const saveConfig=async()=>{
    if(!setupAssetId){alert('Select an asset.');return;}
    if(setupMode==='single'&&!setupTag){alert('Select a tag.');return;}
    if(setupMode==='composite'&&setupTags.length<2){alert('Select at least 2 tags for composite monitoring.');return;}
    setSaving(true);
    try{
      const body={assetId:setupAssetId,
        scoreThreshold:setupScore,consecutiveMin:setupConsec,
        rollingWindow:setupWindow,lookbackHours:setupLookback,
        autoCreateWo:setupAutoWo};
      if(setupMode==='composite'){
        // Normalise weights to sum=100 and serialize
        const sum=setupTags.reduce((s,t)=>s+(setupWeights[t]||0),0)||100;
        const normWeights={};
        setupTags.forEach(t=>{ normWeights[t]=Math.round((setupWeights[t]||0)/sum*100)/100; });
        body.tagNames=setupTags.join(',');
        body.tagWeights=JSON.stringify(normWeights);
      } else {
        body.tagName=setupTag;
        body.versionId=setupVersion||undefined;
      }
      await fetch(`${BACKEND}/api/monitoring/config`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify(body)
      });
      load();setSetupAssetId('');setSetupTag('');setSetupTags([]);setSetupWeights({});setSetupVersion('');
    }catch(e){alert('Save failed: '+e.message);}
    setSaving(false);
  };

  const disableConfig=async(id)=>{
    await fetch(`${BACKEND}/api/monitoring/config/${id}`,{method:'DELETE'});
    load();
  };

  const runScan=async()=>{
    setScanning(true);setScanResult(null);
    try{
      const r=await fetch(`${BACKEND}/api/monitoring/run`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({})
      });
      const d=await r.json();
      setScanResult(d);
      load(); // refresh configs + alerts
    }catch(e){alert('Scan failed: '+e.message);}
    setScanning(false);
  };

  const fetchForecast=async(alert)=>{
    const key=alert.ALERT_ID;
    setForecasts(p=>({...p,[key]:{loading:true}}));
    try{
      // For COMPOSITE alerts use the lead tag extracted from TAG_SCORES
      let tag=alert.TAG_NAME;
      if(tag==='COMPOSITE'){
        try{
          const ts=JSON.parse(alert.TAG_SCORES?.data||alert.TAG_SCORES||'{}');
          const lead=Object.entries(ts).sort((a,b)=>b[1]-a[1])[0];
          if(lead)tag=lead[0];
        }catch(_){}
      }
      const r=await fetch(`${BACKEND}/api/monitoring/forecast?assetId=${alert.ASSET_ID}&tagName=${tag}`);
      if(!r.ok)throw new Error(`HTTP ${r.status}`);
      const d=await r.json();
      setForecasts(p=>({...p,[key]:{loading:false,data:d}}));
    }catch(e){
      setForecasts(p=>({...p,[key]:{loading:false,error:e.message}}));
    }
  };

  const ackAlert_fn=async()=>{
    if(!ackAlert)return;
    try{
      // Acknowledge the alert
      await fetch(`${BACKEND}/api/monitoring/alerts/${ackAlert.ALERT_ID}/ack`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({note:ackNote,acknowledgedBy:'User'})
      });
      // Optionally create a Work Order
      if(ackCreateWo){
        const sc=ackAlert.SEVERITY==='CRIT'?1:2;
        const desc=`[Monitoring] ${ackAlert.TAG_NAME} anomaly on ${ackAlert.ASSET_ID} — Score ${parseFloat(ackAlert.PEAK_SCORE)||0} · ${ackNote||'Acknowledged via Monitoring tab'}`;
        await fetch(`${BACKEND}/asset/WorkOrders`,{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({ASSET_ID:ackAlert.ASSET_ID,WO_TYPE:'CM',PRIORITY:sc,
            STATUS:'Open',DESCRIPTION:desc})
        });
      }
      setAckAlert(null);setAckNote('');setAckCreateWo(false);load();
    }catch(e){alert('Acknowledge failed: '+e.message);}
  };

  const openAlerts=alerts.filter(a=>a.STATUS==='Open');
  const ackAlerts=alerts.filter(a=>a.STATUS==='Acknowledged');
  const activeConfigs=configs.filter(c=>c.IS_ACTIVE==='true');

  const statusColor=(s)=>({Alert:C.crit,Elevated:C.warn,Nominal:C.ok,Error:C.lt}[s]||C.lt);
  const statusIcon=(s)=>({Alert:'🚨',Elevated:'⚠️',Nominal:'✅',Error:'⛔'}[s]||'○');

  return(
    <div style={{padding:20,display:'flex',flexDirection:'column',gap:14}}>
      {/* Header */}
      <div style={{background:'linear-gradient(135deg,#1B5E20 0%,#2E7D32 100%)',color:'#FFF',borderRadius:10,padding:'16px 20px',
        display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{fontWeight:700,fontSize:18}}>📡 Asset Health Monitoring</div>
          <div style={{fontSize:12,opacity:.75,marginTop:3}}>Anomaly Detection · TimeGPT Foundation Model · On-Demand Scan</div>
        </div>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          {openAlerts.length>0&&(
            <span style={{background:'#E9453099',color:'#FFF',borderRadius:6,padding:'4px 12px',fontSize:12,fontWeight:700}}>
              🚨 {openAlerts.length} Open Alert{openAlerts.length>1?'s':''}
            </span>
          )}
          <span style={{background:'rgba(255,255,255,.15)',borderRadius:6,padding:'4px 12px',fontSize:12}}>
            {activeConfigs.length} monitored tag{activeConfigs.length!==1?'s':''}
          </span>
          <button onClick={runScan} disabled={scanning||activeConfigs.length===0}
            style={{padding:'8px 20px',borderRadius:6,border:'none',
              background:scanning||activeConfigs.length===0?'rgba(255,255,255,.2)':'#FFF',
              color:scanning||activeConfigs.length===0?'rgba(255,255,255,.5)':'#2E7D32',
              fontWeight:700,fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',gap:8}}>
            {scanning?<><Spinner size={13} color='#2E7D32'/>Scanning…</>:<>▶ Run Scan Now</>}
          </button>
        </div>
      </div>

      {/* Scan result summary */}
      {scanResult&&(
        <div style={{background:scanResult.alerts>0?C.critBg:C.okBg,border:`1px solid ${scanResult.alerts>0?C.crit:C.ok}33`,
          borderRadius:8,padding:'10px 16px',display:'flex',gap:20,alignItems:'center',flexWrap:'wrap'}}>
          <span style={{fontWeight:700,color:scanResult.alerts>0?C.crit:C.ok,fontSize:13}}>
            {scanResult.alerts>0?`🚨 ${scanResult.alerts} new alert(s) fired`:'✅ All clear — no new alerts'}
          </span>
          <span style={{fontSize:11,color:C.mid}}>{scanResult.scanned} tag{scanResult.scanned!==1?'s':''} scanned</span>
          {scanResult.results&&scanResult.results.map((r,i)=>(
            <span key={i} style={{fontSize:11,fontWeight:600,color:statusColor(r.status)}}>
              {statusIcon(r.status)} {r.assetId}/{r.tagName}
              {r.peakScore!=null?` (${parseFloat(r.peakScore).toFixed(1)})`:''}
            </span>
          ))}
        </div>
      )}

      {/* Open Alerts */}
      {(openAlerts.length>0||ackAlerts.length>0)&&(
        <Card title={`Active Alerts (${openAlerts.length} open, ${ackAlerts.length} acknowledged)`} icon="🚨"
          right={ackAlerts.length>0&&(
            <button onClick={async()=>{
                await fetch(`${BACKEND}/api/monitoring/alerts/clear-acknowledged`,{
                  method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})
                });
                load();
              }}
              style={{padding:'4px 12px',borderRadius:4,border:`1px solid ${C.bdr}`,
                background:'#F5F5F5',color:C.mid,fontSize:10,fontWeight:700,cursor:'pointer'}}>
              🗑 Clear Acknowledged ({ackAlerts.length})
            </button>
          )}>
          <div style={{display:'flex',flexDirection:'column'}}>
            {[...openAlerts,...ackAlerts].map((al,i)=>{
              const sc=al.SEVERITY==='CRIT'?C.crit:C.warn;
              const isOpen=al.STATUS==='Open';
              return(
                <div key={al.ALERT_ID} style={{borderBottom:`1px solid ${C.bdr}`,
                  background:isOpen?`${sc}08`:'#FAFAFA'}}>
                  {/* Alert summary row */}
                  <div style={{padding:'10px 16px',display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
                    <span style={{background:`${sc}18`,color:sc,borderRadius:4,padding:'2px 8px',fontSize:10,fontWeight:700,whiteSpace:'nowrap'}}>
                      {al.SEVERITY}
                    </span>
                    <span style={{fontWeight:700,fontSize:12,color:C.dark,whiteSpace:'nowrap'}}>{al.ASSET_ID}</span>
                    <span style={{fontSize:11,color:C.mid}}>
                      {al.TAG_NAME==='COMPOSITE'?(
                        <span>
                          <span style={{background:`${C.info}18`,color:C.info,borderRadius:3,padding:'1px 5px',fontSize:9,fontWeight:700,marginRight:4}}>COMPOSITE</span>
                          {(()=>{
                            try{const ts=JSON.parse(al.TAG_SCORES?.data||al.TAG_SCORES||'{}');
                              return Object.entries(ts).sort((a,b)=>b[1]-a[1]).slice(0,2).map(([t,s])=>(
                                <span key={t} style={{fontSize:9,color:C.mid,marginRight:4}}>{t}: {parseFloat(s).toFixed(0)}</span>
                              ));}catch{return null;}
                          })()}
                        </span>
                      ):al.TAG_NAME}
                    </span>
                    <span style={{fontSize:11,fontWeight:700,color:sc}}>Score: {parseFloat(al.PEAK_SCORE)||0}</span>
                    <span style={{fontSize:10,color:C.lt}}>{String(al.ALERT_START_TS||'').substring(0,16)}</span>
                    {al.WO_ID&&<span style={{fontSize:10,color:C.info,fontWeight:600}}>WO: {al.WO_ID}</span>}
                    <span style={{flex:1}}/>
                    <span style={{background:`${isOpen?C.warn:C.ok}18`,color:isOpen?C.warn:C.ok,
                      borderRadius:4,padding:'2px 7px',fontSize:10,fontWeight:700}}>{al.STATUS}</span>
                    {isOpen&&(
                      <button onClick={()=>{setAckAlert(al);setAckNote('');}}
                        style={{padding:'4px 12px',borderRadius:4,border:`1px solid ${C.info}`,
                          background:C.infoBg,color:C.info,fontSize:10,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}}>
                        Acknowledge
                      </button>
                    )}
                    {!isOpen&&al.ACK_NOTE&&(
                      <span style={{fontSize:10,color:C.lt,fontStyle:'italic'}}>"{al.ACK_NOTE}"</span>
                    )}
                  </div>
                  {/* AI Diagnosis panel — NCLOB returns as {type,data} object from HANA */}
                  {al.AI_DIAGNOSIS&&(()=>{
                    const diagText=al.AI_DIAGNOSIS?.data||String(al.AI_DIAGNOSIS||'');
                    if(!diagText||diagText==='[object Object]')return null;
                    return(
                      <div style={{margin:'0 16px 12px',background:'linear-gradient(135deg,#E8F5E9,#F1F8E9)',
                        border:`1px solid #A5D6A733`,borderRadius:8,padding:'10px 14px'}}>
                        <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
                          <span style={{fontSize:12}}>🤖</span>
                          <span style={{fontSize:10,fontWeight:700,color:'#2E7D32'}}>RULE-BASED DIAGNOSIS</span>
                          {al.AI_GENERATED_AT&&(
                            <span style={{fontSize:9,color:C.lt,marginLeft:'auto'}}>
                              Generated: {String(al.AI_GENERATED_AT).substring(0,16)}
                            </span>
                          )}
                        </div>
                        <div style={{fontSize:11,color:'#1B5E20',lineHeight:1.7,whiteSpace:'pre-wrap'}}>
                          {diagText}
                        </div>
                      </div>
                    );
                  })()}
                  {/* TimeGPT Forecast panel */}
                  {(()=>{
                    const fc=forecasts[al.ALERT_ID];
                    const trendIcon={degrading:'↑',stable:'→',improving:'↓'};
                    const trendColor={degrading:C.crit,stable:C.warn,improving:C.ok};
                    if(!fc){
                      return(
                        <div style={{margin:'0 16px 12px',display:'flex',alignItems:'center',gap:8}}>
                          <button onClick={()=>fetchForecast(al)}
                            style={{padding:'5px 14px',borderRadius:5,border:`1px solid ${C.info}`,
                              background:`${C.info}12`,color:C.info,fontSize:10,fontWeight:700,cursor:'pointer',
                              display:'flex',alignItems:'center',gap:5}}>
                            📈 View 24h Forecast &amp; RUL
                          </button>
                          <span style={{fontSize:9,color:C.lt}}>Powered by TimeGPT / Statistical model</span>
                        </div>
                      );
                    }
                    if(fc.loading){
                      return(
                        <div style={{margin:'0 16px 12px',fontSize:11,color:C.lt,display:'flex',alignItems:'center',gap:6}}>
                          <Spinner size={11}/>Fetching forecast…
                        </div>
                      );
                    }
                    if(fc.error){
                      return(
                        <div style={{margin:'0 16px 12px',fontSize:10,color:C.crit}}>
                          Forecast error: {fc.error}
                          <button onClick={()=>fetchForecast(al)} style={{marginLeft:8,fontSize:10,color:C.info,background:'none',border:'none',cursor:'pointer',textDecoration:'underline'}}>Retry</button>
                        </div>
                      );
                    }
                    const d=fc.data;
                    const vals=d.forecast.map(f=>f.value);
                    const lo=d.forecast.map(f=>f.lo80);
                    const hi=d.forecast.map(f=>f.hi80);
                    const allV=[...vals,...lo,...hi].filter(v=>typeof v==='number'&&isFinite(v));
                    const vMin=Math.min(...allV);
                    const vMax=Math.max(...allV)||vMin+1;
                    const W=240,H=48;
                    const px=(i)=>Math.round(i/(vals.length-1||1)*W);
                    const py=(v)=>Math.round(H-(v-vMin)/(vMax-vMin)*H);
                    const lineD=vals.map((v,i)=>`${i===0?'M':'L'}${px(i)},${py(v)}`).join(' ');
                    const bandD=hi.map((v,i)=>`${i===0?'M':'L'}${px(i)},${py(v)}`).join(' ')
                      +' '+[...lo].reverse().map((v,i)=>`L${px(lo.length-1-i)},${py(v)}`).join(' ')+'Z';
                    return(
                      <div style={{margin:'0 16px 12px',background:'linear-gradient(135deg,#EBF5FB,#F0F4FF)',
                        border:`1px solid ${C.info}33`,borderRadius:8,padding:'10px 14px'}}>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,flexWrap:'wrap'}}>
                          <span style={{fontSize:10,fontWeight:700,color:C.info}}>📈 24H FORECAST</span>
                          <span style={{background:`${trendColor[d.trend]||C.lt}18`,color:trendColor[d.trend]||C.lt,
                            borderRadius:4,padding:'2px 8px',fontSize:10,fontWeight:700}}>
                            {trendIcon[d.trend]||'→'} {(d.trend||'stable').toUpperCase()}
                          </span>
                          {d.hoursToThreshold!=null?(
                            <span style={{background:`${C.crit}18`,color:C.crit,borderRadius:4,padding:'2px 8px',fontSize:10,fontWeight:700}}>
                              ⚠ Threshold breach in ~{d.hoursToThreshold}h
                            </span>
                          ):(
                            <span style={{background:`${C.ok}18`,color:C.ok,borderRadius:4,padding:'2px 8px',fontSize:10,fontWeight:700}}>
                              ✓ No breach in next 24h
                            </span>
                          )}
                          <span style={{marginLeft:'auto',fontSize:9,color:C.lt}}>{d.modelUsed}</span>
                          <button onClick={()=>fetchForecast(al)} style={{fontSize:9,color:C.info,background:'none',border:'none',cursor:'pointer',textDecoration:'underline'}}>↺ Refresh</button>
                        </div>
                        {/* Sparkline */}
                        <svg width={W} height={H} style={{display:'block',overflow:'visible'}}>
                          <path d={bandD} fill={`${C.info}20`} stroke="none"/>
                          <path d={lineD} fill="none" stroke={C.info} strokeWidth={1.5}/>
                        </svg>
                        <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:C.lt,marginTop:2}}>
                          <span>Now</span>
                          <span style={{fontSize:9,color:C.mid}}>
                            {d.tagName} · {d.historicalCount} readings analysed · Anomaly score: {d.anomalyScore}
                          </span>
                          <span>+24h</span>
                        </div>
                      </div>
                    );
                  })()}
                </div>
              );
            })}
          </div>
        </Card>
      )}
      {openAlerts.length===0&&activeConfigs.length>0&&!loading&&(
        <div style={{background:C.okBg,border:`1px solid ${C.ok}33`,borderRadius:8,padding:'10px 16px',
          fontSize:12,color:C.ok,fontWeight:600,display:'flex',alignItems:'center',gap:8}}>
          ✅ No open alerts — all monitored assets are within normal parameters.
          <span style={{fontWeight:400,color:C.mid,fontSize:11}}>Run a scan to refresh.</span>
        </div>
      )}

      <div style={{display:'flex',gap:14,flexWrap:'wrap'}}>
        {/* Monitored Tags table */}
        <Card title={`Monitored Tags (${activeConfigs.length})`} icon="📡" style={{flex:'2 1 400px'}}>
          {loading?<div style={{padding:20,color:C.lt,fontSize:12}}>Loading…</div>:
          activeConfigs.length===0?(
            <div style={{padding:24,textAlign:'center',color:C.lt,fontSize:12}}>
              No active monitoring configured. Use the setup panel to add a tag.
            </div>
          ):(
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%'}}>
                <thead><tr style={{background:'#F5F7FA',borderBottom:`1px solid ${C.bdr}`}}>
                  {['Asset','Tag','Score Thr.','Consec.','Window','Last Scan','Status','Score','Auto WO','Action'].map(h=>(
                    <th key={h} style={{padding:'7px 10px',fontWeight:600,color:C.mid,fontSize:10,textAlign:'left',whiteSpace:'nowrap'}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {activeConfigs.map((c,i)=>{
                    const sc=statusColor(c.LAST_SCAN_STATUS);
                    return(
                      <tr key={c.CONFIG_ID} style={{borderBottom:`1px solid ${C.bdr}`,background:i%2?'#FAFAFA':'#FFF'}}>
                        <td style={{padding:'7px 10px',fontWeight:700,fontSize:11}}>{c.ASSET_ID}</td>
                        <td style={{padding:'7px 10px',fontSize:11,color:C.info}}>
                          {c.TAG_NAME==='COMPOSITE'?(
                            <span>
                              <span style={{background:`${C.info}18`,color:C.info,borderRadius:3,padding:'1px 5px',fontSize:9,fontWeight:700,marginRight:4}}>COMPOSITE</span>
                              <span style={{fontSize:10,color:C.mid}}>{c.TAG_NAMES||''}</span>
                            </span>
