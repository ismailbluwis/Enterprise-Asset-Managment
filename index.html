function deriveCompliance(inspections){
  const today=new Date();
  const STDS=['ISO55000','API580','OSHA_PSM','IEC61511'];
  const result={};
  const sorted=[...inspections].sort((a,b)=>b.INSPECTION_DATE>a.INSPECTION_DATE?1:-1);
  STDS.forEach((s,i)=>{
    const insp=sorted[Math.min(i,sorted.length-1)];
    if(!insp){result[s]={status:'Compliant',lastAudit:'',nextDue:''};return;}
    const next=insp.NEXT_INSPECTION_DATE?new Date(insp.NEXT_INSPECTION_DATE):null;
    const days=next?Math.round((next-today)/86400000):365;
    const status=days<0?'Overdue':days<60?'Due Soon':'Compliant';
    result[s]={status,lastAudit:insp.INSPECTION_DATE?insp.INSPECTION_DATE.substring(0,10):'',nextDue:insp.NEXT_INSPECTION_DATE?insp.NEXT_INSPECTION_DATE.substring(0,10):''};
  });
  return result;
}

/* ── HEALTH SCORE ENGINE ───────────────────────────────────── */
function calcSensorScore(asset,sensorOverrides={}){
  const th=asset.thresholds;
  const liveHistory=asset.sensorHistory;
  const lastTemp=sensorOverrides.temperature??liveHistory.temperature.slice(-1)[0];
  const lastVib=sensorOverrides.vibration??liveHistory.vibration.slice(-1)[0];
  const lastPres=sensorOverrides.pressure??liveHistory.pressure.slice(-1)[0];
  let ss=100;
  const tempRange=th.temperature.crit-th.temperature.warn[0];
  const vibRange=th.vibration.crit-th.vibration.warn[0];
  const presRange=th.pressure.crit-th.pressure.warn[0];
  if(lastTemp>=th.temperature.crit)ss-=40;
  else if(lastTemp>=th.temperature.warn[0])ss-=20*((lastTemp-th.temperature.warn[0])/tempRange);
  if(lastVib>=th.vibration.crit)ss-=35;
  else if(lastVib>=th.vibration.warn[0])ss-=18*((lastVib-th.vibration.warn[0])/vibRange);
  if(lastPres>=th.pressure.crit)ss-=25;
  else if(lastPres>=th.pressure.warn[0])ss-=12*((lastPres-th.pressure.warn[0])/presRange);
  return{ss:Math.max(0,ss),temp:lastTemp,vib:lastVib,pres:lastPres};
}

function calcHealthScore(asset,sensorOverrides={}){
  const {ss}=calcSensorScore(asset,sensorOverrides);
  const ms=Math.max(0,100-((asset.daysSinceLastPM/asset.pmFreqDays)*100));
  const totalDowntime=asset.failures.reduce((a,f)=>a+f.downtime,0);
  const fs=Math.max(0,100-asset.failures.length*15-Math.min(35,totalDowntime/8));
  const agePct=asset.ageYears/asset.designLifeYears;
  const as2=Math.max(0,(1-agePct)*100);
  return Math.round(Math.min(100,Math.max(0,ss*.40+ms*.25+fs*.20+as2*.15)));
}

function scoreStatus(s){
  if(s>=80)return{label:'Healthy',  color:C.ok,  bg:C.okBg,  bdr:C.okBdr};
  if(s>=60)return{label:'Monitored',color:C.info, bg:C.infoBg,bdr:C.infoBdr};
  if(s>=40)return{label:'At Risk',  color:C.warn, bg:C.warnBg,bdr:C.warnBdr};
  return       {label:'Critical', color:C.crit,bg:C.critBg,bdr:C.critBdr};
}

function calcRUL(asset,score,kpiSnaps){
  const remainDays=Math.max(0,(asset.designLifeYears-asset.ageYears)*365);
  // If we have KPI snapshot history, use actual observed degradation rate
  if(kpiSnaps&&kpiSnaps.length>=2){
    const oldest=parseFloat(kpiSnaps[0].HEALTH_SCORE)||score;
    const newest=parseFloat(kpiSnaps[kpiSnaps.length-1].HEALTH_SCORE)||score;
    const deltaPerDay=(oldest-newest)/Math.max(1,kpiSnaps.length-1);
    if(deltaPerDay>0){
      const daysToZero=Math.round(score/deltaPerDay);
      return Math.max(0,Math.min(remainDays,daysToZero));
    }
  }
  // Degradation-rate fallback: critical assets age faster than calendar time
  const degRate=score>=80?1.0:score>=65?1.3:score>=50?1.8:score>=35?2.5:4.0;
  return Math.max(0,Math.round(remainDays/degRate));
}

function calcFailureProbability(asset,score){
  const ageFactor=asset.ageYears/Math.max(1,asset.designLifeYears);
  // Real PM overdue ratio (not just binary)
  const pmOverdueFactor=Math.min(3.0,asset.daysSinceLastPM/Math.max(1,asset.pmFreqDays));
  // Failure frequency per year
  const failFreqFactor=1+(asset.failures.length/Math.max(1,asset.ageYears)*0.1);
  // Inspection result factor — compliant assets are lower risk
  const compStatuses=asset.compliance?Object.values(asset.compliance).map(c=>c.status):[];
  const overdueCt=compStatuses.filter(s=>s==='Overdue').length;
  const inspFactor=overdueCt>1?1.5:overdueCt===1?1.2:compStatuses.some(s=>s==='Compliant')?0.85:1.0;
  const baseProb=Math.pow(1-score/100,1.6)*pmOverdueFactor*failFreqFactor*inspFactor*(1+ageFactor*0.2);
  return Math.min(0.99,Math.round(baseProb*1000)/1000);
}

function calcKPIs(asset){
  const totalHrs=asset.operatingHours||(asset.ageYears*8760);
  const totalDown=asset.failures.reduce((a,f)=>a+f.downtime,0);
  const avail=((totalHrs-totalDown)/Math.max(1,totalHrs)*100).toFixed(1);
  const mtbf=asset.failures.length>0?Math.round((totalHrs-totalDown)/asset.failures.length):totalHrs;
  const mttr=asset.failures.length>0?Math.round(totalDown/asset.failures.length):0;
  // Availability Score (not true OEE — performance/quality factors require production data)
  const availScore=(parseFloat(avail)/100*.95*.98*100).toFixed(1);
  // PM Compliance: scheduled PMs since commissioning (includes missed PMs)
  const pmDone=asset.workOrders.filter(w=>w.type==='PM'&&w.status==='Completed').length;
  const pmScheduled=Math.max(1,Math.floor((new Date()-new Date(asset.commissionDate||Date.now()-asset.ageYears*365.25*86400000))/(Math.max(1,asset.pmFreqDays)*86400000)));
  const pmComp=Math.min(100,Math.round(pmDone/pmScheduled*100));
  // Planned vs Corrective maintenance split
  const wos=asset.workOrders||[];
  const plannedHrs=wos.filter(w=>w.type==='PM'||w.type==='INS').reduce((s,w)=>s+(parseFloat(w.hrs)||0),0);
  const totalWOHrs=wos.reduce((s,w)=>s+(parseFloat(w.hrs)||0),0);
  const plannedPct=totalWOHrs>0?Math.round(plannedHrs/totalWOHrs*100):100;
  const maintCostPerHr=asset.operatingHours>0?
    Math.round(wos.reduce((s,w)=>s+(parseFloat(w.cost)||0),0)/asset.operatingHours):0;
  // MTTD: mean time to detect — avg hours between detection and failure (uses FAILURE_DETECTED_DATE)
  const mttdFails=asset.failures.filter(f=>f.detectedDate&&f.date);
  const mttd=mttdFails.length>0?
    Math.round(mttdFails.reduce((s,f)=>s+Math.abs(new Date(f.date)-new Date(f.detectedDate))/3600000,0)/mttdFails.length):null;
  return{avail:parseFloat(avail),mtbf,mttr,mttd,oee:parseFloat(availScore),pmComp,plannedPct,maintCostPerHr};
}

function calcFinancials(asset,score){
  const prob=calcFailureProbability(asset,score);
  const costAtRisk=Math.round(prob*asset.replacementCost);
  const mttr=calcKPIs(asset).mttr;
  const annualDowntimeRisk=Math.round(prob*asset.downtimeCostPerDay*(mttr/24)*3.5);
  const annualFailureCost=asset.failures.reduce((a,f)=>a+f.cost,0);
  const avgAnnualFailCost=asset.ageYears>0?Math.round(annualFailureCost/asset.ageYears):0;
  const pmSavingsRatio=0.65;
  const maintenanceROI=asset.annualPMCost>0?
    Math.round(((annualDowntimeRisk*pmSavingsRatio)-asset.annualPMCost)/asset.annualPMCost*100):0;
  const projectedLoss1yr=Math.round(annualDowntimeRisk+avgAnnualFailCost);
  // Dynamic degradation multiplier based on health score (compound annual deterioration)
  const degradeRate=score>=80?0.03:score>=65?0.06:score>=50?0.10:score>=35?0.15:0.22;
  const projectedLoss3yr=Math.round([1,2,3].reduce((s,n)=>s+projectedLoss1yr*Math.pow(1+degradeRate,n-1),0));
  const projectedLoss5yr=Math.round([1,2,3,4,5].reduce((s,n)=>s+projectedLoss1yr*Math.pow(1+degradeRate,n-1),0));
  return{prob,costAtRisk,annualDowntimeRisk,annualFailureCost,avgAnnualFailCost,maintenanceROI,
    projectedLoss1yr,projectedLoss3yr,projectedLoss5yr};
}

function getNextBestAction(asset,score){
  if(score>=80)return{action:'Monitor',color:C.ok,icon:'✅',level:0,
    desc:'Asset is healthy. Continue standard condition monitoring and maintain PM schedule.',
    sapAction:'Maintain current PM plan. Next scheduled inspection on track.',priority:'Low'};
  if(score>=65)return{action:'Schedule PM',color:C.info,icon:'📅',level:1,
    desc:'Trending toward threshold. Schedule preventive maintenance within 30 days.',
    sapAction:'Create PM Work Order — Priority: Medium. Align with planned shutdown window.',priority:'Medium'};
  if(score>=50)return{action:'Inspect Now',color:C.warn,icon:'🔍',level:2,
    desc:'At risk — potential failure within 90 days. Immediate inspection recommended.',
    sapAction:'Create CM Notification (Priority: High). Reduce PM interval by 50%. Escalate to Maintenance Lead.',priority:'High'};
  if(score>=35)return{action:'Urgent Repair',color:C.warn,icon:'🔧',level:3,
    desc:'High risk of imminent failure. Emergency maintenance work order required.',
    sapAction:'Create Emergency WO (Priority: Very High). Trigger FICO cost-centre reallocation. Notify HSE.',priority:'Very High'};
  return{action:'Replace Asset',color:C.crit,icon:'🚨',level:4,
    desc:'Critical — asset failure imminent. Initiate capital replacement process immediately.',
    sapAction:'Initiate Purchase Requisition (Asset Replacement). Notify Plant Manager + HSE. Consider emergency shutdown.',priority:'Critical'};
}

function probLevel(score){
  if(score>=80)return 1;if(score>=65)return 2;
  if(score>=50)return 3;if(score>=35)return 4;return 5;
}

const pause=ms=>new Promise(r=>setTimeout(r,ms));
const randId=(p,l=8)=>`${p}-${Math.floor(10**(l-1)+Math.random()*9*10**(l-1))}`;

async function postWorkOrder(assetId,woType,priority,desc){
  const res=await fetch(`${BACKEND}/asset/WorkOrders`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ASSET_ID:assetId,WO_TYPE:woType,PRIORITY:priority,DESCRIPTION:desc||''})
  });
  if(!res.ok)throw new Error(`HTTP ${res.status}`);
  const d=await res.json();
  return d.WO_ID||d.value?.[0]?.WO_ID||randId('WO');
}

function getForecastSteps(asset){
  const th=(asset&&asset.thresholds&&asset.thresholds.temperature)||{safe:[0,40],warn:[40,60],crit:70};
  const t0=th.safe?th.safe[0]||0:0;
  const t1=th.safe?th.safe[1]||40:40;  // normal operating max
  const t2=th.warn?th.warn[0]||50:50;  // warning start
  const t3=th.warn?th.warn[1]||65:65;  // warning end
  const t4=th.crit||80;                // critical
  return[
    {temp:t1,label:'Normal Operation',sev:'ok',scoreΔ:0,
     action:`All parameters within limits. Operating temp ≤${t1}°C. No SAP action required. Condition monitoring continues.`},
    {temp:t2,label:'Warning Threshold',sev:'warn',scoreΔ:-9,
     action:`SAP PM Notification (Priority: Medium). Temp at ${t2}°C — warning zone. Monitoring interval reduced. Work order pre-planned.`},
    {temp:t3,label:'Alert Threshold',sev:'high',scoreΔ:-22,
     action:`Corrective WO spawned (Priority: High). Temp ${t3}°C. FICO budget check triggered. RUL recalculated — reduced 18%.`},
    {temp:t4,label:'Critical Threshold',sev:'crit',scoreΔ:-38,

}

/* ── REAL THRESHOLD BUILDER ─────────────────────────────────── */
function buildThresholds(assetType,tagMap){
  const def=defaultThresholds(assetType);
  const find=kws=>{for(const kw of kws){const k=Object.keys(tagMap).find(t=>t.includes(kw));if(k)return tagMap[k];}return null;};
  const tT=find(['TEMP','TEMPERATURE','INLET_TEMP','OUTLET_TEMP','DISCHARGE_TEMP']);
  const vT=find(['VIB','VIBRATION']);
  const pT=find(['PRES','PRESSURE','DISCHARGE_PRESSURE','UPSTREAM_PRESSURE']);
  return{
    temperature:tT?{unit:tT.UNIT||'°C',safe:[parseFloat(tT.SAFE_LO)||0,parseFloat(tT.SAFE_HI)||80],warn:[parseFloat(tT.WARN_LO)||80,parseFloat(tT.WARN_HI)||95],crit:parseFloat(tT.CRIT)||95}:def.temperature,
    vibration:  vT?{unit:vT.UNIT||'mm/s',safe:[0,parseFloat(vT.SAFE_HI)||5],warn:[parseFloat(vT.WARN_LO)||5,parseFloat(vT.WARN_HI)||9],crit:parseFloat(vT.CRIT)||9}:def.vibration,
    pressure:   pT?{unit:pT.UNIT||'bar',safe:[0,parseFloat(pT.SAFE_HI)||100],warn:[parseFloat(pT.WARN_LO)||100,parseFloat(pT.WARN_HI)||120],crit:parseFloat(pT.CRIT)||120}:def.pressure,
  };
}

  const get=url=>fetch(`${BACKEND}${url}`).then(r=>{if(!r.ok)throw new Error(`HTTP ${r.status} ${url}`);return r.json();}).then(d=>d.value||[]);
  const [assets,healthScores,financials,workOrders,failures,trends,inspections,rawThresholds,kpiSnaps]=await Promise.all([
    get('/asset/Assets?$top=200'),
    get('/asset/HealthScores?$top=200'),
    get('/asset/Financials?$top=200'),
    get('/asset/WorkOrders?$top=1000'),
    get('/asset/FailureHistory?$top=200'),
    get('/asset/ProcessTrends?$top=10000'),
    get('/asset/Inspections?$top=1000'),
    get('/asset/Thresholds?$top=2000'),
    fetch(`${BACKEND}/api/kpi-snapshots`).then(r=>r.ok?r.json().then(d=>d.value||[]):[]).catch(()=>[]),
  ]);

  const hsMap=Object.fromEntries(healthScores.map(h=>[h.ASSET_ID,h]));
  const finMap=Object.fromEntries(financials.map(f=>[f.ASSET_ID,f]));
  const woByAsset=workOrders.reduce((m,w)=>{(m[w.ASSET_ID]=m[w.ASSET_ID]||[]).push(w);return m;},{});
  const failByAsset=failures.reduce((m,f)=>{(m[f.ASSET_ID]=m[f.ASSET_ID]||[]).push(f);return m;},{});
  const inspByAsset=inspections.reduce((m,i)=>{(m[i.ASSET_ID]=m[i.ASSET_ID]||[]).push(i);return m;},{});
  // Real thresholds: asset -> TAG_NAME -> threshold row
  const threshMap={};
  for(const t of rawThresholds){
    if(!threshMap[t.ASSET_ID])threshMap[t.ASSET_ID]={};
    threshMap[t.ASSET_ID][(t.TAG_NAME||'').toUpperCase()]=t;
  }
  // KPI snapshots: asset -> sorted array of snapshot rows
  const kpiSnapMap={};
  for(const k of kpiSnaps){
    if(!kpiSnapMap[k.ASSET_ID])kpiSnapMap[k.ASSET_ID]=[];
    kpiSnapMap[k.ASSET_ID].push(k);
  }
  for(const id of Object.keys(kpiSnapMap))
    kpiSnapMap[id].sort((a,b)=>String(a.SNAPSHOT_DATE)<String(b.SNAPSHOT_DATE)?-1:1);

  // Build sensor history lookup: asset -> paramKey -> sorted array of {date, val}
  const trendMap={};
  for(const t of trends){
    const k=t.ASSET_ID;if(!trendMap[k])trendMap[k]={};
    const p=(t.PARAMETER||'').toUpperCase();if(!trendMap[k][p])trendMap[k][p]=[];
    trendMap[k][p].push({date:t.TREND_DATE,val:parseFloat(t.AVG_VALUE)||0});
  }
  for(const aid of Object.keys(trendMap))
    for(const p of Object.keys(trendMap[aid]))
      trendMap[aid][p].sort((a,b)=>a.date<b.date?-1:1);

  function getSensorData(aid,keywords){
    const assetT=trendMap[aid]||{};
    for(const kw of keywords){
      const key=Object.keys(assetT).find(k=>k.includes(kw));
      if(key){
        const pts=assetT[key].slice(-30);
        if(pts.length<2)continue;
        const indices=Array.from({length:10},(_,i)=>Math.round(i*(pts.length-1)/9));
        return{
          values:indices.map(i=>Math.round(pts[i].val*10)/10),
          dates:indices.map(i=>pts[i].date?String(pts[i].date).substring(0,10):null),
        };
      }
    }
    return null;
  }

  const today=new Date();
  return assets.map(a=>{
    const aid=a.ASSET_ID;
    const hs=hsMap[aid]||{};
    const fin=finMap[aid]||{};
    const wos=(woByAsset[aid]||[]).slice(0,15);
    const fails=(failByAsset[aid]||[]);
    const insps=(inspByAsset[aid]||[]);

    // Age & lifecycle
    const installDate=a.INSTALL_DATE?new Date(a.INSTALL_DATE):new Date('2015-01-01');
    const designLife=fin.DESIGN_LIFE_YRS||a.EXPECTED_LIFE_YEARS||20;
    const ageYears=Math.max(0,Math.round((today-installDate)/(365.25*24*3600*1000)*10)/10);
    const lifecycleStage=fin.LIFECYCLE_STAGE||(ageYears/designLife<0.1?2:ageYears/designLife<0.7?3:ageYears/designLife<0.9?4:5);

    const critMap={'A':5,'B':3,'C':1};
    const tm=typeMap(a.ASSET_TYPE);

    // Sensor arrays + real dates from process trends
    const tempData=getSensorData(aid,['TEMP','TEMPERATURE','INLET_TEMP','OUTLET_TEMP','DISCHARGE_TEMP']);
    const vibData=getSensorData(aid,['VIB','VIBRATION']);
    const presData=getSensorData(aid,['PRES','PRESSURE','DISCHARGE_PRESSURE','UPSTREAM_PRESSURE']);
    const tempH=(tempData&&tempData.values)||(hs.LATEST_TEMP?Array.from({length:10},(_,i)=>Math.round((hs.LATEST_TEMP-(9-i)*0.5)*10)/10):[50,51,52,52,53,53,54,54,55,55]);
    const vibH=(vibData&&vibData.values)||(hs.LATEST_VIB?Array.from({length:10},(_,i)=>Math.round((hs.LATEST_VIB-(9-i)*0.05)*100)/100):[2,2.1,2.2,2.3,2.4,2.5,2.6,2.7,2.8,2.9]);
    const presH=(presData&&presData.values)||(hs.LATEST_PRES?Array.from({length:10},(_,i)=>Math.round((hs.LATEST_PRES-(9-i)*0.8)*10)/10):[80,81,82,82,83,83,84,84,85,85]);
    const sensorDates=(tempData&&tempData.dates)||(vibData&&vibData.dates)||(presData&&presData.dates)||null;

    // Override last entry with latest sensor value
    if(hs.LATEST_TEMP)tempH[tempH.length-1]=Math.round(parseFloat(hs.LATEST_TEMP)*10)/10;
    if(hs.LATEST_VIB) vibH[vibH.length-1] =Math.round(parseFloat(hs.LATEST_VIB)*100)/100;
    if(hs.LATEST_PRES)presH[presH.length-1]=Math.round(parseFloat(hs.LATEST_PRES)*10)/10;

    // Work orders mapped
    const mappedWOs=wos.map(w=>({
      id:w.WO_ID,type:w.WO_TYPE,desc:w.DESCRIPTION,
      date:w.CREATED_DATE?(typeof w.CREATED_DATE==='string'?w.CREATED_DATE.substring(0,10):new Date(w.CREATED_DATE).toISOString().substring(0,10)):'',
      hrs:w.LABOR_HOURS||8,cost:w.COST||0,status:w.STATUS
    }));

    // Failures mapped
    const mappedFails=fails.map(f=>({
      date:f.FAILURE_DATE?(typeof f.FAILURE_DATE==='string'?f.FAILURE_DATE.substring(0,10):new Date(f.FAILURE_DATE).toISOString().substring(0,10)):'',
      detectedDate:f.FAILURE_DETECTED_DATE?(typeof f.FAILURE_DETECTED_DATE==='string'?f.FAILURE_DETECTED_DATE.substring(0,10):new Date(f.FAILURE_DETECTED_DATE).toISOString().substring(0,10)):null,
      cause:f.ROOT_CAUSE||f.FAILURE_MODE||'',
      downtime:parseFloat(f.DOWNTIME_HOURS)||0,
      cost:parseFloat(f.REPAIR_COST)||0
    }));

    // Days since last PM
    const completedPMs=wos.filter(w=>w.WO_TYPE==='PM'&&w.STATUS==='Completed').sort((a,b)=>b.CREATED_DATE>a.CREATED_DATE?1:-1);
    const lastPM=completedPMs[0];
    const daysSinceLastPM=lastPM&&lastPM.CREATED_DATE?Math.round((today-new Date(lastPM.CREATED_DATE))/86400000):90;

    // KPI sparklines derived from health score
    const hs_=hs.HEALTH_SCORE||75;
    const kpiHistory={
      oee:Array.from({length:6},(_,i)=>Math.max(20,Math.min(99,Math.round(hs_-(5-i)*1.5)))),
      mtbf:Array.from({length:6},(_,i)=>Math.max(50,Math.round(hs_*5-(5-i)*30))),
      mttr:Array.from({length:6},(_,i)=>Math.max(5,Math.round((100-hs_)*1.2+(5-i)*5))),
    };

    return{
      id:aid,name:a.ASSET_NAME||aid,shortName:aid,
      type:a.ASSET_TYPE||'Equipment',category:tm.category,icon:tm.icon,
      location:(a.LOCATION||'').replace('/','/').replace('/',' / ')||'Plant / Unit 1',
      plant:a.PLANT_CODE||'1100',floc:a.FUNCTIONAL_LOCATION||`FL-${aid}`,
      silRating:a.SIL_RATING||'None',fluidType:a.FLUID_TYPE||'',
      ageYears:Math.floor(ageYears),designLifeYears:designLife,
      manufacturer:a.MANUFACTURER||'',model:a.MODEL||'',
      commissionDate:a.INSTALL_DATE?(typeof a.INSTALL_DATE==='string'?a.INSTALL_DATE.substring(0,10):new Date(a.INSTALL_DATE).toISOString().substring(0,10)):'',
      replacementCost:parseFloat(fin.REPLACEMENT_COST)||1000000,
      downtimeCostPerDay:parseFloat(fin.DOWNTIME_COST_PER_DAY)||20000,
      annualPMCost:parseFloat(fin.ANNUAL_PM_COST)||100000,
      consequence:fin.CONSEQUENCE||critMap[a.CRITICALITY]||3,
      lifecycleStage,
      pmFreqDays:fin.PM_FREQ_DAYS||90,
      daysSinceLastPM,
      thresholds:buildThresholds(a.ASSET_TYPE,threshMap[aid]||{}),
      sensorHistory:{temperature:tempH,vibration:vibH,pressure:presH,dates:sensorDates},
      hanaScore:hs.HEALTH_SCORE!=null?parseInt(hs.HEALTH_SCORE):null,
      // Production impact — requires DESIGN_FLOW_RATE in ASSET_FINANCIALS
      productionBblDay:parseFloat(fin.PRODUCTION_CONTRIBUTION_BBLDAY)||0,
      designFlowRate:parseFloat(fin.DESIGN_FLOW_RATE)||0,
      commodityPrice:parseFloat(fin.COMMODITY_PRICE_PER_BBL)||70,
      sensorScore:hs.SENSOR_SCORE!=null?Math.round(parseFloat(hs.SENSOR_SCORE)):null,
      maintScore:hs.MAINT_SCORE!=null?Math.round(parseFloat(hs.MAINT_SCORE)):null,
      failureScore:hs.FAILURE_SCORE!=null?Math.round(parseFloat(hs.FAILURE_SCORE)):null,
      ageScore:hs.AGE_SCORE!=null?Math.round(parseFloat(hs.AGE_SCORE)):null,
      anomalyScore:hs.ANOMALY_SCORE!=null?Math.round(parseFloat(hs.ANOMALY_SCORE)*10)/10:null,
      anomalyStatus:hs.ANOMALY_STATUS||null,
      anomalyTag:hs.ANOMALY_TAG||null,
      operatingHours:parseInt(a.OPERATING_HOURS)||null,
      latestSensors:Object.fromEntries(Object.entries(trendMap[aid]||{}).map(([p,pts])=>[p,{value:pts[pts.length-1]?.val,date:String(pts[pts.length-1]?.date||'').substring(0,10)}])),
      workOrders:mappedWOs,failures:mappedFails,
      compliance:deriveCompliance(insps),
      kpiHistory:kpiSnapMap[aid]&&kpiSnapMap[aid].length>=3?{
        oee:kpiSnapMap[aid].slice(-6).map(k=>Math.round(parseFloat(k.OEE)||0)),
        mtbf:kpiSnapMap[aid].slice(-6).map(k=>Math.round(parseFloat(k.MTBF_HOURS)||0)),
        mttr:kpiSnapMap[aid].slice(-6).map(k=>Math.round(parseFloat(k.MTTR_HOURS)||0)),
        _rawHealth:kpiSnapMap[aid].slice(-6).map(k=>parseInt(k.HEALTH_SCORE)||0),
      }:kpiHistory,
    };
  });
}

/* ── PREDICTIVE INSIGHTS PANEL (Random Forest) ──────────────── */
function AIInsightsPanel({asset,addToast}){
  const [open,setOpen]=useState(false);
  const [pred,setPred]=useState(null);
  const [loading,setLoading]=useState(false);

  const runPrediction=async()=>{
    setLoading(true);setPred(null);
    try{
      const res=await fetch(`${BACKEND}/api/predict?assetId=${encodeURIComponent(asset.id)}`);
      if(!res.ok)throw new Error(`HTTP ${res.status}`);
      const d=await res.json();
      if(d.error)throw new Error(d.error);
      setPred(d);
    }catch(e){
      addToast&&addToast({type:'error',title:'Prediction Error',message:e.message});
    }
    setLoading(false);
  };

  const urgencyColor={Critical:C.crit,High:C.warn,Medium:'#F59E0B',Low:C.ok};

  const ProbGauge=({pct})=>{
    const color=pct>=75?C.crit:pct>=50?C.warn:pct>=25?'#F59E0B':C.ok;
    return(
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
        <div style={{fontSize:28,fontWeight:800,color}}>{pct}%</div>
        <div style={{width:120,height:8,background:'#E5E7EB',borderRadius:4,overflow:'hidden'}}>
          <div style={{width:`${pct}%`,height:'100%',background:color,borderRadius:4,transition:'width .4s'}}/>
        </div>
        <div style={{fontSize:10,color:C.lt}}>Failure Probability</div>
      </div>
    );
  };

  return(
    <Card title="Predictive Insights" icon="🌲"
      right={<button onClick={()=>setOpen(p=>!p)}
        style={{padding:'3px 12px',borderRadius:5,border:`1px solid ${C.bdr}`,background:'transparent',fontSize:11,cursor:'pointer',color:C.mid}}>
        {open?'▲ Collapse':'▼ Expand'}
      </button>}>
      {open&&(
        <div style={{padding:16,display:'flex',flexDirection:'column',gap:14}}>
          <div style={{fontSize:11,color:C.lt}}>
            Random Forest model trained on health scores, sensor data, maintenance history and failure records.
          </div>

          <button onClick={runPrediction} disabled={loading}
            style={{alignSelf:'flex-start',padding:'7px 18px',borderRadius:6,background:C.ok,color:'#FFF',
                    border:'none',fontSize:12,fontWeight:700,display:'flex',alignItems:'center',gap:6,cursor:'pointer'}}>
            {loading?<><Spinner color="#FFF"/>Running model…</>:'🌲 Run Prediction'}
          </button>

          {pred&&(
            <div style={{display:'flex',flexDirection:'column',gap:14}}>

              {/* ── Summary row ── */}
              <div style={{display:'flex',gap:16,flexWrap:'wrap',alignItems:'center',
                           background:'#F8F9FB',border:`1px solid ${C.bdr}`,borderRadius:8,padding:'14px 16px'}}>
                <ProbGauge pct={pred.failureProbability}/>
                <div style={{flex:1,display:'flex',flexDirection:'column',gap:6,minWidth:160}}>
                  <div style={{display:'flex',gap:8,alignItems:'center'}}>
                    <span style={{fontSize:11,color:C.lt}}>Urgency</span>
                    <span style={{padding:'2px 10px',borderRadius:10,fontSize:11,fontWeight:700,
                                  background:`${urgencyColor[pred.urgency]}22`,
                                  color:urgencyColor[pred.urgency]}}>
                      {pred.urgency}
                    </span>
                  </div>
                  <div style={{fontSize:12,color:C.mid}}>
                    <b style={{color:C.dark}}>{pred.daysToFailure}</b> days estimated window
                  </div>
                  <div style={{fontSize:11,color:C.lt,fontStyle:'italic'}}>{pred.modelNote}</div>
                </div>
              </div>

              {/* ── Risk factors ── */}
              {pred.riskFactors&&pred.riskFactors.length>0&&(
                <div>
                  <div style={{fontSize:11,fontWeight:700,color:C.dark,marginBottom:6}}>Top Risk Factors</div>
                  {pred.riskFactors.map((rf,i)=>(
                    <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',
                                         padding:'6px 0',borderBottom:`1px solid ${C.bdr}`}}>
                      <div>
                        <div style={{fontSize:12,color:C.dark,fontWeight:600}}>{rf.label}</div>
                        <div style={{fontSize:11,color:C.lt}}>{rf.concern}</div>
                      </div>
                      <div style={{fontSize:13,fontWeight:700,color:C.warn,minWidth:48,textAlign:'right'}}>
                        {rf.value}
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {/* ── Corrective actions ── */}
              {pred.correctiveActions&&pred.correctiveActions.length>0&&(
                <div>
                  <div style={{fontSize:11,fontWeight:700,color:C.dark,marginBottom:6}}>Recommended Actions</div>
                  {pred.correctiveActions.map((a,i)=>(
                    <div key={i} style={{display:'flex',gap:8,padding:'5px 0',
                                         borderBottom:i<pred.correctiveActions.length-1?`1px solid ${C.bdr}`:'none'}}>
                      <span style={{color:C.ok,fontWeight:700,fontSize:13,marginTop:1}}>✓</span>
                      <span style={{fontSize:12,color:C.mid,lineHeight:1.5}}>{a}</span>
                    </div>
                  ))}
                </div>
              )}

            </div>
          )}
        </div>
      )}
    </Card>
  );
}

/* ── EQUIPMENT SENSOR CONFIG ────────────────────────────────── */
const EQUIP_SENSORS={
  'Centrifugal Pump':         [{tag:'FLOW_RATE',label:'Flow Rate',icon:'💧'},{tag:'SUCTION_PRESSURE',label:'Suction Press.',icon:'↓'},{tag:'DISCHARGE_PRESSURE',label:'Disch. Press.',icon:'↑'}],
  'Reciprocating Compressor': [{tag:'RPM',label:'Speed',icon:'⚙️'},{tag:'DISCHARGE_TEMP',label:'Disch. Temp.',icon:'🌡️'},{tag:'DISCHARGE_PRESSURE',label:'Disch. Press.',icon:'↑'}],
  'Shell & Tube Heat Exch.':  [{tag:'INLET_TEMP',label:'Inlet Temp.',icon:'🔴'},{tag:'OUTLET_TEMP',label:'Outlet Temp.',icon:'🔵'},{tag:'DIFFERENTIAL_PRES',label:'Diff. Pressure',icon:'Δ'},{tag:'FLOW_RATE',label:'Flow Rate',icon:'💧'}],
  '3-Phase Separator':        [{tag:'LEVEL',label:'Level',icon:'📊'},{tag:'GAS_FLOW',label:'Gas Flow',icon:'💨'},{tag:'PRESSURE',label:'Pressure',icon:'🔵'}],
  'Control Valve':            [{tag:'POSITION',label:'Position',icon:'🔧'},{tag:'UPSTREAM_PRESSURE',label:'Upstream Press.',icon:'↑'},{tag:'DOWNSTREAM_PRESSURE',label:'Downstream Press.',icon:'↓'}],
};

function ProcessParametersPanel({asset}){
  const sensors=EQUIP_SENSORS[asset.type];
  if(!sensors||!asset.latestSensors||Object.keys(asset.latestSensors).length===0)return null;
  const rows=sensors.map(s=>{
    const found=Object.entries(asset.latestSensors).find(([k])=>k.includes(s.tag)||s.tag.includes(k));
    if(!found)return null;
    const [,data]=found;
    return{...s,value:data?.value,date:data?.date};
  }).filter(Boolean);
  if(rows.length===0)return null;
  return(
    <Card title="Process Parameters" icon="⚙️" right={<span style={{fontSize:10,color:C.lt}}>{asset.type}</span>}>
      <div style={{padding:'10px 16px',display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:8}}>
        {rows.map(r=>(
          <div key={r.tag} style={{background:'#F8F9FB',borderRadius:7,padding:'8px 10px'}}>
            <div style={{fontSize:10,color:C.lt,marginBottom:3}}>{r.icon} {r.label}</div>
            <div style={{fontSize:16,fontWeight:700,color:C.dark}}>{r.value!=null?r.value.toFixed(2):'—'}</div>
            {r.date&&<div style={{fontSize:9,color:C.bdr2,marginTop:1}}>{r.date}</div>}
          </div>
        ))}
      </div>
    </Card>
  );
}

/* ── MAINTENANCE PLANNING PANEL ─────────────────────────────── */
function MaintenancePlanningPanel({assets,scores}){
  const today=new Date();
  const allWOs=assets.flatMap(a=>a.workOrders.map(w=>({...w,assetId:a.id,assetName:a.shortName})));
  const openWOs=allWOs.filter(w=>w.status==='Open'||w.status==='In Progress');
  const overdueWOs=openWOs.filter(w=>w.date&&new Date(w.date)<today);
  const due30=openWOs.filter(w=>{
    if(!w.date)return false;
    const d=(new Date(w.date)-today)/86400000;
    return d>=0&&d<=30;
  });
  const backlogHrs=openWOs.reduce((s,w)=>s+(parseFloat(w.hrs)||8),0);
  const backlogWeeks=(backlogHrs/40).toFixed(1);
  const completedWOs=allWOs.filter(w=>w.status==='Completed');
  const plannedHrs=completedWOs.filter(w=>w.type==='PM'||w.type==='INS').reduce((s,w)=>s+(parseFloat(w.hrs)||0),0);
  const totalHrs=completedWOs.reduce((s,w)=>s+(parseFloat(w.hrs)||0),0);
  const plannedPct=totalHrs>0?Math.round(plannedHrs/totalHrs*100):100;
  const corrPct=100-plannedPct;
  const planColor=plannedPct>=85?C.ok:plannedPct>=60?C.warn:C.crit;
  return(
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      {/* Summary row */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
        {[
          {l:'Open Backlog',v:`${backlogHrs.toFixed(0)}h`,sub:`${backlogWeeks} weeks`,color:parseFloat(backlogWeeks)>4?C.warn:C.ok},
          {l:'Overdue WOs',v:overdueWOs.length,sub:'past due date',color:overdueWOs.length>0?C.crit:C.ok},
          {l:'Due in 30 Days',v:due30.length,sub:'upcoming',color:due30.length>3?C.warn:C.info},
          {l:'Planned Maint.',v:`${plannedPct}%`,sub:'target >85%',color:planColor},
        ].map(k=>(
          <div key={k.l} style={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:8,padding:'10px 14px'}}>
            <div style={{fontSize:10,color:C.lt,marginBottom:2}}>{k.l}</div>
            <div style={{fontSize:20,fontWeight:800,color:k.color}}>{k.v}</div>
            <div style={{fontSize:10,color:C.lt}}>{k.sub}</div>
          </div>
        ))}
      </div>

/* ── CORROSION & INTEGRITY PANEL ────────────────────────────── */
function CorrosionIntegrityPanel({assetId}){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    fetch(`${BACKEND}/api/corrosion-monitoring?assetId=${assetId}`)
      .then(r=>r.ok?r.json():null)
      .then(d=>{setData(d?.value||[]);setLoading(false);})
      .catch(()=>{setData([]);setLoading(false);});
  },[assetId]);
  if(loading)return<div style={{padding:16,color:C.lt,fontSize:12}}>Loading corrosion data…</div>;
  if(!data||data.length===0)return(
    <Card title="Corrosion & Integrity" icon="🔩">
      <div style={{padding:20,textAlign:'center',color:C.lt}}>
        <div style={{fontSize:24,marginBottom:8}}>🔩</div>
        <div style={{fontSize:12,fontWeight:600,marginBottom:4}}>No UT readings recorded</div>
        <div style={{fontSize:11}}>Add wall thickness measurements to enable corrosion monitoring (API 580 requirement)</div>
      </div>
    </Card>
  );
  // Group by measurement point
  const byPoint={};
  for(const r of data){
    if(!byPoint[r.MEASUREMENT_POINT])byPoint[r.MEASUREMENT_POINT]=[];
    byPoint[r.MEASUREMENT_POINT].push(r);
  }
  return(
    <Card title="Corrosion & Integrity (API 580)" icon="🔩">
      <div style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:12}}>
        {Object.entries(byPoint).map(([point,readings])=>{
          const latest=readings.sort((a,b)=>b.MEASUREMENT_DATE>a.MEASUREMENT_DATE?1:-1)[0];
          const rate=parseFloat(latest.CORROSION_RATE_MM_YR)||0;
          const remaining=latest.WALL_THICKNESS_MM&&latest.MINIMUM_WALL_MM?
            parseFloat(latest.WALL_THICKNESS_MM)-parseFloat(latest.MINIMUM_WALL_MM):null;
          const yearsLeft=rate>0&&remaining!=null?Math.round(remaining/rate*10)/10:null;
          const rColor=rate>0.5?C.crit:rate>0.2?C.warn:C.ok;
          return(
            <div key={point} style={{background:'#F8F9FB',borderRadius:8,padding:'10px 12px'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                <span style={{fontSize:12,fontWeight:600}}>{point}</span>
                <span style={{fontSize:10,color:C.lt}}>{String(latest.MEASUREMENT_DATE||'').substring(0,10)} · {latest.METHOD}</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
                {[
                  {l:'Wall Thickness',v:latest.WALL_THICKNESS_MM?`${parseFloat(latest.WALL_THICKNESS_MM).toFixed(2)} mm`:'-',color:C.dark},
                  {l:'Min. Allowed',v:latest.MINIMUM_WALL_MM?`${parseFloat(latest.MINIMUM_WALL_MM).toFixed(2)} mm`:'-',color:C.lt},
                  {l:'Corrosion Rate',v:rate>0?`${rate.toFixed(3)} mm/yr`:'-',color:rColor},
                  {l:'Remaining Life',v:yearsLeft!=null?`${yearsLeft} yrs`:'—',color:yearsLeft&&yearsLeft<3?C.crit:yearsLeft&&yearsLeft<7?C.warn:C.ok},
                ].map(k=>(
                  <div key={k.l}>
                    <div style={{fontSize:9,color:C.lt,marginBottom:2}}>{k.l}</div>
                    <div style={{fontSize:14,fontWeight:700,color:k.color}}>{k.v}</div>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </Card>
  );
}

/* ── COMPLIANCE STATUS PANEL ─────────────────────────────────── */
const COMPLIANCE_STANDARDS=[
  {id:'ISO55000',name:'ISO 55000',desc:'Asset Management System',color:'#0070F2'},
  {id:'API580',  name:'API 580',  desc:'Risk-Based Inspection',  color:'#107E3E'},
  {id:'OSHA_PSM',name:'OSHA PSM', desc:'Process Safety Mgmt',   color:'#E9730C'},
  {id:'IEC61511',name:'IEC 61511',desc:'Safety Instrumented Sys',color:'#6A5ACD'},
  {id:'API653',  name:'API 653',  desc:'Aboveground Storage Tanks',color:'#B8860B'},
  {id:'ASME_VIII',name:'ASME VIII',desc:'Pressure Vessel Code',  color:'#20A8D8'},
];

function ComplianceStatusPanel({asset,addLog,addToast}){
  const [rows,setRows]=useState(null);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    fetch(`${BACKEND}/api/compliance-status?assetId=${asset.id}`)
      .then(r=>r.ok?r.json():null)
      .then(d=>{
        const real=d?.value||[];
        // Merge with derived compliance for standards not yet in HANA
        const merged=COMPLIANCE_STANDARDS.map(std=>{
          const found=real.find(r=>r.STANDARD===std.id);
          if(found)return{...std,...found,source:'HANA'};
          const derived=asset.compliance?.[std.id];
          return derived?{...std,...derived,STANDARD:std.id,source:'derived'}:null;
        }).filter(Boolean);
        setRows(merged);setLoading(false);
      })
      .catch(()=>{setRows([]);setLoading(false);});
  },[asset.id]);

  const scheduleAudit=async(std)=>{
    const dt=new Date(Date.now()+14*86400000).toISOString().substring(0,10);
    try{
      await fetch(`${BACKEND}/api/compliance-status`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ASSET_ID:asset.id,STANDARD:std.id,STATUS:'Due Soon',
          NEXT_DUE_DATE:dt,AUDITOR:'Scheduled',FINDINGS:'Audit scheduled from AI Platform'})
      });
      addToast&&addToast({type:'success',title:'Audit Scheduled',message:`${std.name} audit scheduled for ${dt}`});
      addLog&&addLog({type:'AUDIT',action:'Audit Scheduled',detail:`${std.name} — ${dt}`,doc:`AUD-${std.id}`,assetId:asset.id});
      // Refresh
      setLoading(true);
      fetch(`${BACKEND}/api/compliance-status?assetId=${asset.id}`)
        .then(r=>r.ok?r.json():null).then(d=>{setRows(d?.value||[]);setLoading(false);}).catch(()=>setLoading(false));
    }catch(e){addToast&&addToast({type:'error',title:'Error',message:e.message});}
  };

  if(loading)return<div style={{padding:16,color:C.lt,fontSize:12}}>Loading compliance data…</div>;
  const today=new Date();
  return(
    <Card title="Regulatory Compliance Status" icon="📋">
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%'}}>
          <thead><tr style={{background:'#F5F7FA',borderBottom:`1px solid ${C.bdr}`}}>
            {['Standard','Description','Status','Last Audit','Next Due','Source','Action'].map(h=>(
              <th key={h} style={{padding:'8px 12px',fontWeight:600,color:C.mid,fontSize:11,textAlign:'left'}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {(rows||[]).map((r,i)=>{
              const nextDue=r.NEXT_DUE_DATE||r.nextDue;
              const lastAudit=r.LAST_AUDIT_DATE||r.lastAudit;
              const status=r.STATUS||r.status;
              const daysLeft=nextDue?Math.round((new Date(nextDue)-today)/86400000):null;
              const sColor=status==='Overdue'?C.crit:status==='Due Soon'?C.warn:C.ok;
              return(
                <tr key={r.id} style={{borderBottom:`1px solid ${C.bdr}`,background:i%2?'#FAFAFA':'#FFF'}}>
                  <td style={{padding:'8px 12px'}}><span style={{fontWeight:700,fontSize:12,color:r.color}}>{r.name}</span></td>
                  <td style={{padding:'8px 12px',fontSize:11,color:C.mid}}>{r.desc}</td>
                  <td style={{padding:'8px 12px'}}>
                    <span style={{background:`${sColor}18`,color:sColor,borderRadius:4,padding:'2px 8px',fontSize:11,fontWeight:700}}>{status||'Unknown'}</span>
                  </td>
                  <td style={{padding:'8px 12px',fontSize:11,color:C.lt}}>{lastAudit||'—'}</td>
                  <td style={{padding:'8px 12px',fontSize:11,fontWeight:600,color:daysLeft!=null&&daysLeft<0?C.crit:daysLeft!=null&&daysLeft<60?C.warn:C.lt}}>
                    {nextDue||'—'}{daysLeft!=null&&<span style={{fontSize:9,marginLeft:4,color:sColor}}>({daysLeft<0?`${Math.abs(daysLeft)}d overdue`:`${daysLeft}d`})</span>}
                  </td>
                  <td style={{padding:'8px 12px',fontSize:10,color:C.bdr2}}>{r.source==='HANA'?'Live':'Derived'}</td>
                  <td style={{padding:'8px 12px'}}>
                    {(status==='Overdue'||status==='Due Soon')&&(
                      <button onClick={()=>scheduleAudit(r)}
                        style={{padding:'4px 10px',borderRadius:4,border:`1px solid ${C.warn}`,
                          background:C.warnBg,color:C.warn,fontSize:10,fontWeight:700,cursor:'pointer'}}>
                        Schedule
                      </button>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </Card>
  );
}

/* Circular Gauge */
function CircularGauge({score,size=130}){
  const cx=size/2,cy=size/2,r=size*.40;
  const circ=2*Math.PI*r,arc=circ*.75;
  const offset=arc*(1-score/100);
  const st=scoreStatus(score);
  return(
    <svg width={size} height={size}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#EBEBEB" strokeWidth={size*.09} strokeDasharray={`${arc} ${circ}`} strokeLinecap="round" transform={`rotate(135,${cx},${cy})`}/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={st.color} strokeWidth={size*.09}
        strokeDasharray={`${Math.max(0,arc-offset)} ${circ}`} strokeLinecap="round"
        transform={`rotate(135,${cx},${cy})`} style={{transition:'stroke-dasharray .85s ease,stroke .4s'}}/>
      <text x={cx} y={cy-3} textAnchor="middle" dominantBaseline="middle" fontSize={size*.22} fontWeight={800} fill={st.color}>{score}</text>
      <text x={cx} y={cy+size*.16} textAnchor="middle" fontSize={size*.09} fill={C.mid}>{st.label}</text>
    </svg>
  );
}

/* RUL Bar */
function RULBar({asset,score}){
  const rul=calcRUL(asset,score,asset.kpiHistory?._rawHealth);
  const totalDays=asset.designLifeYears*365;
  const pct=Math.min(100,(rul/totalDays)*100);
  const color=pct>60?C.ok:pct>25?C.warn:C.crit;
  const endDate=new Date(Date.now()+rul*86400000).toLocaleDateString('en-GB',{month:'short',year:'numeric'});

    <div>

/* Mini Sparkline */
function Spark({data,color,width=80,height=28}){
  if(!data||data.length<2)return null;
  const min=Math.min(...data),max=Math.max(...data),range=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*width},${height-(((v-min)/range)*height*.85+height*.075)}`).join(' ');
  return(
    <svg width={width} height={height}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth={1.5} strokeLinejoin="round"/>
      <circle cx={(data.length-1)/(data.length-1)*width} cy={height-(((data[data.length-1]-min)/range)*height*.85+height*.075)} r={2.5} fill={color}/>
    </svg>
  );
}

/* Trend Chart */
function TrendChart({series,labels,width=420,height=140,thresholds=[]}){
  const allVals=series.flatMap(s=>s.values);
  const minV=Math.min(...allVals)*0.95,maxV=Math.max(...allVals)*1.05;
  const range=maxV-minV||1;
  const px=36,py=12,cw=width-px-12,ch=height-py-24;
  const gx=i=>px+(i/(labels.length-1))*cw;
  const gy=v=>py+ch-(((v-minV)/range)*ch);
  return(
    <svg width={width} height={height} style={{overflow:'visible'}}>
      {[0,.25,.5,.75,1].map(f=>(
        <line key={f} x1={px} x2={px+cw} y1={py+ch*(1-f)} y2={py+ch*(1-f)} stroke="#F0F0F0" strokeWidth={1}/>
      ))}
      {thresholds.map((t,ti)=>{
        const y=gy(Math.min(t.value,maxV));
        return(
          <g key={ti}>
            <line x1={px} x2={px+cw} y1={y} y2={y} stroke={t.color} strokeWidth={1.2} strokeDasharray="4,3" opacity={.7}/>
            <text x={px+cw+4} y={y+4} fontSize={8} fill={t.color} fontWeight={600}>{t.label}</text>
          </g>
        );
      })}
      {series.map(s=>{
        const pts=s.values.map((v,i)=>`${gx(i)},${gy(v)}`).join(' ');
        return <polyline key={s.name} points={pts} fill="none" stroke={s.color} strokeWidth={2} strokeLinejoin="round"/>;
      })}
      {series.map(s=>{
        const v=s.values[s.values.length-1];
        return <circle key={s.name} cx={gx(s.values.length-1)} cy={gy(v)} r={3.5} fill={s.color}/>;
      })}
      {labels.map((l,i)=>(i%2===0||i===labels.length-1)&&(
        <text key={i} x={gx(i)} y={py+ch+16} textAnchor="middle" fontSize={9} fill={C.lt}>{l}</text>
      ))}
      <text x={px-6} y={py+4} textAnchor="end" fontSize={9} fill={C.lt}>{maxV.toFixed(0)}</text>
      <text x={px-6} y={py+ch} textAnchor="end" fontSize={9} fill={C.lt}>{minV.toFixed(0)}</text>
    </svg>
  );
}

/* Risk Matrix 5×5 */
function RiskMatrix({assets,scores,onDotClick,focusId=null}){
  const W=340,H=275,ox=52,oy=8,cols=5,rows=5;
  const cw=(W-ox-10)/cols,ch=(H-oy-32)/rows;
  const RISK=[
    ['#C8E6C9','#C8E6C9','#C8E6C9','#FFF9C4','#FFB74D'],
    ['#C8E6C9','#C8E6C9','#FFF9C4','#FFB74D','#FFB74D'],
    ['#C8E6C9','#FFF9C4','#FFF9C4','#FFB74D','#EF5350'],
    ['#C8E6C9','#FFF9C4','#FFB74D','#EF5350','#EF5350'],
    ['#FFF9C4','#FFB74D','#FFB74D','#EF5350','#EF5350'],
  ];
  const PROB=['Rare','Unlikely','Possible','Likely','Almost Certain'];
  const CONS=['Insig.','Minor','Moderate','Major','Catastrophic'];
  return(
    <svg width={W} height={H}>
      {RISK.map((row,ri)=>row.map((color,ci)=>(
        <rect key={`${ri}-${ci}`} x={ox+ci*cw} y={oy+(rows-1-ri)*ch} width={cw-1} height={ch-1} fill={color} opacity={.72} rx={2}/>
      )))}
      {PROB.map((l,i)=>(
        <text key={l} x={ox-5} y={oy+(rows-1-i)*ch+ch/2} textAnchor="end" fontSize={8} fill={C.mid} dominantBaseline="middle">{l}</text>
      ))}
      {CONS.map((l,i)=>(
        <text key={l} x={ox+i*cw+cw/2} y={oy+rows*ch+14} textAnchor="middle" fontSize={8} fill={C.mid}>{l}</text>
      ))}
      <text x={10} y={H/2-14} fontSize={9} fill={C.mid} transform={`rotate(-90,10,${H/2})`} textAnchor="middle">Probability</text>
      <text x={ox+(W-ox)/2} y={H-2} fontSize={9} fill={C.mid} textAnchor="middle">Consequence</text>
      {assets.map(a=>{
        const sc=scores[a.id]||50;
        const prob=Math.min(5,probLevel(sc));
        const cons=a.consequence;
        const dx=ox+(cons-.5)*cw,dy=oy+(rows-prob)*ch+ch/2;
        const st=scoreStatus(sc);
        const isFocus=focusId===a.id;
        return(
          <g key={a.id} onClick={()=>onDotClick(a)} style={{cursor:'pointer'}}>
            <circle cx={dx} cy={dy} r={isFocus?14:11} fill={st.color} opacity={isFocus?.92:.72}
              stroke={isFocus?'#FFF':'none'} strokeWidth={2}
              style={{transition:'cx .7s ease,cy .7s ease'}}/>
            <text x={dx} y={dy} textAnchor="middle" dominantBaseline="middle" fontSize={7} fill="#FFF" fontWeight={700} style={{pointerEvents:'none'}}>
              {a.id.replace('A-0','')}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

          const sc=scores[a.id]||50;
          const st=scoreStatus(sc);
          const prob=calcFailureProbability(a,sc);
          const nba=getNextBestAction(a,sc);
          const live=liveAssets[a.id]||{};
          const lastTemp=live.temperature??a.sensorHistory.temperature.slice(-1)[0];
          const lastVib=live.vibration??a.sensorHistory.vibration.slice(-1)[0];
          const lastPres=live.pressure??a.sensorHistory.pressure.slice(-1)[0];
          const th=a.thresholds;
          const sCol=(v,w,c)=>v>=c?C.crit:v>=w?C.warn:C.ok;
          // Score trend from KPI snapshots
          const snaps=a.kpiHistory?.oee||[];
          const trendDelta=snaps.length>=2?Math.round(snaps[snaps.length-1]-snaps[0]):null;
          // Use HANA health score snapshots if available
          const hSnaps=a.kpiHistory?._rawHealth||[];
          const scoreDelta=hSnaps.length>=2?Math.round(hSnaps[hSnaps.length-1]-hSnaps[0]):trendDelta;
          return(
            <div key={a.id} onClick={()=>onSelect(a)}
              style={{background:C.card,border:`1px solid ${C.bdr}`,borderRadius:10,borderLeft:`4px solid ${st.color}`,
                cursor:'pointer',boxShadow:'0 1px 5px rgba(0,0,0,.06)',transition:'box-shadow .2s,transform .15s'}}
              onMouseEnter={e=>{e.currentTarget.style.boxShadow='0 6px 20px rgba(0,0,0,.12)';e.currentTarget.style.transform='translateY(-1px)';}}
              onMouseLeave={e=>{e.currentTarget.style.boxShadow='0 1px 5px rgba(0,0,0,.06)';e.currentTarget.style.transform='translateY(0)';}}>
              <div style={{padding:'12px 14px',borderBottom:`1px solid ${C.bdr}`,display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div>
                  <div style={{fontSize:10,color:C.lt,marginBottom:1}}>{a.id} · {a.type}</div>
                  <div style={{fontWeight:700,fontSize:13}}>{a.icon} {a.shortName}</div>
                  <div style={{fontSize:11,color:C.mid}}>{a.location}</div>
                </div>
                <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
                  <ScoreBadge score={sc}/>
                  {liveOn&&<span style={{fontSize:9,color:C.ok,fontWeight:600}}>● LIVE</span>}
                  {a.anomalyStatus&&a.anomalyStatus!=='Nominal'&&(
                    <span style={{fontSize:9,fontWeight:700,padding:'1px 6px',borderRadius:3,
                      background:a.anomalyStatus==='Alert'?C.critBg:C.warnBg,
                      color:a.anomalyStatus==='Alert'?C.crit:C.warn,
                      border:`1px solid ${a.anomalyStatus==='Alert'?C.crit:C.warn}44`}}>
                      {a.anomalyStatus==='Alert'?'🚨':'⚠'} {a.anomalyStatus} {a.anomalyScore!=null?a.anomalyScore:''}
                    </span>
                  )}
                  {a.anomalyStatus==='Nominal'&&(
                    <span style={{fontSize:9,color:C.ok,fontWeight:600}}>✓ Monitored</span>
                  )}
                </div>
              </div>
              <div style={{padding:'12px 14px',display:'flex',gap:12,alignItems:'center'}}>
                <div style={{position:'relative',display:'inline-block'}}>
                  <CircularGauge score={sc} size={92}/>
                  {scoreDelta!=null&&scoreDelta!==0&&<span style={{
                    position:'absolute',bottom:0,right:-4,
                    fontSize:9,fontWeight:800,padding:'1px 4px',borderRadius:3,
                    background:scoreDelta>0?C.okBg:C.critBg,
                    color:scoreDelta>0?C.ok:C.crit,border:`1px solid ${scoreDelta>0?C.ok:C.crit}44`
                  }}>{scoreDelta>0?`▲+${scoreDelta}`:`▼${scoreDelta}`}</span>}
                </div>
                <div style={{flex:1,display:'flex',flexDirection:'column',gap:6}}>
                  <RULBar asset={a} score={sc}/>
                  <ProbBar prob={prob}/>
                  <div style={{display:'flex',flexDirection:'column',gap:3,marginTop:2}}>
                    {[
                      {l:'Temp',v:lastTemp,u:th.temperature.unit,w:th.temperature.warn[0],c:th.temperature.crit},
                      {l:'Vib', v:lastVib, u:th.vibration.unit,  w:th.vibration.warn[0],  c:th.vibration.crit},
                      {l:'Pres',v:lastPres,u:th.pressure.unit,   w:th.pressure.warn[0],   c:th.pressure.crit},
                    ].map(s=>(
                      <div key={s.l} style={{display:'flex',justifyContent:'space-between',fontSize:11}}>
                        <span style={{color:C.lt}}>{s.l}</span>
                        <span style={{fontWeight:700,color:sCol(s.v,s.w,s.c)}}>{typeof s.v==='number'?s.v.toFixed(1):s.v} {s.u}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
              <div style={{padding:'8px 14px',borderTop:`1px solid ${C.bdr}`,background:nba.color+'0D',
                display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:13}}>{nba.icon}</span>
                <span style={{fontSize:11,fontWeight:700,color:nba.color}}>{nba.action}</span>
                <span style={{fontSize:10,color:C.lt,marginLeft:'auto'}}>Age: {a.ageYears}y / {a.designLifeYears}y</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── WORK ORDER UPDATE MODAL ─────────────────────────────────── */
function WOUpdateModal({wo,assetId,onClose,onSaved,onError}){
  const [dStatus,setDStatus]=useState(wo.status);
  const [dHrs,setDHrs]=useState(wo.hrs||'');
  const [dCost,setDCost]=useState(wo.cost||'');
  const [dTech,setDTech]=useState(wo.technician||'');
  const [saving,setSaving]=useState(false);

  const saveWO=async()=>{
    setSaving(true);
    try{
      const res=await fetch(`${BACKEND}/api/work-orders/${wo.id}`,{
        method:'PATCH',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          STATUS:dStatus,
          LABOR_HOURS:dHrs!==''?parseFloat(dHrs):null,
          COST:dCost!==''?parseFloat(dCost):null,
          TECHNICIAN:dTech||null
        })
      });
      if(!res.ok)throw new Error(`HTTP ${res.status}`);
      const today=new Date().toISOString().substring(0,10);
      onSaved({
        ...wo,
        status:dStatus,
        hrs:dHrs!==''?parseFloat(dHrs):wo.hrs,
        cost:dCost!==''?parseFloat(dCost):wo.cost,
        technician:dTech||wo.technician,
        completionDate:dStatus==='Completed'?today:wo.completionDate
      });
    }catch(e){onError(e.message);}
    setSaving(false);
  };

  const statusColor={Open:C.warn,'In Progress':C.info,Completed:C.ok};
  const inp={width:'100%',padding:'7px 10px',borderRadius:6,border:`1px solid ${C.bdr}`,fontSize:13,outline:'none',boxSizing:'border-box'};
  return(
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.card,borderRadius:12,width:420,boxShadow:'0 20px 60px rgba(0,0,0,.3)',overflow:'hidden'}}>
        <div style={{background:C.hdr,color:'#FFF',padding:'14px 20px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontWeight:700,fontSize:15}}>Update Work Order</div>
            <div style={{fontSize:11,opacity:.7,marginTop:2}}>{wo.id} · {wo.type} · {(wo.desc||'').substring(0,40)}</div>
          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,.15)',border:'none',color:'#FFF',borderRadius:6,padding:'5px 12px',fontSize:12,cursor:'pointer'}}>✕</button>
        </div>
        <div style={{padding:20,display:'flex',flexDirection:'column',gap:14}}>
          <div>
            <div style={{fontSize:11,fontWeight:600,color:C.mid,marginBottom:4}}>STATUS</div>
            <select value={dStatus} onChange={e=>setDStatus(e.target.value)}
              style={{...inp,color:statusColor[dStatus]||C.txt,fontWeight:700}}>
              <option value="Open">Open</option>
              <option value="In Progress">In Progress</option>
              <option value="Completed">Completed</option>
            </select>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div>
              <div style={{fontSize:11,fontWeight:600,color:C.mid,marginBottom:4}}>ACTUAL HOURS</div>
              <input type="number" min="0" step="0.5" value={dHrs}
                onChange={e=>setDHrs(e.target.value)} placeholder="e.g. 8" style={inp}/>
            </div>
            <div>
              <div style={{fontSize:11,fontWeight:600,color:C.mid,marginBottom:4}}>ACTUAL COST (USD)</div>
              <input type="number" min="0" step="100" value={dCost}
                onChange={e=>setDCost(e.target.value)} placeholder="e.g. 2500" style={inp}/>
            </div>
          </div>
          <div>
            <div style={{fontSize:11,fontWeight:600,color:C.mid,marginBottom:4}}>TECHNICIAN</div>
            <input type="text" value={dTech} onChange={e=>setDTech(e.target.value)}
              placeholder="Technician name or ID" style={inp}/>
          </div>
          {dStatus==='Completed'&&(
            <div style={{background:'#F0FFF4',border:'1px solid #C6F6D5',borderRadius:6,padding:'8px 12px',fontSize:11,color:C.ok}}>
              COMPLETION_DATE will be stamped to today in HANA.
            </div>
          )}
          <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:4}}>
            <button onClick={onClose}
              style={{padding:'8px 18px',borderRadius:6,border:`1px solid ${C.bdr}`,background:'#FFF',fontSize:13,cursor:'pointer'}}>
              Cancel
            </button>
            <button onClick={saveWO} disabled={saving}
              style={{padding:'8px 18px',borderRadius:6,border:'none',background:C.hdr,color:'#FFF',fontSize:13,fontWeight:700,cursor:'pointer',opacity:saving?.6:1}}>
              {saving?'Saving…':'Save to HANA'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── TAB 2: ASSET DETAIL ────────────────────────────────────── */
function AssetDetail({asset,score,liveData,liveOn,addLog,addToast}){
  const [fStep,setFStep]=useState(-1);
  const [fRunning,setFRunning]=useState(false);
  const [fScore,setFScore]=useState(score);
  const [fRul,setFRul]=useState(calcRUL(asset,score));
  const [sapLoading,setSapLoading]=useState({});
  const [invoice,setInvoice]=useState(null);
  const [localWOs,setLocalWOs]=useState(asset.workOrders);
  const [editingWO,setEditingWO]=useState(null);
  const [diagResult,setDiagResult]=useState(null);
  const [diagLoading,setDiagLoading]=useState(false);
  const [aeResult,setAeResult]=useState(null);
  const [aeLoading,setAeLoading]=useState(false);

  const runDiagnostics=async()=>{
    setDiagLoading(true);setDiagResult(null);
    try{
      const r=await fetch(`${BACKEND}/api/diagnostics/analyze`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({assetId:asset.id})
      });
      const d=await r.json();
      if(d.error)throw new Error(d.error);
      setDiagResult(d);
    }catch(e){addToast({type:'error',title:'Diagnostics Error',message:e.message});}
    setDiagLoading(false);
  };

  const runAutoencoder=async()=>{
    setAeLoading(true);setAeResult(null);
    try{
      const r=await fetch(`${BACKEND}/api/ml/autoencoder?assetId=${encodeURIComponent(asset.id)}`);
      const d=await r.json();
      if(d.error)throw new Error(d.error);
      setAeResult(d);
    }catch(e){addToast({type:'error',title:'Autoencoder Error',message:e.message});}
    setAeLoading(false);
  };

  const setSapLoad=(k,v)=>setSapLoading(p=>({...p,[k]:v}));
  const FORECAST_STEPS=getForecastSteps(asset);

  const rawDates=asset.sensorHistory.dates;
  const labels=rawDates&&rawDates.filter(Boolean).length===10
    ?rawDates.map((d,i)=>i===9?'Today':d?d.substring(5):'?')
    :['T-9','T-8','T-7','T-6','T-5','T-4','T-3','T-2','T-1','Today'];
  const th=asset.thresholds;
  const kpis=calcKPIs(asset);
  const fin=calcFinancials(asset,score);
  const nba=getNextBestAction(asset,score);
  const prob=calcFailureProbability(asset,score);

  const effScore=liveOn&&liveData?calcHealthScore(asset,liveData):score;

  const runForecast=async()=>{
    setFRunning(true);setFStep(0);setFScore(score);setFRul(calcRUL(asset,score));
    for(let i=0;i<FORECAST_STEPS.length;i++){
      await pause(1500);
      const ns=Math.max(0,score+FORECAST_STEPS[i].scoreΔ);
      setFScore(ns);setFRul(calcRUL(asset,ns));setFStep(i);
      if(i===1){const n=await sapApi.createPMNotification(asset.id,'Medium',`Oil temp ${FORECAST_STEPS[i].temp}°C — warning`);addLog({type:'EAM',action:'PM Notification',detail:n.message,doc:n.id,assetId:asset.id});addToast({type:'warning',title:'SAP Notification',message:n.message});}
      if(i===2){const w=await sapApi.createWorkOrder(asset.id,'CM','High',`Oil temp ${FORECAST_STEPS[i].temp}°C — alert`);addLog({type:'EAM',action:'Work Order Created',detail:w.message,doc:w.id,assetId:asset.id});addToast({type:'error',title:'SAP Work Order',message:w.message});}
      if(i===3){const w=await sapApi.createWorkOrder(asset.id,'EM','Very High',`CRITICAL temp ${FORECAST_STEPS[i].temp}°C`);addLog({type:'EAM',action:'Emergency WO',detail:w.message,doc:w.id,assetId:asset.id});addToast({type:'error',title:'Emergency Work Order',message:w.message});}
    }
    setFRunning(false);
  };

  const resetForecast=()=>{setFStep(-1);setFScore(score);setFRul(calcRUL(asset,score));};

  const sevColor={ok:C.ok,warn:C.warn,high:C.warn,crit:C.crit};

  const doSapAction=async(key,fn,logEntry,toast)=>{
    setSapLoad(key,true);
    try{
      const r=await fn();
      addLog({...logEntry,detail:r.message||r.prId,doc:r.id||r.prId||'—',assetId:asset.id});
      addToast(toast);
      if((key==='wo'||key==='pm')&&r.id){
        const today=new Date().toISOString().substring(0,10);
        setLocalWOs(prev=>[{id:r.id,type:r.type||(key==='pm'?'INS':'CM'),desc:r.desc||logEntry.action||'',date:today,hrs:8,cost:0,status:'Open'},...prev]);
      }
    }
    catch(e){addToast({type:'error',title:'SAP Error',message:e.message});}
    setSapLoad(key,false);
  };

  const genInvoice=async(wo)=>{
    const inv=await sapApi.generateInvoice(wo);
    setInvoice(inv);
    addLog({type:'FICO',action:'Invoice Generated',detail:`Invoice ${inv.invId} for ${wo.id}`,doc:inv.invId,assetId:asset.id});
    addToast({type:'success',title:'Invoice Created',message:`Invoice ${inv.invId} posted to SAP FICO`});
  };

  // Build live sensor arrays for chart
  const tempHistory=liveOn&&liveData?[...asset.sensorHistory.temperature.slice(0,-1),liveData.temperature||asset.sensorHistory.temperature.slice(-1)[0]]:asset.sensorHistory.temperature;
  const vibHistory=liveOn&&liveData?[...asset.sensorHistory.vibration.slice(0,-1),liveData.vibration||asset.sensorHistory.vibration.slice(-1)[0]]:asset.sensorHistory.vibration;
  const presHistory=liveOn&&liveData?[...asset.sensorHistory.pressure.slice(0,-1),liveData.pressure||asset.sensorHistory.pressure.slice(-1)[0]]:asset.sensorHistory.pressure;

  return(
    <div style={{padding:20,display:'flex',flexDirection:'column',gap:14}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg,${C.hdr} 0%,${C.hdr2} 100%)`,color:'#FFF',borderRadius:10,padding:'16px 20px',display:'flex',gap:18,alignItems:'center',flexWrap:'wrap'}}>
        <div style={{fontSize:36}}>{asset.icon}</div>
        <div style={{flex:1,minWidth:200}}>
          <div style={{fontSize:10,opacity:.6,marginBottom:1}}>{asset.id} · {asset.type} · Plant {asset.plant} · {asset.floc}{asset.silRating&&asset.silRating!=='None'?` · ${asset.silRating}`:''}{asset.fluidType?` · ${asset.fluidType}`:''}</div>
          <div style={{fontWeight:700,fontSize:20}}>{asset.name}</div>
          <div style={{fontSize:12,opacity:.75,marginTop:3}}>{asset.location} · {asset.manufacturer} {asset.model}</div>
        </div>
        <div style={{display:'flex',gap:20,flexWrap:'wrap',alignItems:'center'}}>
          {[
            {l:'Commissioned',v:asset.commissionDate},
            {l:'Age / Design Life',v:`${asset.ageYears} / ${asset.designLifeYears} yrs`},
            {l:'Failures (total)',v:asset.failures.length,color:asset.failures.length>2?'#FFB74D':'#81C784'},
            {l:'Downtime cost/day',v:`$${(asset.downtimeCostPerDay/1000).toFixed(0)}k`},
          ].map(m=>(
            <div key={m.l} style={{textAlign:'center'}}>
              <div style={{fontSize:10,opacity:.6}}>{m.l}</div>
              <div style={{fontWeight:700,color:m.color||'#FFF'}}>{m.v}</div>
            </div>
          ))}
          <CircularGauge score={effScore} size={105}/>
        </div>
      </div>

      {/* NBA + KPIs row */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
        {/* Next Best Action */}
        <Card title="Next Best Action" icon="🧠">
          <div style={{padding:16}}>
            <div style={{display:'flex',gap:14,alignItems:'flex-start',marginBottom:12}}>
              <div style={{width:48,height:48,borderRadius:12,background:nba.color+'18',
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,flexShrink:0}}>
                {nba.icon}
              </div>
              <div>
                <div style={{fontWeight:700,fontSize:15,color:nba.color,marginBottom:3}}>{nba.action}</div>
                <div style={{fontSize:11,color:C.lt}}>Priority: <strong style={{color:nba.color}}>{nba.priority}</strong></div>
              </div>
            </div>
            <div style={{fontSize:12,color:C.mid,lineHeight:1.6,marginBottom:10}}>{nba.desc}</div>
            <div style={{padding:'8px 12px',background:nba.color+'0F',border:`1px solid ${nba.color}33`,
              borderRadius:6,fontSize:11,color:C.dark,lineHeight:1.5,marginBottom:10}}>{nba.sapAction}</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              <button onClick={()=>doSapAction('pm',
                ()=>sapApi.createPMNotification(asset.id,'High',nba.desc),

                {type:'info',title:'SAP Notification',message:`PM Notification created for ${asset.shortName}`})}

                  style={{padding:'6px 14px',borderRadius:5,border:`1px solid ${C.crit}`,background:C.critBg,color:C.crit,fontSize:11,fontWeight:700,display:'flex',alignItems:'center',gap:6}}>
